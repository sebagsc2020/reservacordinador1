<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Reserva Exitosa! - Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 45px 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icono-exito {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 2s ease infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 {
            color: #1a1a2e;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        h1 span { color: #27ae60; }
        
        .mensaje-principal {
            color: #888;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        
        /* ===== RESUMEN ===== */
        .info-box {
            background: #fafbfc;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info-box h3 {
            color: #1a1a2e;
            margin-bottom: 18px;
            font-size: 17px;
            font-weight: 700;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: white;
            border-radius: 10px;
            border: 1px solid #f5f5f5;
            transition: all 0.2s ease;
        }
        .info-item:hover { background: #fafbfc; transform: translateX(3px); }
        
        .info-item .emoji { font-size: 22px; margin-right: 14px; min-width: 28px; padding-top: 2px; }
        .info-item .texto strong {
            color: #555;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }
        .info-item .texto span { color: #333; font-size: 15px; font-weight: 500; }
        
        .excursiones-lista { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
        .excursion-tag {
            display: inline-block;
            background: #f0f0ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
        }
        
        /* ===== BOTONES ===== */
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }
        
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
        }
        .btn-whatsapp:hover { background: #1da851; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.3); }
        
        /* ===== INFO ADICIONAL ===== */
        .info-adicional {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #aaa;
        }
        .info-adicional p { margin-bottom: 4px; }
        
        @media (max-width: 480px) {
            .container { padding: 30px 20px; border-radius: 16px; }
            .btn-group { flex-direction: column; }
            h1 { font-size: 22px; }
            .icono-exito { font-size: 55px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icono-exito">✅</div>
        <h1>¡Reserva <span>Enviada!</span></h1>
        <p class="mensaje-principal">Gracias por confiar en nosotros. Tu aventura está a punto de comenzar.</p>
        
        <div class="info-box" id="resumenReserva">
            <!-- Se llena con JavaScript -->
        </div>

        <div class="btn-group">
            <a href="reservar.html" class="btn btn-primary">🏠 Nueva Reserva</a>
            <a href="#" id="whatsappBtn" class="btn btn-whatsapp" target="_blank">💬 WhatsApp</a>
        </div>

        <div class="info-adicional">
            <p>📞 Te contactaremos si hubiera alguna modificación</p>
            <p>💳 No se ha realizado ningún cobro todavía</p>
        </div>
    </div>

    <script>
        const ultimaReserva = JSON.parse(sessionStorage.getItem('ultimaReserva'));
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        
        if (ultimaReserva) {
            const partesFecha = ultimaReserva.fecha.split('-');
            const fechaObj = new Date(partesFecha[2], partesFecha[1] - 1, partesFecha[0]);
            const fechaFormateada = fechaObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            let excursionesArray = [];
            if (ultimaReserva.excursiones) excursionesArray = ultimaReserva.excursiones.split(' | ');
            else if (ultimaReserva.excursion) excursionesArray = [ultimaReserva.excursion];
            
            const excursionesHTML = excursionesArray.map(exc => `<span class="excursion-tag">${exc.trim()}</span>`).join('');
            
            const excursionesWhatsApp = excursionesArray.map((exc, i) => `   ${i+1}. ${exc.trim()}`).join('\n');
            
            let iconoPago = '💳';
            if (ultimaReserva.formaPago === 'Efectivo') iconoPago = '💵';
            if (ultimaReserva.formaPago === 'Transferencia') iconoPago = '🏦';
            
            const mensajeWhatsApp = `¡Hola! 🕐\n\nQuiero confirmar mi reserva:\n\n👤 Nombre: ${ultimaReserva.nombre} ${ultimaReserva.apellido||''}\n📧 Email: ${ultimaReserva.email}\n📞 Teléfono: ${ultimaReserva.telefono}\n🌎 País: ${ultimaReserva.pais||''}\n📂 Categoría: ${ultimaReserva.categoria||''}\n\n🕐 Excursiones:\n${excursionesWhatsApp}\n\n🗓️ Fecha: ${fechaFormateada}\n👥 Personas: ${ultimaReserva.personas}\n${iconoPago} Forma de Pago: ${ultimaReserva.formaPago||'No especificada'}\n🏨 Te buscamos en: ${ultimaReserva.mensaje||'No especificado'}\n\nGracias! 🙌`;
            
            document.getElementById('whatsappBtn').href = `https://wa.me/5493518692251?text=${encodeURIComponent(mensajeWhatsApp)}`;
            
            const resumenHTML = `
                <h3>📋 Resumen de tu Reserva</h3>
                <div class="info-item"><div class="emoji">👤</div><div class="texto"><strong>Cliente</strong><span>${ultimaReserva.nombre} ${ultimaReserva.apellido||''}</span></div></div>
                <div class="info-item"><div class="emoji">📧</div><div class="texto"><strong>Email</strong><span>${ultimaReserva.email}</span></div></div>
                <div class="info-item"><div class="emoji">📞</div><div class="texto"><strong>Teléfono</strong><span>${ultimaReserva.telefono}</span></div></div>
                <div class="info-item"><div class="emoji">🌎</div><div class="texto"><strong>País</strong><span>${ultimaReserva.pais||'No especificado'}</span></div></div>
                <div class="info-item"><div class="emoji">📂</div><div class="texto"><strong>Categoría</strong><span>${ultimaReserva.categoria||'No especificado'}</span></div></div>
                <div class="info-item"><div class="emoji">🕐</div><div class="texto"><strong>Excursiones</strong><div class="excursiones-lista">${excursionesHTML}</div></div></div>
                <div class="info-item"><div class="emoji">🗓️</div><div class="texto"><strong>Fecha</strong><span>${fechaFormateada}</span></div></div>
                <div class="info-item"><div class="emoji">👥</div><div class="texto"><strong>Personas</strong><span>${ultimaReserva.personas}</span></div></div>
                <div class="info-item"><div class="emoji">${iconoPago}</div><div class="texto"><strong>Forma de Pago</strong><span>${ultimaReserva.formaPago||'No especificada'}</span></div></div>
                <div class="info-item"><div class="emoji">🏨</div><div class="texto"><strong>Te buscamos en</strong><span>${ultimaReserva.mensaje||'No especificado'}</span></div></div>
            `;
            
            document.getElementById('resumenReserva').innerHTML = resumenHTML;
            
            if (status === 'parcial') {
                document.getElementById('resumenReserva').insertAdjacentHTML('beforebegin', '<div style="background:#fff8e1;color:#f39c12;padding:12px;border-radius:10px;margin-bottom:15px;text-align:center;font-size:13px;font-weight:600;">⚠️ La reserva se guardó pero hubo un problema técnico. Te contactaremos.</div>');
            }
        } else {
            document.getElementById('resumenReserva').innerHTML = '<div style="text-align:center;padding:20px;"><p style="font-size:40px;">📧</p><p style="color:#888;">Recibirás un email con todos los detalles</p></div>';
            document.getElementById('whatsappBtn').href = 'https://wa.me/5493518692251?text=¡Hola!%20Quiero%20información%20sobre%20las%20excursiones%20🏔️';
        }
        
        setTimeout(() => sessionStorage.removeItem('ultimaReserva'), 600000);
        window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
    </script>
</body>
</html>
