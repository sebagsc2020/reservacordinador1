<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Reserva Exitosa! - Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 45px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icono-exito {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 2s ease infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 {
            color: #1a1a2e;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        h1 span { color: #27ae60; }
        
        .mensaje-principal {
            color: #888;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        
        .info-box {
            background: #fafbfc;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info-box h3 {
            color: #1a1a2e;
            margin-bottom: 18px;
            font-size: 17px;
            font-weight: 700;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: white;
            border-radius: 10px;
            border: 1px solid #f5f5f5;
            transition: all 0.2s ease;
        }
        .info-item:hover { background: #fafbfc; transform: translateX(3px); }
        
        .info-item .emoji { font-size: 22px; margin-right: 14px; min-width: 28px; padding-top: 2px; }
        .info-item .texto strong {
            color: #555;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }
        .info-item .texto span { color: #333; font-size: 14px; font-weight: 500; }
        
        .excursiones-lista { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
        .excursion-tag {
            display: inline-block;
            background: #f0f0ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
        }
        
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }
        
        .info-adicional {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #aaa;
        }
        .info-adicional p { margin-bottom: 4px; }
        
        .mensaje-alerta {
            background: #fff8e1;
            color: #f39c12;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .container { padding: 30px 20px; border-radius: 16px; }
            .btn-group { flex-direction: column; }
            h1 { font-size: 22px; }
            .icono-exito { font-size: 55px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icono-exito">✅</div>
        <h1>¡Reserva <span>Enviada!</span></h1>
        <p class="mensaje-principal">Gracias por confiar en nosotros. Tu aventura está a punto de comenzar.</p>
        
        <div class="info-box" id="resumenReserva">
            <div style="text-align:center; padding:20px;">
                <div class="emoji" style="font-size:40px;">⏳</div>
                <p>Cargando tus datos...</p>
            </div>
        </div>

        <div class="btn-group">
            <a href="reservar.html" class="btn btn-primary">🏠 Nueva Reserva</a>
        </div>

        <div class="info-adicional">
            <p>📞 Te contactaremos si hubiera alguna modificación</p>
            <p>💳 No se ha realizado ningún cobro todavía</p>
        </div>
    </div>

    <script>
        // ==================================================
        // FUNCIÓN PARA FORMATEAR FECHA
        // ==================================================
        function formatearFecha(fechaStr) {
            if (!fechaStr) return 'No especificada';
            
            // Formato DD-MM-YYYY
            if (fechaStr.includes('-')) {
                const partes = fechaStr.split('-');
                if (partes.length === 3) {
                    const fecha = new Date(partes[2], partes[1] - 1, partes[0]);
                    if (!isNaN(fecha.getTime())) {
                        return fecha.toLocaleDateString('es-ES', { 
                            weekday: 'long', 
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric' 
                        });
                    }
                }
            }
            
            // Formato DD/MM/YYYY
            if (fechaStr.includes('/')) {
                const partes = fechaStr.split('/');
                if (partes.length === 3) {
                    const fecha = new Date(partes[2], partes[1] - 1, partes[0]);
                    if (!isNaN(fecha.getTime())) {
                        return fecha.toLocaleDateString('es-ES', { 
                            weekday: 'long', 
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric' 
                        });
                    }
                }
            }
            
            return fechaStr;
        }

        // ==================================================
        // FUNCIÓN PARA LIMPIAR EXCURSIONES
        // ==================================================
        function limpiarExcursion(texto) {
            if (!texto) return '';
            return texto.trim().replace(/^✔️\s*/, '').replace(/^\d+\.\s*/, '');
        }

        // ==================================================
        // RECUPERAR DATOS DE LA RESERVA
        // ==================================================
        let datosReserva = null;
        
        // Intentar desde sessionStorage
        try {
            const sessionData = sessionStorage.getItem('ultimaReserva');
            if (sessionData) {
                datosReserva = JSON.parse(sessionData);
                console.log('✅ Datos cargados desde sessionStorage:', datosReserva);
            }
        } catch(e) { console.error('Error sessionStorage:', e); }
        
        // Si no hay, intentar desde localStorage
        if (!datosReserva) {
            try {
                const localData = localStorage.getItem('ultimaReserva');
                if (localData) {
                    if (localData.includes('=')) {
                        const params = new URLSearchParams(localData);
                        datosReserva = {
                            id: params.get('id') || '',
                            nombre: params.get('nombre') || '',
                            apellido: params.get('apellido') || '',
                            email: params.get('email') || '',
                            telefono: params.get('telefono') || '',
                            pais: params.get('pais') || '',
                            ciudad: params.get('ciudad') || '',
                            excursiones: params.get('excursiones') || '',
                            fecha: params.get('fecha') || '',
                            personas: params.get('personas') || '',
                            formaPago: params.get('formaPago') || '',
                            lugar: params.get('lugar') || params.get('mensaje') || ''
                        };
                    } else {
                        datosReserva = JSON.parse(localData);
                    }
                    console.log('✅ Datos cargados desde localStorage:', datosReserva);
                }
            } catch(e) { console.error('Error localStorage:', e); }
        }
        
        // Verificar si hay datos en la URL (por si acaso)
        const urlParams = new URLSearchParams(window.location.search);
        const statusParam = urlParams.get('status');
        
        // ==================================================
        // MOSTRAR LOS DATOS EN EL HTML
        // ==================================================
        const resumenDiv = document.getElementById('resumenReserva');
        
        if (datosReserva && Object.keys(datosReserva).length > 0 && 
            (datosReserva.nombre || datosReserva.email)) {
            
            // Procesar excursiones
            let excursionesArray = [];
            if (datosReserva.excursiones) {
                if (datosReserva.excursiones.includes('\n')) {
                    excursionesArray = datosReserva.excursiones.split('\n');
                } else if (datosReserva.excursiones.includes(' | ')) {
                    excursionesArray = datosReserva.excursiones.split(' | ');
                } else {
                    excursionesArray = [datosReserva.excursiones];
                }
            } else if (datosReserva.excursion) {
                excursionesArray = [datosReserva.excursion];
            }
            
            // Limpiar cada excursión
            excursionesArray = excursionesArray.map(limpiarExcursion).filter(e => e);
            
            const excursionesHTML = excursionesArray.length > 0 
                ? excursionesArray.map(exc => `<span class="excursion-tag">${exc}</span>`).join('')
                : '<span class="excursion-tag">Sin excursiones especificadas</span>';
            
            // Formatear fecha
            const fechaFormateada = formatearFecha(datosReserva.fecha);
            
            // Icono según forma de pago
            let iconoPago = '💳';
            if (datosReserva.formaPago && datosReserva.formaPago.includes('Efectivo')) iconoPago = '💵';
            if (datosReserva.formaPago && datosReserva.formaPago.includes('Transferencia')) iconoPago = '🏦';
            if (datosReserva.formaPago && datosReserva.formaPago.includes('Débito')) iconoPago = '💳';
            
            // Nombre completo
            const nombreCompleto = `${datosReserva.nombre || ''} ${datosReserva.apellido || ''}`.trim() || 'No especificado';
            
            // Ciudad o destino
            const ciudadDestino = datosReserva.ciudad || datosReserva.categoria || 'No especificado';
            
            // Lugar de encuentro
            const lugarEncuentro = datosReserva.lugar || datosReserva.mensaje || 'No especificado';
            
            // Construir el HTML del resumen
            const resumenHTML = `
                <h3>📋 Resumen de tu Reserva</h3>
                
                <div class="info-item">
                    <div class="emoji">🆔</div>
                    <div class="texto">
                        <strong>ID Reserva</strong>
                        <span>${datosReserva.id || 'Generado automáticamente'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">👤</div>
                    <div class="texto">
                        <strong>Cliente</strong>
                        <span>${nombreCompleto}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">📧</div>
                    <div class="texto">
                        <strong>Email</strong>
                        <span>${datosReserva.email || 'No especificado'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">📞</div>
                    <div class="texto">
                        <strong>Teléfono</strong>
                        <span>${datosReserva.telefono || 'No especificado'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">🌎</div>
                    <div class="texto">
                        <strong>País</strong>
                        <span>${datosReserva.pais || 'No especificado'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">📍</div>
                    <div class="texto">
                        <strong>Ciudad / Destino</strong>
                        <span>${ciudadDestino}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">✨</div>
                    <div class="texto">
                        <strong>Excursiones</strong>
                        <div class="excursiones-lista">${excursionesHTML}</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">📅</div>
                    <div class="texto">
                        <strong>Fecha de reserva</strong>
                        <span>${fechaFormateada}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">👥</div>
                    <div class="texto">
                        <strong>Cantidad de personas</strong>
                        <span>${datosReserva.personas || '1'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">${iconoPago}</div>
                    <div class="texto">
                        <strong>Forma de pago</strong>
                        <span>${datosReserva.formaPago || 'No especificada'}</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="emoji">🚐</div>
                    <div class="texto">
                        <strong>Punto de encuentro</strong>
                        <span>${lugarEncuentro}</span>
                    </div>
                </div>
            `;
            
            resumenDiv.innerHTML = resumenHTML;
            
            // Mostrar alerta si hubo error parcial
            if (statusParam === 'parcial' || statusParam === 'local') {
                const alertaDiv = document.createElement('div');
                alertaDiv.className = 'mensaje-alerta';
                alertaDiv.innerHTML = '⚠️ La reserva se guardó correctamente. En breve recibirás la confirmación.';
                resumenDiv.insertAdjacentElement('beforebegin', alertaDiv);
            }
            
        } else {
            // No hay datos: mostrar mensaje de error amigable
            resumenDiv.innerHTML = `
                <h3>📋 Tu Reserva</h3>
                <div class="info-item">
                    <div class="emoji">✅</div>
                    <div class="texto">
                        <span>Tu reserva ha sido registrada correctamente.</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="emoji">📞</div>
                    <div class="texto">
                        <span>En breve nos pondremos en contacto contigo.</span>
                    </div>
                </div>
                <div style="background:#fee; padding:12px; border-radius:10px; margin-top:15px; text-align:center;">
                    <span style="color:#c0392b;">⚠️ No pudimos recuperar los detalles de tu reserva. Te contactaremos por email o WhatsApp.</span>
                </div>
            `;
        }
        
        // Limpiar los datos después de 10 minutos
        setTimeout(() => {
            try {
                sessionStorage.removeItem('ultimaReserva');
                localStorage.removeItem('ultimaReserva');
            } catch(e) {}
        }, 600000);
        
        // Recargar si la página viene del bfcache del navegador
        window.addEventListener('pageshow', function(event) { 
            if (event.persisted) window.location.reload(); 
        });
    </script>
</body>
</html>
