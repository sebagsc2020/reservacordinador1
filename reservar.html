        input:read-only { background: #f8fafc; cursor: not-allowed; }
        select:disabled { opacity: 0.6; cursor: not-allowed; background: #f1f5f9; }
        .checkbox-excursiones { display: grid; gap: 12px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; padding: 12px 16px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
        .checkbox-item:hover { background: #f1f5f9; border-color: #667eea; transform: translateX(4px); }
        .checkbox-item.seleccionado { background: #eef2ff; border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.15); }
        .checkbox-item input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; accent-color: #667eea; }
        .checkbox-item label { margin: 0; cursor: pointer; flex: 1; font-weight: 500; color: #1e293b; }
        .seleccionados-contador { text-align: center; font-size: 13px; color: #667eea; margin-top: 12px; font-weight: 600; padding: 8px; background: #f1f5f9; border-radius: 40px; }
        .checkbox-privacidad { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 14px 18px; border-radius: 16px; margin: 24px 0 20px 0; border: 1px solid #e2e8f0; }
        .checkbox-privacidad input { width: 20px; height: 20px; cursor: pointer; accent-color: #667eea; }
        .checkbox-privacidad label { margin: 0; cursor: pointer; font-weight: 500; }
        .checkbox-privacidad a { color: #667eea; text-decoration: none; font-weight: 600; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 8px 25px rgba(39,174,96,0.3); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(39,174,96,0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status-message { padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 500; }
        .status-message.error { background: #fee; color: #c0392b; border-left: 4px solid #e74c3c; }
        .status-message.success { background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }

                    <option value="chile">📌 Chile</option>

            checkboxExcursiones.innerHTML = '';
            contadorSeleccionados.innerHTML = '<span class="sin-seleccion">✨ Selecciona al menos una excursión</span>';
            if (pais && excursionesData[pais]) {
                categoriaGroup.style.display = 'block';
                categoriaSelect.disabled = false;
                excursionGroup.style.display = 'none';
                const ciudades = Object.keys(excursionesData[pais]).sort((a, b) => {
                    const nombreA = a.replace(/^[^\w]+/, '');
                    const nombreB = b.replace(/^[^\w]+/, '');
                    return nombreA.localeCompare(nombreB);
                });
                ciudades.forEach(ciudad => {
                    const option = document.createElement('option');
                    option.value = ciudad;
                    option.textContent = ciudad;
                    categoriaSelect.appendChild(option);
                });
            } else {
                categoriaGroup.style.display = 'none';
                excursionGroup.style.display = 'none';
                categoriaSelect.disabled = true;
            }
        });

        categoriaSelect.addEventListener('change', function() {
            const pais = paisSelect.value;
            const ciudad = this.value;
            checkboxExcursiones.innerHTML = '';
            contadorSeleccionados.innerHTML = '<span class="sin-seleccion">✨ Selecciona al menos una excursión</span>';
            if (ciudad && pais && excursionesData[pais] && excursionesData[pais][ciudad]) {
                excursionGroup.style.display = 'block';
                const excursiones = excursionesData[pais][ciudad];
                excursiones.forEach((excursion, index) => {
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    const id = `exc_${Date.now()}_${index}`;
                    div.innerHTML = `<input type="checkbox" id="${id}" value="${excursion}"><label for="${id}">${excursion}</label>`;
                    const checkbox = div.querySelector('input');
                    checkbox.addEventListener('change', function() {
                        if (this.checked) div.classList.add('seleccionado');
                        else div.classList.remove('seleccionado');
                        actualizarContador();
                    });
                    div.addEventListener('click', (e) => {
                        if (e.target !== checkbox && e.target.tagName !== 'LABEL') {
                            checkbox.checked = !checkbox.checked;
                            checkbox.dispatchEvent(new Event('change'));
                        }
                    });
                    checkboxExcursiones.appendChild(div);
                });
            } else {
                excursionGroup.style.display = 'none';
            }
        });

        function actualizarContador() {
            const total = document.querySelectorAll('#checkboxExcursiones input:checked').length;
            if (total === 0) contadorSeleccionados.innerHTML = '<span class="sin-seleccion">✨ Selecciona al menos una excursión</span>';
            else if (total === 1) contadorSeleccionados.innerHTML = '✅ <strong>1 excursión seleccionada</strong>';
            else contadorSeleccionados.innerHTML = `✅ <strong>${total} excursiones seleccionadas</strong>`;
        }

        const form = document.getElementById('excursionForm');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            statusMessage.style.display = 'none';

            if (!document.getElementById('privacidad').checked) {
                statusMessage.textContent = '⚠️ Debes aceptar la política de privacidad';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }

            const excursionesSeleccionadas = Array.from(document.querySelectorAll('#checkboxExcursiones input:checked')).map(cb => cb.value);
            if (excursionesSeleccionadas.length === 0) {
                statusMessage.textContent = '⚠️ Debes seleccionar al menos una excursión';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }

            const formaPago = document.getElementById('formaPago').value;
            if (!formaPago) {
                statusMessage.textContent = '⚠️ Debes seleccionar una forma de pago';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }

            const formData = new URLSearchParams();
            formData.append('id', 'RES-' + Date.now());
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('apellido', document.getElementById('apellido').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('telefono', document.getElementById('telefono').value);
            formData.append('pais', paisSelect.options[paisSelect.selectedIndex].text);
            formData.append('ciudad', categoriaSelect.value);
            formData.append('excursiones', excursionesSeleccionadas.join('\n'));
            formData.append('fecha', document.getElementById('fecha').value);
            formData.append('personas', document.getElementById('personas').value);
            formData.append('formaPago', formaPago);
            formData.append('lugar', document.getElementById('mensaje').value || 'No especificado');

            console.log('📤 Enviando datos a:', GOOGLE_SCRIPT_URL);

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                localStorage.setItem('ultimaReserva', formData.toString());

                statusMessage.textContent = '✅ Reserva enviada correctamente. Serás redirigido...';
                statusMessage.className = 'status-message success';
                statusMessage.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'gracias.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                localStorage.setItem('ultimaReserva', formData.toString());

                statusMessage.textContent = '⚠️ Hubo un error, pero tu reserva fue registrada. Te contactaremos.';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'gracias.html?status=local';
                }, 2000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📩 Enviar Reserva';
            }
        });

        document.getElementById('linkPrivacidad').addEventListener('click', (e) => {
            e.preventDefault();
            alert("🔒 Política de Privacidad - La agencia recopila únicamente los datos necesarios para la prestación del servicio.\n\nLos datos no se venden ni se ceden comercialmente.\n\nDerechos: Acceder, Rectificar, Cancelar u Oponerse.");
        });
    </script>
</body>
</html>
