<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Excursiones - Aventura Total</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 40px 20px; }
        .form-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 40px 30px; text-align: center; }
        .form-header h1 { font-size: 32px; margin-bottom: 12px; }
        .form-header p { font-size: 16px; opacity: 0.85; }
        form { padding: 40px; }
        .form-row { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1a1a2e; font-size: 14px; }
        label.required::after { content: " *"; color: #e74c3c; }
        input, select { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 14px; transition: all 0.3s; background: white; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        input:read-only { background-color: #f8fafc; cursor: not-allowed; }
        select:disabled { opacity: 0.5; cursor: not-allowed; background-color: #f5f5f5; }
        .checkbox-excursiones { display: grid; gap: 12px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; padding: 12px 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
        .checkbox-item:hover { background: #f1f5f9; border-color: #667eea; transform: translateX(4px); }
        .checkbox-item.seleccionado { background: #eef2ff; border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.15); }
        .checkbox-item input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; accent-color: #667eea; }
        .checkbox-item label { margin: 0; cursor: pointer; flex: 1; font-weight: 500; color: #1e293b; }
        .seleccionados-contador { text-align: center; font-size: 13px; color: #667eea; margin-top: 12px; font-weight: 600; padding: 8px; background: #f1f5f9; border-radius: 40px; }
        .checkbox-privacidad { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 14px 18px; border-radius: 16px; margin: 20px 0; }
        .checkbox-privacidad input { width: 20px; height: 20px; cursor: pointer; }
        .checkbox-privacidad label { margin: 0; cursor: pointer; font-weight: 500; }
        .checkbox-privacidad a { color: #667eea; text-decoration: none; font-weight: 600; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(39,174,96,0.4); }
        .status-message { padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 500; }
        .status-message.error { background: #fee; color: #c0392b; border-left: 4px solid #e74c3c; }
        .categoria-group, .excursion-group { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        #preloader.oculto { opacity: 0; visibility: hidden; }
        .cronometro { width: 75px; height: 75px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid white; border-radius: 50%; animation: girar 1s linear infinite; margin: 0 auto 20px; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preloader-texto { color: white; font-size: 20px; font-weight: 700; text-align: center; }
        @media (max-width: 768px) { form { padding: 24px; } .form-header h1 { font-size: 24px; } body { padding: 20px; } }
    </style>
</head>
<body>
    <div id="preloader"><div class="preloader-content"><div class="cronometro"></div><div class="preloader-texto">CARGANDO<span class="puntos">...</span></div></div></div>

    <div class="form-container">
        <div class="form-header"><h1>🕐 Reserva tu Excursión</h1><p>Completa el formulario y obtén el mejor precio</p></div>

        <form id="excursionForm">
            <div class="form-row">
                <div class="form-group"><label for="nombre" class="required">Nombre</label><input type="text" id="nombre" required autocomplete="given-name"></div>
                <div class="form-group"><label for="apellido" class="required">Apellido</label><input type="text" id="apellido" required autocomplete="family-name"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label for="email" class="required">Email</label><input type="email" id="email" required autocomplete="email"></div>
                <div class="form-group"><label for="telefono" class="required">Teléfono</label><input type="tel" id="telefono" required autocomplete="tel"></div>
            </div>

            <div class="form-group"><label for="pais" class="required">País</label><select id="pais" required><option value="">Selecciona un país</option><option value="argentina">📌 Argentina</option><option value="brasil">📌 Brasil</option><option value="chile">📌 Chile</option></select></div>

            <div class="form-group categoria-group" id="categoriaGroup" style="display: none;"><label for="categoria" class="required">Ciudad</label><select id="categoria" disabled><option value="">Selecciona una ciudad</option></select></div>

            <div class="form-group excursion-group" id="excursionGroup" style="display: none;"><label class="required">Excursiones (selecciona una o varias)</label><div class="checkbox-excursiones" id="checkboxExcursiones"></div><div class="seleccionados-contador" id="contadorSeleccionados"><span class="sin-seleccion">Selecciona al menos una excursión</span></div></div>

            <input type="hidden" id="fecha" name="fecha">
            <div class="form-row">
                <div class="form-group"><label for="fecha_mostrar" class="required">Fecha de reserva</label><input type="text" id="fecha_mostrar" readonly></div>
                <div class="form-group"><label for="personas" class="required">Nº de personas</label><input type="number" id="personas" min="1" max="20" value="1" required></div>
            </div>

            <div class="form-group"><label for="formaPago" class="required">Forma de Pago</label><select id="formaPago" required><option value="">Selecciona una forma de pago</option><option value="Efectivo">💵 Efectivo</option><option value="Débito/Crédito">💳 Débito/Crédito</option><option value="Transferencia">🏦 Transferencia</option></select></div>

            <div class="form-group"><label for="mensaje">📍 ¿Dónde te buscamos?</label><input type="text" id="mensaje" placeholder="Hotel, dirección, etc."></div>

            <div class="checkbox-privacidad"><input type="checkbox" id="privacidad" required><label for="privacidad">He leído y acepto la <a href="#" id="linkPrivacidad">política de privacidad</a></label></div>

            <div id="statusMessage" class="status-message" style="display: none;"></div>
            <button type="submit" class="submit-btn" id="submitBtn">📩 Enviar Reserva</button>
        </form>
    </div>

    <script>
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('preloader').classList.add('oculto'); }, 1000); });

        function establecerFechaSistema() {
            const hoy = new Date();
            const año = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const dia = String(hoy.getDate()).padStart(2, '0');
            const fechaFormateada = `${dia}-${mes}-${año}`;
            document.getElementById('fecha').value = fechaFormateada;
            document.getElementById('fecha_mostrar').value = fechaFormateada;
        }
        establecerFechaSistema();

        const excursionesData = {
            argentina: {
                "🎭 Villa Carlos Paz": ["✔️ Aerosilla", "✔️ Capilla del Monte", "✔️ Circuito de la Cerveza", "✔️ City Tour Local", "✔️ Mina Clavero", "✔️ Noche de Teatros", "✔️ Paseo de Catamarán", "✔️ Pekos Multiparque"],
                "🏖️ Mar del Plata": ["✔️ Aquarium", "✔️ City Tour Histórico", "✔️ Puerto y Banquina", "✔️ Sierra de los Padres", "✔️ Fábricas de Alfajores", "✔️ Gruta de Lourdes", "✔️ Noche de Teatros", "✔️ Torre Tanque"],
                "🎿 Bariloche": ["✔️ Cerro Campanario", "✔️ Cerro Catedral", "✔️ Cerro Otto", "✔️ Circuito Chico", "✔️ Circuito Grande", "✔️ El Bolsón", "✔️ Isla Victoria", "✔️ Ruta del Chocolate"],
                "🍇 Mendoza": ["✔️ Alta Montaña", "✔️ Camino del Vino", "✔️ City Tour", "✔️ Fábricas de Chocolates", "✔️ Cerro Aconcagua", "✔️ San Rafael", "✔️ Termas de Cacheuta", "✔️ Valle de Uco"],
                "☃️ Ushuaia": ["✔️ Centros Invernales", "✔️ City Tour", "✔️ Estancia Harberton", "✔️ Lagos Fagnano", "✔️ Glaciar Martial", "✔️ Canal Beagle", "✔️ Parque Nacional", "✔️ Tren del Fin del Mundo"],
                "🚤 Cataratas del Iguazú": ["✔️ Ciudad del Este", "✔️ Duty Free", "✔️ Gran Aventura", "✔️ Hito Tres Fronteras", "✔️ Icebar", "✔️ Parque de las Aves", "✔️ Parque Nacional", "✔️ Ruinas San Ignacio"]
            },
            brasil: {
                "🏖️ Balneário Camboriú": ["✔️ Barco Pirata", "✔️ Bombinhas", "✔️ City Tour", "✔️ Oceanic Aquarium", "✔️ Cristo Luz", "✔️ Beto Carrero", "✔️ Parque Unipraias"],
                "🏖️ Florianópolis": ["✔️ Circuito Playas Norte", "✔️ City Tour", "✔️ Isla Anhatomirim", "✔️ Playas del Sur", "✔️ Ilha do Campeche"],
                "🏖️ Itapema": ["✔️ Beto Carrero", "✔️ Bombinhas", "✔️ Costa Esmeralda", "✔️ Porto Belo", "✔️ Ruta de los Alambiques"]
            },
            chile: {
                "⛰️ Santiago de Chile": ["✔️ City Tour", "✔️ Sky Costanera", "✔️ Viña del Mar", "✔️ Viñedos del Maipo", "✔️ Cajón del Maipo", "✔️ Cerro San Cristóbal", "✔️ Valle Nevado"]
            }
        };

        const paisSelect = document.getElementById('pais');
        const categoriaSelect = document.getElementById('categoria');
        const categoriaGroup = document.getElementById('categoriaGroup');
        const excursionGroup = document.getElementById('excursionGroup');
        const checkboxExcursiones = document.getElementById('checkboxExcursiones');
        const contadorSeleccionados = document.getElementById('contadorSeleccionados');

        paisSelect.addEventListener('change', function() {
            const pais = this.value;
            categoriaSelect.innerHTML = '<option value="">Selecciona una ciudad</option>';
            checkboxExcursiones.innerHTML = '';
            contadorSeleccionados.innerHTML = '<span class="sin-seleccion">Selecciona al menos una excursión</span>';
            if (pais) {
                categoriaGroup.style.display = 'block';
                categoriaSelect.disabled = false;
                excursionGroup.style.display = 'none';
                Object.keys(excursionesData[pais]).forEach(ciudad => {
                    const option = document.createElement('option');
                    option.value = ciudad;
                    option.textContent = ciudad;
                    categoriaSelect.appendChild(option);
                });
            } else {
                categoriaGroup.style.display = 'none';
                excursionGroup.style.display = 'none';
                categoriaSelect.disabled = true;
            }
        });

        categoriaSelect.addEventListener('change', function() {
            const pais = paisSelect.value;
            const ciudad = this.value;
            checkboxExcursiones.innerHTML = '';
            contadorSeleccionados.innerHTML = '<span class="sin-seleccion">Selecciona al menos una excursión</span>';
            if (ciudad && pais) {
                excursionGroup.style.display = 'block';
                const excursiones = excursionesData[pais][ciudad];
                excursiones.forEach((excursion, index) => {
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    const id = `exc_${Date.now()}_${index}`;
                    div.innerHTML = `<input type="checkbox" id="${id}" value="${excursion}"><label for="${id}">${excursion}</label>`;
                    const checkbox = div.querySelector('input');
                    checkbox.addEventListener('change', function() {
                        if (this.checked) div.classList.add('seleccionado');
                        else div.classList.remove('seleccionado');
                        actualizarContador();
                    });
                    div.addEventListener('click', (e) => {
                        if (e.target !== checkbox && e.target.tagName !== 'LABEL') {
                            checkbox.checked = !checkbox.checked;
                            checkbox.dispatchEvent(new Event('change'));
                        }
                    });
                    checkboxExcursiones.appendChild(div);
                });
            } else {
                excursionGroup.style.display = 'none';
            }
        });

        function actualizarContador() {
            const total = document.querySelectorAll('#checkboxExcursiones input:checked').length;
            if (total === 0) contadorSeleccionados.innerHTML = '<span class="sin-seleccion">Selecciona al menos una excursión</span>';
            else if (total === 1) contadorSeleccionados.innerHTML = '✅ <strong>1 excursión seleccionada</strong>';
            else contadorSeleccionados.innerHTML = `✅ <strong>${total} excursiones seleccionadas</strong>`;
        }

        // 🔥 URL DE GOOGLE APPS SCRIPT (actualizada)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHVLm3FqVZpAOKPh7DW2mbaAWP2W_woI-9-1q7mjlcnEvqLEDccoPVyHBEBJwWNeaICQ/exec';
        
        const form = document.getElementById('excursionForm');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            statusMessage.style.display = 'none';
            
            if (!document.getElementById('privacidad').checked) {
                statusMessage.textContent = '⚠️ Debes aceptar la política de privacidad';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }
            
            const excursionesSeleccionadas = Array.from(document.querySelectorAll('#checkboxExcursiones input:checked')).map(cb => cb.value);
            if (excursionesSeleccionadas.length === 0) {
                statusMessage.textContent = '⚠️ Debes seleccionar al menos una excursión';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }
            
            const formaPago = document.getElementById('formaPago').value;
            if (!formaPago) {
                statusMessage.textContent = '⚠️ Debes seleccionar una forma de pago';
                statusMessage.className = 'status-message error';
                statusMessage.style.display = 'block';
                return;
            }
            
            // Las excursiones se envían separadas por " | "
            const formData = {
                id: 'RES-' + Date.now(),
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                pais: paisSelect.options[paisSelect.selectedIndex].text,
                ciudad: categoriaSelect.value,
                excursiones: excursionesSeleccionadas.join(' | '),
                fecha: document.getElementById('fecha').value,
                personas: document.getElementById('personas').value,
                formaPago: formaPago,
                lugar: document.getElementById('mensaje').value || 'No especificado'
            };
            
            console.log('📤 Enviando datos:', formData);
            
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';
            
            try {
                // 🔥 CAMBIO CLAVE: enviar como form-urlencoded en lugar de JSON
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData)
                });
                
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                window.location.href = 'gracias.html';
            } catch (error) {
                console.error('Error:', error);
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                window.location.href = 'gracias.html?status=local';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📩 Enviar Reserva';
            }
        });
        
        document.getElementById('linkPrivacidad').addEventListener('click', (e) => {
            e.preventDefault();
            alert("🔒 La agencia recopila únicamente los datos estrictamente necesarios para la prestación del servicio.\n\n📋 Uso: Gestión de reservas, coordinación logística, notificaciones.\n\n🔐 Los datos no se venden ni se ceden comercialmente.");
        });
    </script>
</body>
</html>
