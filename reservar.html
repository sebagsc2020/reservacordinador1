<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🕐 Reserva tu Excursión | Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 40px 20px; }
        .form-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 40px 30px; text-align: center; }
        .form-header h1 { font-size: 32px; margin-bottom: 12px; }
        .form-header p { font-size: 16px; opacity: 0.85; }
        form { padding: 40px; }
        .form-row { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1a1a2e; font-size: 14px; }
        label span { color: #e74c3c; margin-left: 3px; }
        input, select { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 14px; transition: all 0.3s; background: white; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        .checkbox-group { display: grid; gap: 12px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; padding: 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
        .checkbox-item:hover { background: #f1f5f9; border-color: #667eea; }
        .checkbox-item.seleccionado { background: #eef2ff; border-color: #667eea; }
        .checkbox-item input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; accent-color: #667eea; }
        .checkbox-item label { margin: 0; cursor: pointer; flex: 1; font-weight: 500; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(39,174,96,0.4); }
        .error-message { background: #fee; color: #c0392b; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; border-left: 4px solid #e74c3c; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; border-left: 4px solid #27ae60; }
        .checkbox-privacidad { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 14px 18px; border-radius: 16px; margin: 20px 0; }
        .checkbox-privacidad input { width: 20px; height: 20px; cursor: pointer; }
        .checkbox-privacidad label { margin: 0; cursor: pointer; font-weight: 500; }
        .checkbox-privacidad a { color: #667eea; text-decoration: none; font-weight: 600; }
        .checkbox-privacidad a:hover { text-decoration: underline; }
        .titulo-seccion { font-weight: 700; color: #1a1a2e; font-size: 14px; margin-bottom: 12px; display: block; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        #preloader.oculto { opacity: 0; visibility: hidden; }
        .cronometro { width: 75px; height: 75px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid white; border-radius: 50%; animation: girar 1s linear infinite; margin: 0 auto 20px; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preloader-texto { color: white; font-size: 20px; font-weight: 700; text-align: center; }
        @media (max-width: 768px) { form { padding: 24px; } .form-header h1 { font-size: 24px; } body { padding: 20px; } }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <div class="cronometro"></div>
            <div class="preloader-texto">CARGANDO<span class="puntos">...</span></div>
        </div>
    </div>

    <div class="form-container">
        <div class="form-header">
            <h1>🕐 Reserva tu Excursión</h1>
            <p>Completa el formulario y obtén el mejor precio</p>
        </div>

        <form id="excursionForm">
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message">✅ ¡Reserva enviada con éxito! Redirigiendo...</div>

            <!-- Datos personales -->
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre <span>*</span></label>
                    <input type="text" id="nombre" name="nombre" required autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido <span>*</span></label>
                    <input type="text" id="apellido" name="apellido" required autocomplete="family-name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email <span>*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono <span>*</span></label>
                    <input type="tel" id="telefono" name="telefono" required autocomplete="tel">
                </div>
            </div>

            <!-- País y Ciudad (CASCADA) -->
            <div class="form-row">
                <div class="form-group">
                    <label for="pais">País <span>*</span></label>
                    <select id="pais" name="pais" required>
                        <option value="">Selecciona un país</option>
                        <option value="argentina">📌 Argentina</option>
                        <option value="brasil">📌 Brasil</option>
                        <option value="chile">📌 Chile</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ciudad">Ciudad <span>*</span></label>
                    <select id="ciudad" name="ciudad" required disabled>
                        <option value="">Primero selecciona un país</option>
                    </select>
                </div>
            </div>

            <!-- Excursiones (dinámicas según ciudad) -->
            <div class="form-group" id="excursionesContainer" style="display: none;">
                <div class="titulo-seccion">Excursiones disponibles <span>*</span></div>
                <div class="checkbox-group" id="excursionesGroup"></div>
            </div>

            <!-- Fecha y personas -->
            <div class="form-row">
                <div class="form-group">
                    <label for="fecha">Fecha deseada <span>*</span></label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                <div class="form-group">
                    <label for="personas">Nº de personas <span>*</span></label>
                    <input type="number" id="personas" name="personas" min="1" max="20" value="1" required>
                </div>
            </div>

            <!-- Forma de pago y lugar -->
            <div class="form-row">
                <div class="form-group">
                    <label for="formaPago">Forma de pago <span>*</span></label>
                    <select id="formaPago" name="formaPago" required>
                        <option value="">Selecciona una forma de pago</option>
                        <option value="💵 Efectivo">💵 Efectivo</option>
                        <option value="💳 Débito/Crédito">💳 Débito/Crédito</option>
                        <option value="🏦 Transferencia">🏦 Transferencia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="lugar">📍 Lugar de recogida (hotel, dirección)</label>
                    <input type="text" id="lugar" name="lugar" placeholder="Ej: Hotel XYZ, calle...">
                </div>
            </div>

            <!-- Privacidad -->
            <div class="checkbox-privacidad">
                <input type="checkbox" id="privacidad" name="privacidad" required>
                <label for="privacidad">He leído y acepto la <a href="#" id="linkPrivacidad">política de privacidad</a></label>
            </div>

            <button type="submit" class="submit-btn">📩 Enviar Reserva</button>
        </form>
    </div>

    <script>
        // ========== DATOS DE EXCURSIONES POR PAÍS Y CIUDAD ==========
        const excursionesData = {
            argentina: {
                "Buenos Aires": ["🏛️ City Tour Buenos Aires", "🎭 Teatro Colón", "🌸 Jardín Japonés", "⚽ Estadio River Plate"],
                "Bariloche": ["🏔️ Cerro Campanario", "🚠 Cerro Otto", "🌲 Circuito Chico", "🍫 Ruta del Chocolate"],
                "Mendoza": ["🍷 Camino del Vino", "🏔️ Cerro Aconcagua", "🌄 Valle de Uco", "♨️ Termas de Cacheuta"],
                "Cataratas": ["🌊 Garganta del Diablo", "🚤 Gran Aventura", "🦜 Parque de las Aves", "🇧🇷 Lado Brasileño"]
            },
            brasil: {
                "Balneário Camboriú": ["🏖️ Praia Central", "🚡 Parque Unipraias", "🎢 Beto Carrero", "⛰️ Cristo Luz"],
                "Florianópolis": ["🏝️ Praia Mole", "🏯 Lagoa da Conceição", "🌉 Ponte Hercílio Luz", "🏄 Jurere Internacional"],
                "Rio de Janeiro": ["🗿 Cristo Redentor", "🏔️ Pão de Açúcar", "🏖️ Copacabana", "🎭 Escadaria Selarón"]
            },
            chile: {
                "Santiago": ["🏛️ Plaza de Armas", "🏔️ Cerro San Cristóbal", "🍷 Viña Cousiño Macul", "🛍️ Costanera Center"],
                "Valparaíso": ["🎨 Cerros Alegres", "🏛️ Plaza Sotomayor", "🚠 Ascensores", "🏖️ Viña del Mar"],
                "San Pedro": ["🌋 Valle de la Luna", "🏔️ Geysers del Tatio", "🌌 Laguna Cejar", "🏜️ Piedras Rojas"]
            }
        };

        // ========== ELEMENTOS DOM ==========
        const paisSelect = document.getElementById('pais');
        const ciudadSelect = document.getElementById('ciudad');
        const excursionesContainer = document.getElementById('excursionesContainer');
        const excursionesGroup = document.getElementById('excursionesGroup');

        // ========== CASCADA: PAÍS → CIUDAD ==========
        paisSelect.addEventListener('change', function() {
            const pais = this.value;
            
            // Resetear ciudad y excursiones
            ciudadSelect.innerHTML = '<option value="">Primero selecciona un país</option>';
            ciudadSelect.disabled = true;
            excursionesContainer.style.display = 'none';
            excursionesGroup.innerHTML = '';
            
            if (!pais) return;
            
            // Obtener ciudades del país seleccionado
            const ciudades = Object.keys(excursionesData[pais] || {});
            if (ciudades.length === 0) return;
            
            ciudadSelect.disabled = false;
            ciudades.forEach(ciudad => {
                const option = document.createElement('option');
                option.value = ciudad;
                option.textContent = ciudad;
                ciudadSelect.appendChild(option);
            });
        });

        // ========== CASCADA: CIUDAD → EXCURSIONES ==========
        ciudadSelect.addEventListener('change', function() {
            const pais = paisSelect.value;
            const ciudad = this.value;
            
            excursionesGroup.innerHTML = '';
            excursionesContainer.style.display = 'none';
            
            if (!pais || !ciudad) return;
            
            const excursiones = excursionesData[pais]?.[ciudad];
            if (!excursiones || excursiones.length === 0) return;
            
            // Mostrar container y crear checkboxes
            excursionesContainer.style.display = 'block';
            
            excursiones.forEach((excursion, index) => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                const id = `excursion_${Date.now()}_${index}`;
                div.innerHTML = `
                    <input type="checkbox" id="${id}" value="${excursion}">
                    <label for="${id}">${excursion}</label>
                `;
                
                const checkbox = div.querySelector('input');
                checkbox.addEventListener('change', function() {
                    if (this.checked) div.classList.add('seleccionado');
                    else div.classList.remove('seleccionado');
                });
                
                div.addEventListener('click', (e) => {
                    if (e.target !== checkbox && e.target.tagName !== 'LABEL') {
                        checkbox.checked = !checkbox.checked;
                        checkbox.dispatchEvent(new Event('change'));
                    }
                });
                
                excursionesGroup.appendChild(div);
            });
        });

        // ========== RESTO DE LA LÓGICA (PRELOADER, ENVÍO, ETC) ==========
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('preloader').classList.add('oculto'); }, 1000); });
        document.getElementById('fecha').min = new Date().toISOString().split('T')[0];

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDfnWspKv8KY8iQWip20iUUn6c9LHZvAlpKL3WaIaz74EAHbjrcWhxMC3OVGx1yv_w_A/exec';

        document.getElementById('excursionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validaciones
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const pais = document.getElementById('pais').value;
            const ciudad = document.getElementById('ciudad').value;
            const fecha = document.getElementById('fecha').value;
            const personas = document.getElementById('personas').value;
            const formaPago = document.getElementById('formaPago').value;
            
            if (!nombre || !apellido || !email || !telefono || !pais || !ciudad || !fecha || !personas || !formaPago) {
                errorDiv.textContent = '❌ Por favor, completá todos los campos obligatorios.';
                errorDiv.style.display = 'block';
                return;
            }
            
            const excursionesSeleccionadas = Array.from(document.querySelectorAll('#excursionesGroup input:checked')).map(cb => cb.value);
            if (excursionesSeleccionadas.length === 0) {
                errorDiv.textContent = '❌ Por favor, selecciona al menos una excursión.';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!document.getElementById('privacidad').checked) {
                errorDiv.textContent = '❌ Debes aceptar la política de privacidad.';
                errorDiv.style.display = 'block';
                return;
            }
            
            const formData = {
                id: 'RES-' + Date.now(),
                nombre, apellido, email, telefono, pais, ciudad,
                excursiones: excursionesSeleccionadas.join(', '),
                fecha, personas, formaPago,
                lugar: document.getElementById('lugar').value.trim() || 'No especificado'
            };
            
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData)
                });
                
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                successDiv.style.display = 'block';
                setTimeout(() => { window.location.href = 'gracias.html'; }, 2000);
            } catch (err) {
                console.error(err);
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                errorDiv.innerHTML = '⚠️ Error de conexión, pero tu reserva se guardó localmente.';
                errorDiv.style.display = 'block';
                setTimeout(() => { window.location.href = 'gracias.html?status=local'; }, 2500);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📩 Enviar Reserva';
            }
        });
        
        document.getElementById('linkPrivacidad').addEventListener('click', (e) => {
            e.preventDefault();
            alert("🔒 La agencia recopila únicamente los datos estrictamente necesarios para la prestación del servicio.\n\n📋 Uso: Gestión de reservas, coordinación logística, notificaciones.\n\n🔐 Los datos no se venden ni se ceden comercialmente.\n\n✅ Derechos: Acceder, Rectificar, Cancelar u Oponerse al uso de sus datos.");
        });
    </script>
</body>
</html>
