<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕐 Reserva tu Excursión | Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 40px 20px; }
        .form-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 40px 30px; text-align: center; }
        .form-header h1 { font-size: 32px; margin-bottom: 12px; }
        form { padding: 40px; }
        .form-row { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1a1a2e; font-size: 14px; }
        label.required::after { content: " *"; color: #e74c3c; }
        input, select { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 14px; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        .checkbox-group { display: grid; gap: 12px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; padding: 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; cursor: pointer; }
        .checkbox-item.seleccionado { background: #eef2ff; border-color: #667eea; }
        .checkbox-item input { width: 20px; margin-right: 12px; }
        .checkbox-item label { margin: 0; cursor: pointer; flex: 1; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(39,174,96,0.4); }
        .error-message { background: #fee; color: #c0392b; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        #preloader.oculto { opacity: 0; visibility: hidden; }
        .cronometro { width: 75px; height: 75px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid white; border-radius: 50%; animation: girar 1s linear infinite; margin-bottom: 20px; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preloader-texto { color: white; font-size: 20px; font-weight: 700; }
        @media (max-width: 768px) { form { padding: 24px; } .form-header h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div id="preloader"><div class="preloader-content"><div class="cronometro"></div><div class="preloader-texto">CARGANDO<span class="puntos">...</span></div></div></div>

    <div class="form-container">
        <div class="form-header"><h1>🕐 Reserva tu Excursión</h1><p>Completa el formulario y obtén el mejor precio</p></div>
        <form id="excursionForm">
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message">✅ ¡Reserva enviada con éxito!</div>
            
            <div class="form-row">
                <div class="form-group"><label class="required">Nombre</label><input type="text" id="nombre" required autocomplete="given-name"></div>
                <div class="form-group"><label class="required">Apellido</label><input type="text" id="apellido" required autocomplete="family-name"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="required">Email</label><input type="email" id="email" required autocomplete="email"></div>
                <div class="form-group"><label class="required">Teléfono</label><input type="tel" id="telefono" required autocomplete="tel"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="required">País</label><select id="pais" required><option value="">Selecciona</option><option value="Argentina">📌 Argentina</option><option value="Brasil">📌 Brasil</option><option value="Chile">📌 Chile</option></select></div>
                <div class="form-group"><label class="required">Ciudad</label><input type="text" id="ciudad" required autocomplete="address-level2"></div>
            </div>
            
            <div class="form-group"><label class="required">Excursiones</label><div class="checkbox-group" id="excursionesGroup">
                <div class="checkbox-item" data-val="Trekking Cerro"><input type="checkbox" id="exc1"><label for="exc1">🥾 Trekking Cerro</label></div>
                <div class="checkbox-item" data-val="Rafting"><input type="checkbox" id="exc2"><label for="exc2">🛶 Rafting</label></div>
                <div class="checkbox-item" data-val="Cabalgata"><input type="checkbox" id="exc3"><label for="exc3">🐎 Cabalgata</label></div>
                <div class="checkbox-item" data-val="Avistaje de Aves"><input type="checkbox" id="exc4"><label for="exc4">🦜 Avistaje de Aves</label></div>
                <div class="checkbox-item" data-val="Circuito de Playas del Norte"><input type="checkbox" id="exc5"><label for="exc5">🏖️ Circuito de Playas del Norte</label></div>
            </div></div>
            
            <div class="form-row">
                <div class="form-group"><label class="required">Fecha</label><input type="date" id="fecha" required></div>
                <div class="form-group"><label class="required">Personas</label><input type="number" id="personas" min="1" max="20" value="1" required></div>
            </div>
            
            <div class="form-row">
                <div class="form-group"><label class="required">Forma de Pago</label>
                    <select id="formaPago" required>
                        <option value="">Selecciona</option>
                        <option value="💵 Efectivo">💵 Efectivo</option>
                        <option value="💳 Débito/Crédito">💳 Débito/Crédito</option>
                        <option value="🏦 Transferencia">🏦 Transferencia</option>
                    </select>
                </div>
                <div class="form-group"><label>Lugar de recogida</label><input type="text" id="lugar" placeholder="Hotel, dirección, etc."></div>
            </div>
            
            <div class="checkbox-privacidad" style="display: flex; gap: 10px; margin: 20px 0;"><input type="checkbox" id="privacidad" required><label>Acepto la <a href="#" id="linkPrivacidad">política de privacidad</a></label></div>
            <button type="submit" class="submit-btn">📩 Enviar Reserva</button>
        </form>
    </div>

    <script>
        // Configuración
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDfnWspKv8KY8iQWip20iUUn6c9LHZvAlpKL3WaIaz74EAHbjrcWhxMC3OVGx1yv_w_A/exec';
        
        // Preloader
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('preloader').classList.add('oculto'); }, 1000); });
        
        // Checkboxes
        document.querySelectorAll('.checkbox-item').forEach(item => {
            const checkbox = item.querySelector('input');
            checkbox.addEventListener('change', () => { if (checkbox.checked) item.classList.add('seleccionado'); else item.classList.remove('seleccionado'); });
            item.addEventListener('click', (e) => { if (e.target !== checkbox) { checkbox.checked = !checkbox.checked; checkbox.dispatchEvent(new Event('change')); } });
        });
        
        // Envío del formulario
        document.getElementById('excursionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMsg'), successDiv = document.getElementById('successMsg');
            errorDiv.style.display = 'none'; successDiv.style.display = 'none';
            
            // Validar excursiones
            const excursiones = Array.from(document.querySelectorAll('#excursionesGroup input:checked')).map(cb => cb.parentElement.dataset.val);
            if (excursiones.length === 0) { errorDiv.textContent = '❌ Selecciona al menos una excursión'; errorDiv.style.display = 'block'; return; }
            
            // Validar privacidad
            if (!document.getElementById('privacidad').checked) { errorDiv.textContent = '❌ Acepta la política de privacidad'; errorDiv.style.display = 'block'; return; }
            
            // Validar forma de pago
            const formaPago = document.getElementById('formaPago').value;
            if (!formaPago) { errorDiv.textContent = '❌ Selecciona una forma de pago'; errorDiv.style.display = 'block'; return; }
            
            // Construir datos
            const formData = {
                id: 'RES-' + Date.now(),
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                pais: document.getElementById('pais').value,
                ciudad: document.getElementById('ciudad').value,
                excursiones: excursiones.join(', '),
                fecha: document.getElementById('fecha').value,
                personas: document.getElementById('personas').value,
                formaPago: formaPago,           // ← IMPORTANTE: se envía correctamente
                lugar: document.getElementById('lugar').value || 'No especificado'  // ← IMPORTANTE
            };
            
            console.log('Enviando datos:', formData);
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData)
                });
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                successDiv.style.display = 'block';
                setTimeout(() => { window.location.href = 'gracias.html'; }, 2000);
            } catch(err) {
                console.error('Error:', err);
                localStorage.setItem('ultimaReserva', JSON.stringify(formData));
                errorDiv.textContent = '❌ Error de conexión, pero tu reserva se guardó localmente';
                errorDiv.style.display = 'block';
                setTimeout(() => { window.location.href = 'gracias.html?status=local'; }, 2000);
            }
        });
        
        // Fecha mínima
        document.getElementById('fecha').min = new Date().toISOString().split('T')[0];
        
        // Modal de privacidad (simple)
        document.getElementById('linkPrivacidad').addEventListener('click', (e) => {
            e.preventDefault();
            alert("La agencia recopila únicamente los datos necesarios para la prestación del servicio. Los datos no se venden ni se ceden comercialmente.");
        });
    </script>
</body>
</html>
