<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aventura Total | Clima en Destinos</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Estilos globales - Perfil Gris Profesional -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para la página de clima */
        .clima-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .ciudad-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .ciudad-card:hover {
            transform: translateY(-4px);
            border-color: #cbd5e1;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.12);
        }
        
        .ciudad-nombre {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        
        .ciudad-nombre i {
            color: #6b7280;
            margin-right: 0.5rem;
            font-size: 1rem;
        }
        
        .clima-icono {
            font-size: 3.5rem;
            margin: 0.5rem 0;
        }
        
        .temperatura {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            margin: 0.5rem 0;
        }
        
        .descripcion {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-transform: capitalize;
        }
        
        .detalle-clima {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }
        
        .detalle-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #4b5563;
        }
        
        .detalle-item i {
            color: #9ca3af;
            width: 1rem;
        }
        
        .buscar-ciudad {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        
        .buscar-ciudad .filter-input {
            flex: 2;
            min-width: 200px;
        }
        
        .error-clima {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 60px;
            color: #6b7280;
        }
        
        .btn-eliminar {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            transition: color 0.2s;
        }
        
        .btn-eliminar:hover {
            color: #dc2626;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR - Perfil Gris Profesional -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🏔️</div>
            <h2>Aventura <span>Total</span></h2>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
            <li><a href="clientes.html"><i class="fas fa-users"></i> <span>Clientes</span></a></li>
            <li><a href="reservas.html"><i class="fas fa-calendar-check"></i> <span>Reservas</span></a></li>
            <li><a href="seguimiento.html"><i class="fas fa-chart-simple"></i> <span>Seguimiento</span></a></li>
            <li><a href="emails.html"><i class="fab fa-whatsapp"></i> <span>WhatsApp</span></a></li>
            <li><a href="calendario.html"><i class="fas fa-calendar-alt"></i> <span>Calendario</span></a></li>
            <li><a href="clima.html" class="active"><i class="fas fa-cloud-sun"></i> <span>Clima</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout-sidebar" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="header">
            <h1><i class="fas fa-cloud-sun"></i> Clima en Destinos</h1>
            <div class="user-info">
                <div class="user-avatar">AT</div>
                <span>Administrador</span>
            </div>
        </div>

        <!-- Barra de búsqueda y acciones -->
        <div class="buscar-ciudad">
            <input type="text" id="nuevaCiudad" class="filter-input" placeholder="Agregar una ciudad... (ej: Bariloche, Salta, Mendoza)">
            <button class="btn-filtrar" onclick="agregarCiudad()"><i class="fas fa-plus"></i> Agregar ciudad</button>
            <button class="btn-recargar" onclick="cargarTodasLasCiudades()"><i class="fas fa-sync-alt"></i> Actualizar todo</button>
        </div>

        <!-- Contenedor de tarjetas de clima -->
        <div id="climaContainer" class="clima-container">
            <div class="empty-state">
                <i class="fas fa-spinner fa-pulse"></i> Cargando información del clima...
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN - CLIMA
        // Nota: Necesitas una API key de OpenWeatherMap
        // Regístrate gratis en: https://openweathermap.org/api
        // ============================================
        
        // ⚠️ IMPORTANTE: Reemplaza esta clave con tu propia API key de OpenWeatherMap
        // Puedes obtener una gratis registrándote en https://openweathermap.org/api
        const API_KEY = '197785aae380500a205cc2c00e970af9';  // <-- REEMPLAZA ESTO CON TU API KEY
        
        // Lista de ciudades por defecto (destinos turísticos de Argentina)
        let ciudades = ["Bariloche", "Salta", "Mendoza", "El Calafate", "Puerto Iguazú", "Ushuaia", "Córdoba", "Mar del Plata"];
        
        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================
        
        function logout() { 
            sessionStorage.clear(); 
            alert("Sesión cerrada");
            // window.location.href = 'index.html'; 
        }
        
        // Cargar clima de una ciudad individual
        async function cargarClima(ciudad) {
            // Verificar si hay API key configurada
            if (API_KEY === '197785aae380500a205cc2c00e970af9') {
                return {
                    nombre: ciudad,
                    temp: "?",
                    desc: "API key no configurada",
                    icono: "",
                    error: true,
                    humedad: "?",
                    viento: "?"
                };
            }
            
            try {
                // Primero obtener coordenadas de la ciudad
                const geoUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(ciudad)},AR&limit=1&appid=${API_KEY}`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();
                
                if (!geoData || geoData.length === 0) {
                    throw new Error('Ciudad no encontrada');
                }
                
                const lat = geoData[0].lat;
                const lon = geoData[0].lon;
                const nombreReal = geoData[0].name;
                
                // Obtener clima actual
                const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=es`;
                const weatherRes = await fetch(weatherUrl);
                const weatherData = await weatherRes.json();
                
                return {
                    nombre: nombreReal,
                    temp: Math.round(weatherData.main.temp),
                    desc: weatherData.weather[0].description,
                    icono: weatherData.weather[0].icon,
                    error: false,
                    humedad: weatherData.main.humidity,
                    viento: Math.round(weatherData.wind.speed)
                };
            } catch (error) {
                console.error(`Error al cargar clima de ${ciudad}:`, error);
                return {
                    nombre: ciudad,
                    temp: "?",
                    desc: "No disponible",
                    icono: "",
                    error: true,
                    humedad: "?",
                    viento: "?"
                };
            }
        }
        
        // Cargar todas las ciudades guardadas
        async function cargarTodasLasCiudades() {
            const container = document.getElementById('climaContainer');
            if (!container) return;
            
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Actualizando clima...</div>';
            
            const resultados = [];
            for (const ciudad of ciudades) {
                const clima = await cargarClima(ciudad);
                resultados.push(clima);
                // Pequeña pausa para no saturar la API
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            renderizarClima(resultados);
            
            // Guardar lista de ciudades en localStorage para persistencia
            localStorage.setItem('climaCiudades', JSON.stringify(ciudades));
        }
        
        // Renderizar las tarjetas de clima
        function renderizarClima(ciudadesClima) {
            const container = document.getElementById('climaContainer');
            if (!container) return;
            
            if (!ciudadesClima || ciudadesClima.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> No hay ciudades agregadas</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < ciudadesClima.length; i++) {
                const c = ciudadesClima[i];
                const ciudadOriginal = ciudades[i];
                
                // Elegir icono según la descripción o usar el de OpenWeatherMap
                let iconoHtml = '';
                if (c.icono && !c.error) {
                    iconoHtml = `<img src="https://openweathermap.org/img/wn/${c.icono}@2x.png" alt="clima" style="width: 70px;">`;
                } else {
                    // Iconos por defecto según la temperatura o descripción
                    let defaultIcon = 'fa-cloud-sun';
                    if (c.temp && c.temp > 25) defaultIcon = 'fa-sun';
                    else if (c.temp && c.temp < 10) defaultIcon = 'fa-snowflake';
                    else if (c.desc && c.desc.toLowerCase().includes('lluvia')) defaultIcon = 'fa-cloud-rain';
                    iconoHtml = `<i class="fas ${defaultIcon}" style="font-size: 3rem; color: #6b7280;"></i>`;
                }
                
                html += `
                    <div class="ciudad-card">
                        <div class="ciudad-nombre">
                            <i class="fas fa-map-marker-alt"></i> ${escapeHtml(c.nombre)}
                        </div>
                        <div class="clima-icono">
                            ${iconoHtml}
                        </div>
                        <div class="temperatura">
                            ${c.temp !== '?' ? c.temp + '°C' : '?°C'}
                        </div>
                        <div class="descripcion">
                            ${escapeHtml(c.desc)}
                        </div>
                        <div class="detalle-clima">
                            <div class="detalle-item">
                                <i class="fas fa-tint"></i>
                                <span>${c.humedad !== '?' ? c.humedad + '%' : '?%'}</span>
                            </div>
                            <div class="detalle-item">
                                <i class="fas fa-wind"></i>
                                <span>${c.viento !== '?' ? c.viento + ' km/h' : '? km/h'}</span>
                            </div>
                        </div>
                        <button class="btn-eliminar" onclick="eliminarCiudad('${escapeHtml(ciudadOriginal)}')">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // Agregar una nueva ciudad
        async function agregarCiudad() {
            const input = document.getElementById('nuevaCiudad');
            const ciudad = input.value.trim();
            
            if (!ciudad) {
                alert('Por favor, ingresa el nombre de una ciudad');
                return;
            }
            
            // Normalizar nombre (primera letra mayúscula, resto minúsculas)
            const ciudadNormalizada = ciudad.charAt(0).toUpperCase() + ciudad.slice(1).toLowerCase();
            
            if (ciudades.includes(ciudadNormalizada)) {
                alert(`La ciudad "${ciudadNormalizada}" ya está en la lista`);
                return;
            }
            
            // Verificar que la ciudad existe (cargar clima de prueba)
            const prueba = await cargarClima(ciudadNormalizada);
            if (prueba.error && prueba.desc === "No disponible") {
                alert(`No se pudo encontrar la ciudad "${ciudadNormalizada}". Verifica el nombre.`);
                return;
            }
            
            ciudades.push(ciudadNormalizada);
            input.value = '';
            await cargarTodasLasCiudades();
        }
        
        // Eliminar una ciudad de la lista
        function eliminarCiudad(ciudad) {
            if (confirm(`¿Eliminar "${ciudad}" de la lista de ciudades?`)) {
                ciudades = ciudades.filter(c => c !== ciudad);
                cargarTodasLasCiudades();
            }
        }
        
        // Helper: escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        // Cargar ciudades guardadas en localStorage
        const ciudadesGuardadas = localStorage.getItem('climaCiudades');
        if (ciudadesGuardadas) {
            try {
                const parsed = JSON.parse(ciudadesGuardadas);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    ciudades = parsed;
                }
            } catch(e) {}
        }
        
        // Iniciar carga del clima
        cargarTodasLasCiudades();
        
        // Actualizar clima cada 10 minutos (600000 ms)
        setInterval(cargarTodasLasCiudades, 600000);
        
        // Mensaje de advertencia si no hay API key configurada
        if (API_KEY === '197785aae380500a205cc2c00e970af9') {
            setTimeout(() => {
                const container = document.getElementById('climaContainer');
                if (container && !container.innerHTML.includes('API key')) {
                    const warning = document.createElement('div');
                    warning.className = 'empty-state';
                    warning.style.color = '#b45309';
                    warning.style.background = '#fffbeb';
                    warning.style.borderRadius = '16px';
                    warning.style.padding = '1rem';
                    warning.style.marginTop = '1rem';
                    warning.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Necesitas una API key de OpenWeatherMap. Regístrate gratis en <a href="https://openweathermap.org/api" target="_blank" style="color:#1d4ed8;">openweathermap.org/api</a> y reemplaza 197785aae380500a205cc2c00e970af9 en el código.';
                    if (container.children.length === 1 && container.children[0].classList?.contains('empty-state')) {
                        container.innerHTML = '';
                        container.appendChild(warning);
                    }
                }
            }, 500);
        }
    </script>
</body>
</html>
