<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aventura Total | Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .clima-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .ciudad-card { background: white; border-radius: 24px; padding: 1.5rem; border: 1px solid #e5e7eb; text-align: center; }
        .temp { font-size: 3rem; font-weight: 700; margin: 0.5rem 0; }
        .descripcion { color: #6b7280; margin-bottom: 1rem; }
        .clima-icono { font-size: 3rem; margin: 0.5rem 0; }
        .detalle-clima { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f3f4f6; }
        .buscar-ciudad { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav class="sidebar"><div class="sidebar-logo"><div class="logo-icon">🏔️</div><h2>Aventura <span>Total</span></h2></div>
        <ul class="nav-menu">
            <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
            <li><a href="clientes.html"><i class="fas fa-users"></i> <span>Clientes</span></a></li>
            <li><a href="reservas.html"><i class="fas fa-calendar-check"></i> <span>Reservas</span></a></li>
            <li><a href="seguimiento.html"><i class="fas fa-chart-simple"></i> <span>Seguimiento</span></a></li>
            <li><a href="emails.html"><i class="fab fa-whatsapp"></i> <span>WhatsApp</span></a></li>
            <li><a href="calendario.html"><i class="fas fa-calendar-alt"></i> <span>Calendario</span></a></li>
            <li><a href="clima.html" class="active"><i class="fas fa-cloud-sun"></i> <span>Clima</span></a></li>
        </ul>
        <div class="sidebar-footer"><button class="btn-logout-sidebar" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button></div>
    </nav>
    <div class="main-content">
        <div class="header"><h1><i class="fas fa-cloud-sun"></i> Clima en destinos</h1><div class="user-info"><div class="user-avatar">AT</div><span>Admin</span></div></div>
        <div class="buscar-ciudad"><input type="text" id="nuevaCiudad" class="filter-input" placeholder="Agregar ciudad..."><button class="btn-filtrar" onclick="agregarCiudad()"><i class="fas fa-plus"></i> Agregar</button><button class="btn-recargar" onclick="cargarTodasLasCiudades()"><i class="fas fa-sync-alt"></i> Actualizar todo</button></div>
        <div id="climaContainer" class="clima-container"><div style="text-align:center; grid-column:1/-1;"><i class="fas fa-spinner fa-pulse"></i> Cargando clima...</div></div>
    </div>
    <script>
        function logout(){sessionStorage.clear();alert("Sesión cerrada");}
        let ciudades=["Bariloche","Salta","Mendoza","El Calafate","Puerto Iguazú","Ushuaia"];
        async function cargarClima(ciudad){const apiKey="TU_API_KEY";try{const geoRes=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${ciudad},AR&appid=${apiKey}&units=metric&lang=es`);if(!geoRes.ok)throw new Error('No encontrado');const data=await geoRes.json();return{nombre:data.name,temp:Math.round(data.main.temp),desc:data.weather[0].description,icono:data.weather[0].icon,humedad:data.main.humidity,viento:data.wind.speed};}catch(e){return{nombre:ciudad,temp:"?",desc:"No disponible",icono:"",error:true};}}
        async function cargarTodasLasCiudades(){const cont=document.getElementById('climaContainer');cont.innerHTML='<div style="text-align:center; grid-column:1/-1;"><i class="fas fa-spinner fa-pulse"></i> Cargando...</div>';const resultados=[];for(const c of ciudades){const clima=await cargarClima(c);resultados.push(clima);}
            let html='';for(const c of resultados){const iconUrl=c.icono?`https://openweathermap.org/img/wn/${c.icono}@2x.png`:'';html+=`<div class="ciudad-card"><h3><i class="fas fa-map-marker-alt"></i> ${c.nombre}</h3>${iconUrl?`<img src="${iconUrl}" alt="clima" style="width:60px;">`:`<div class="clima-icono"><i class="fas fa-cloud-sun"></i></div>`}<div class="temp">${c.temp}°C</div><div class="descripcion">${c.desc}</div><div class="detalle-clima"><span><i class="fas fa-tint"></i> ${c.humedad||'?'}%</span><span><i class="fas fa-wind"></i> ${c.viento||'?'} km/h</span></div></div>`;}
            cont.innerHTML=html;localStorage.setItem('climaCiudades',JSON.stringify(ciudades));}
        function agregarCiudad(){const input=document.getElementById('nuevaCiudad');const ciudad=input.value.trim();if(ciudad&&!ciudades.includes(ciudad)){ciudades.push(ciudad);cargarTodasLasCiudades();input.value='';}}
        const guardadas=localStorage.getItem('climaCiudades');if(guardadas)ciudades=JSON.parse(guardadas);cargarTodasLasCiudades();
    </script>
</body>
</html>
