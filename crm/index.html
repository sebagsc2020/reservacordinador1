<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- ================================================== -->
    <!-- PWA CONFIGURACIÓN                                      -->
    <!-- ================================================== -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AVT CRM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="application-name" content="Aventura Total CRM">
    <meta name="msapplication-TileColor" content="#1a1a2e">
    <meta name="msapplication-TileImage" content="icons/icon-144.png">
    
    <!-- Iconos para diferentes plataformas -->
    <link rel="apple-touch-icon" sizes="57x57" href="icons/icon-57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icons/icon-60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icons/icon-72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icons/icon-114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
    
    <title>CRM - Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Modo PWA (sin barra de navegación) - se aplica cuando la app está instalada */
        .pwa-mode {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .login-container { 
            background: white; 
            border-radius: 20px; 
            padding: 50px 40px; 
            max-width: 420px; 
            width: 100%; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.4); 
            text-align: center; 
            animation: slideUp 0.6s ease; 
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .login-logo { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 5px; } 
        h1 span { color: #667eea; }
        .subtitulo { color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 15px; 
            transition: all 0.3s; 
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s; 
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
        .btn-login:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
        .error-message { background: #ffe0e0; color: #c0392b; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 15px; display: none; font-weight: 600; }
        .error-message.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .footer-text { margin-top: 20px; font-size: 12px; color: #999; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .security-badge { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 5px; z-index: 1000; }
        
        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .login-logo { font-size: 50px; }
            h1 { font-size: 20px; }
            input { padding: 12px 14px; font-size: 14px; }
            .btn-login { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">🏔️</div>
        <h1>Aventura <span>Total</span></h1>
        <p class="subtitulo">Panel de Administración CRM</p>
        
        <form id="loginForm">
            <div class="form-group"><label>📧 Email</label><input type="email" id="email" placeholder="admin@aventuratotal.com" required autocomplete="off"></div>
            <div class="form-group"><label>🔒 Contraseña</label><input type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn-login" id="btnLogin">Ingresar al Panel</button>
        </form>
        
        <div class="error-message" id="errorMessage"></div>
        <p class="footer-text">© 2026 Aventura Total - Acceso Restringido</p>
    </div>
    <div class="security-badge">🔒 SHA-256</div>
    
    <script>
        // ==================================================
        // REGISTRAR SERVICE WORKER PARA PWA
        // ==================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('❌ Error al registrar Service Worker:', error);
                    });
            });
        }
        
        // Detectar si la app está instalada y se abre desde la pantalla de inicio
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            console.log('📱 App ejecutándose en modo standalone (sin barra de navegación)');
            document.body.classList.add('pwa-mode');
        }
        
        // ==================================================
        // HASH SHA-256
        // ==================================================
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // ==================================================
        // USUARIOS CON SUS HASHES Y ROLES
        // ==================================================
        const USUARIOS = {
            'admin@aventuratotal.com': {
                hash: '9f85e28811e6d2be994f9d5b89d29bb30a7a6c7be3989c0c9f134b64f2f7e77f',
                rol: 'admin'
            },
            'user2@aventuratotal.com': {
                hash: '198d9f61f702b601f362671605562e619a5c9cb7403f14595e74d964703533ad',
                rol: 'operador'
            },
            'user3@aventuratotal.com': {
                hash: 'adbf6432511abab8999b991d0cbe675490d5e201209aba867c89b7c7235389b1',
                rol: 'ventas'
            }
        };
        
        // ==================================================
        // VERIFICAR SESIÓN EXISTENTE
        // ==================================================
        function verificarSesionExistente() {
            const sesionActiva = localStorage.getItem('crm_sesion_activa');
            if (sesionActiva) {
                const datos = JSON.parse(sesionActiva);
                if (Date.now() - datos.timestamp < 28800000) {
                    return true;
                } else {
                    localStorage.removeItem('crm_sesion_activa');
                }
            }
            return false;
        }
        
        // ==================================================
        // REGISTRAR SESIÓN
        // ==================================================
        function registrarSesion(email, rol) {
            const sessionId = 'SESSION-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('crm_sesion_activa', JSON.stringify({
                id: sessionId,
                timestamp: Date.now(),
                email: email,
                rol: rol
            }));
            sessionStorage.setItem('crm_logged', 'true');
            sessionStorage.setItem('crm_user', email);
            sessionStorage.setItem('crm_user_rol', rol);
        }
        
        // ==================================================
        // RATE LIMITING
        // ==================================================
        let intentosFallidos = 0;
        let tiempoBloqueo = null;
        
        function verificarRateLimiting() {
            if (tiempoBloqueo && Date.now() < tiempoBloqueo) {
                const segundosRestantes = Math.ceil((tiempoBloqueo - Date.now()) / 1000);
                throw new Error(`Demasiados intentos. Espere ${segundosRestantes} segundos.`);
            }
            return true;
        }
        
        function registrarIntentoFallido() {
            intentosFallidos++;
            if (intentosFallidos >= 5) {
                tiempoBloqueo = Date.now() + 300000;
                intentosFallidos = 0;
                document.getElementById('btnLogin').disabled = true;
                setTimeout(() => {
                    document.getElementById('btnLogin').disabled = false;
                    tiempoBloqueo = null;
                }, 300000);
                throw new Error('Demasiados intentos fallidos. Espere 5 minutos.');
            }
        }
        
        // ==================================================
        // MANEJAR LOGIN
        // ==================================================
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('errorMessage');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                errorMsg.textContent = '⚠️ Complete todos los campos';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }
            
            try {
                verificarRateLimiting();
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = 'Verificando <span class="loading"></span>';
            
            try {
                const hashIngresado = await hashPassword(password);
                const usuario = USUARIOS[email];
                
                if (usuario && hashIngresado === usuario.hash) {
                    registrarSesion(email, usuario.rol);
                    intentosFallidos = 0;
                    btnLogin.innerHTML = '✅ Ingresando...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    registrarIntentoFallido();
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = 'Ingresar al Panel';
                    errorMsg.textContent = '❌ Email o contraseña incorrectos';
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                }
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Ingresar al Panel';
                errorMsg.textContent = '❌ Error de conexión';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        });
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Prevenir F12 y DevTools
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.key === 'U') || (e.ctrlKey && e.key === 'C')) {
                e.preventDefault();
            }
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
