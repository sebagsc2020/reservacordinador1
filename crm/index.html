<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Aventura Total</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; padding: 50px 40px; max-width: 420px; width: 100%; box-shadow: 0 25px 60px rgba(0,0,0,0.4); text-align: center; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .login-logo { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 5px; } h1 span { color: #667eea; }
        .subtitulo { color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: all 0.3s; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
        .btn-login:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
        .error-message { background: #ffe0e0; color: #c0392b; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 15px; display: none; font-weight: 600; }
        .error-message.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .footer-text { margin-top: 20px; font-size: 12px; color: #999; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .security-badge { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 5px; }
        .sesion-info { font-size: 11px; color: #27ae60; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">🏔️</div>
        <h1>Aventura <span>Total</span></h1>
        <p class="subtitulo">Panel de Administración CRM</p>
        <p class="sesion-info" id="sesionInfo">🔐 Seguridad SHA-256</p>
        
        <form id="loginForm">
            <div class="form-group"><label>📧 Email</label><input type="email" id="email" placeholder="tu@email.com" required autocomplete="off"></div>
            <div class="form-group"><label>🔒 Contraseña</label><input type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn-login" id="btnLogin">Ingresar al Panel</button>
        </form>
        
        <div class="error-message" id="errorMessage"></div>
        <p class="footer-text">© 2026 Aventura Total - Acceso Restringido</p>
    </div>
    <div class="security-badge">🔒 SHA-256 Password Hashing • Secure Login</div>
    
    <script>
        // ==================================================
        // HASH SHA-256 PARA CONTRASEÑAS
        // ==================================================
        
        // Función para generar hash SHA-256
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }
        
        // ==================================================
        // CONFIGURACIÓN DE GOOGLE SHEETS
        // ==================================================
        const SPREADSHEET_ID = '1-b2wCbejrgWe3TdPGe2Aslvtlw4_FURMXsTcSMhLAeI';
        const USERS_SHEET = 'Usuarios';
        const USERS_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(USERS_SHEET)}`;
        
        // ==================================================
        // VARIABLES GLOBALES
        // ==================================================
        let usuariosCache = null;
        let ultimaCargaUsuarios = 0;
        const CACHE_DURACION = 60000; // 1 minuto
        
        // ==================================================
        // RATE LIMITING (protección contra fuerza bruta)
        // ==================================================
        let intentosFallidos = 0;
        let tiempoBloqueo = null;
        
        function verificarRateLimiting() {
            if (tiempoBloqueo && Date.now() < tiempoBloqueo) {
                const segundosRestantes = Math.ceil((tiempoBloqueo - Date.now()) / 1000);
                throw new Error(`Demasiados intentos. Espere ${segundosRestantes} segundos.`);
            }
            return true;
        }
        
        function registrarIntentoFallido() {
            intentosFallidos++;
            if (intentosFallidos >= 5) {
                tiempoBloqueo = Date.now() + 300000; // 5 minutos bloqueado
                intentosFallidos = 0;
                document.getElementById('btnLogin').disabled = true;
                setTimeout(() => {
                    document.getElementById('btnLogin').disabled = false;
                    tiempoBloqueo = null;
                }, 300000);
                throw new Error('Demasiados intentos fallidos. Espere 5 minutos.');
            }
        }
        
        function resetearIntentos() {
            intentosFallidos = 0;
        }
        
        // ==================================================
        // PARSEAR CSV
        // ==================================================
        function parseCSV(csvText) {
            const filas = [];
            let filaActual = [];
            let celdaActual = '';
            let dentroComillas = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (dentroComillas) {
                    if (char === '"') {
                        if (nextChar === '"') {
                            celdaActual += '"';
                            i++;
                        } else {
                            dentroComillas = false;
                        }
                    } else {
                        celdaActual += char;
                    }
                } else {
                    if (char === '"') {
                        dentroComillas = true;
                    } else if (char === ',') {
                        filaActual.push(celdaActual.trim());
                        celdaActual = '';
                    } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                        filaActual.push(celdaActual.trim());
                        filas.push(filaActual);
                        filaActual = [];
                        celdaActual = '';
                        if (char === '\r') i++;
                    } else {
                        celdaActual += char;
                    }
                }
            }
            if (celdaActual.trim() || filaActual.length > 0) {
                filaActual.push(celdaActual.trim());
                filas.push(filaActual);
            }
            return filas.filter(fila => fila.some(celda => celda !== ''));
        }
        
        // ==================================================
        // CARGAR USUARIOS DESDE GOOGLE SHEETS
        // ==================================================
        async function cargarUsuariosDesdeSheet() {
            const ahora = Date.now();
            
            // Usar caché si está fresca
            if (usuariosCache && (ahora - ultimaCargaUsuarios) < CACHE_DURACION) {
                console.log('📦 Usando caché de usuarios');
                return usuariosCache;
            }
            
            try {
                console.log('📡 Cargando usuarios desde Google Sheets...');
                const response = await fetch(USERS_URL + '&t=' + ahora);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                const filas = parseCSV(csvText);
                
                if (filas.length < 2) {
                    throw new Error('No se encontraron usuarios en la hoja');
                }
                
                const usuarios = [];
                // Saltar cabecera (fila 0)
                for (let i = 1; i < filas.length; i++) {
                    const fila = filas[i];
                    if (fila.length < 4) continue;
                    
                    const id = fila[0] || '';
                    const email = fila[1] || '';
                    const passwordHash = fila[2] || '';
                    const rol = fila[3] || 'usuario';
                    const activo = fila[4] || 'SI';
                    
                    if (email && passwordHash && activo.toUpperCase() === 'SI') {
                        usuarios.push({
                            id: id,
                            email: email.toLowerCase().trim(),
                            passwordHash: passwordHash,
                            rol: rol.toLowerCase(),
                            activo: true
                        });
                    }
                }
                
                console.log(`📥 Usuarios cargados: ${usuarios.length}`);
                
                if (usuarios.length === 0) {
                    throw new Error('No hay usuarios activos en el sistema');
                }
                
                usuariosCache = usuarios;
                ultimaCargaUsuarios = ahora;
                return usuarios;
                
            } catch (error) {
                console.error('Error al cargar usuarios:', error);
                document.getElementById('sesionInfo').innerHTML = '⚠️ Error de conexión. Contacte al administrador.';
                document.getElementById('sesionInfo').style.color = '#e74c3c';
                throw error;
            }
        }
        
        // ==================================================
        // VALIDAR CREDENCIALES CON HASH
        // ==================================================
        async function validarCredenciales(email, password) {
            const usuarios = await cargarUsuariosDesdeSheet();
            
            // Generar hash de la contraseña ingresada
            const passwordHashIngresado = await hashPassword(password);
            
            // Buscar usuario por email y comparar hash
            const usuario = usuarios.find(u => u.email === email.toLowerCase().trim() && u.passwordHash === passwordHashIngresado);
            
            if (usuario) {
                console.log(`✅ Usuario válido: ${usuario.email} (${usuario.rol})`);
                return { valido: true, rol: usuario.rol, email: usuario.email };
            }
            
            console.log(`❌ Credenciales inválidas para: ${email}`);
            return { valido: false };
        }
        
        // ==================================================
        // REGISTRAR SESIÓN
        // ==================================================
        function registrarSesion(email, rol) {
            const sessionId = 'SESSION-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8);
            const sessionData = {
                id: sessionId,
                timestamp: Date.now(),
                email: email,
                rol: rol,
                fingerprint: obtenerFingerprint()
            };
            localStorage.setItem('crm_sesion_activa', JSON.stringify(sessionData));
            sessionStorage.setItem('crm_logged', 'true');
            sessionStorage.setItem('crm_user', email);
            sessionStorage.setItem('crm_user_rol', rol);
            sessionStorage.setItem('crm_session_id', sessionId);
            console.log(`🔐 Sesión iniciada: ${email} (${rol})`);
        }
        
        // ==================================================
        // OBTENER FINGERPRINT DEL NAVEGADOR
        // ==================================================
        function obtenerFingerprint() {
            const screen = `${screen.width}x${screen.height}`;
            const language = navigator.language;
            const platform = navigator.platform;
            const userAgent = navigator.userAgent.substring(0, 50);
            return btoa(`${screen}|${language}|${platform}|${userAgent}`);
        }
        
        // ==================================================
        // VERIFICAR SESIÓN EXISTENTE
        // ==================================================
        function verificarSesionExistente() {
            const sesionActiva = localStorage.getItem('crm_sesion_activa');
            const sesionInfo = document.getElementById('sesionInfo');
            
            if (sesionActiva) {
                const datos = JSON.parse(sesionActiva);
                // La sesión expira después de 8 horas
                if (Date.now() - datos.timestamp < 28800000) {
                    if (sesionInfo) sesionInfo.innerHTML = '⚠️ Ya hay una sesión activa en este navegador.';
                    return true;
                } else {
                    localStorage.removeItem('crm_sesion_activa');
                }
            }
            if (sesionInfo) sesionInfo.innerHTML = '🔐 Login seguro con hash SHA-256';
            sesionInfo.style.color = '#27ae60';
            return false;
        }
        
        // ==================================================
        // MANEJAR LOGIN
        // ==================================================
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('errorMessage');
        
        verificarSesionExistente();
        setInterval(verificarSesionExistente, 30000);
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                errorMsg.textContent = '⚠️ Complete todos los campos';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }
            
            // Rate limiting
            try {
                verificarRateLimiting();
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = 'Verificando <span class="loading"></span>';
            
            try {
                const resultado = await validarCredenciales(email, password);
                
                if (resultado.valido) {
                    resetearIntentos();
                    registrarSesion(resultado.email, resultado.rol);
                    btnLogin.innerHTML = '✅ Ingresando...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    registrarIntentoFallido();
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = 'Ingresar al Panel';
                    errorMsg.textContent = '❌ Email o contraseña incorrectos';
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                }
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Ingresar al Panel';
                errorMsg.textContent = '❌ Error de conexión. Intente nuevamente.';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        });
        
        // Permitir Enter para enviar
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Prevenir F12 y DevTools
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.key === 'U') || (e.ctrlKey && e.key === 'C')) {
                e.preventDefault();
            }
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // Cargar usuarios al inicio
        cargarUsuariosDesdeSheet().catch(error => {
            console.error('Error precargando usuarios:', error);
        });
    </script>
</body>
</html>
