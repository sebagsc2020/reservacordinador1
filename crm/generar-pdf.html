<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador PDF - Aventura Total</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 0.5in;
            background: white;
            color: #0f172a;
        }
        .reporte-pdf {
            max-width: 100%;
        }
        h1 {
            font-size: 26px;
            color: #1e4a6b;
            border-left: 5px solid #2c7da0;
            padding-left: 15px;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .subtitulo {
            color: #475569;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .fecha-pdf {
            color: #334155;
            font-size: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 12px;
        }
        th {
            background: #1e4a6b;
            color: white;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #2c5a7a;
        }
        td {
            border: 1px solid #cbd5e1;
            padding: 10px 8px;
            vertical-align: top;
            background: white;
        }
        .excursiones-lista {
            margin: 0;
            padding-left: 1.2rem;
            list-style-type: decimal;
            line-height: 1.4;
        }
        .excursiones-lista li {
            margin-bottom: 5px;
            page-break-inside: avoid;
            break-inside: avoid;
            white-space: normal;
        }
        tr {
            page-break-inside: avoid;
            break-inside: avoid;
        }
        .estado {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: bold;
        }
        .estado-pagado { background: #15803d; color: white; }
        .estado-confirmado { background: #2c7da0; color: white; }
        .estado-pendiente { background: #b45309; color: white; }
        .lugar {
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            display: inline-block;
        }
        .total-general-pdf {
            margin-top: 24px;
            text-align: right;
            font-weight: 800;
            font-size: 14px;
            padding-top: 12px;
            border-top: 2px solid #2c7da0;
        }
        .filtro-aplicado {
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            margin-bottom: 12px;
            color: #1e40af;
        }
        @page {
            size: A4;
            margin: 0.6in;
        }
    </style>
</head>
<body>
    <div class="reporte-pdf" id="contenidoPDF">
        <!-- El título H1 se asignará dinámicamente -->
        <h1 id="tituloPrincipal">📋 Cargando...</h1>
        <div class="fecha-pdf" id="fechaGeneracion"></div>
        
        <table id="tablaReservas">
            <thead>
                <tr><th>ID Cliente</th><th>Nombre</th><th>Teléfono</th><th>Excursiones</th><th>Pax</th><th>Estado</th><th>Lugar</th><th>Observaciones</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <div class="total-general-pdf">
            TOTAL GENERAL: <span id="totalPax">0</span> pasajeros
        </div>
        <p style="font-size: 9px; text-align: center; margin-top: 28px; color: #475569;">
            Aventura Total - Documento oficial de reservas
        </p>
    </div>
    

    <script>
        // Leer el filtro desde localStorage (enviado desde el HTML original)
        let filtroExcursion = localStorage.getItem('filtroExcursionPDF') || '';
        
        // Limpiar localStorage después de leer (opcional)
        localStorage.removeItem('filtroExcursionPDF');
        
        // Configurar el título según el filtro
        const tituloH1 = document.getElementById('tituloPrincipal');
        if (filtroExcursion && filtroExcursion !== '') {
            tituloH1.innerHTML = `📋 ${filtroExcursion}`;
            // También mostrar un pequeño indicador
            const subtitulo = document.createElement('div');
            subtitulo.className = 'subtitulo';
            subtitulo.innerHTML = `<span class="filtro-aplicado">🔍 Filtrado por: ${filtroExcursion}</span>`;
            tituloH1.insertAdjacentElement('afterend', subtitulo);
        } else {
            tituloH1.innerHTML = `📋 EXCURSIONES`;
        }
        
        // Mostrar fecha actual
        const hoy = new Date();
        const fechaFormateada = hoy.toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        document.getElementById('fechaGeneracion').innerHTML = `Generado: ${fechaFormateada} | Total de reservas: 10`;
        
        // Datos de reservas (los mismos del PDF original)
        const reservas = [
            { id: "RES-1780314686695", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["Navegación a la Isla Victoria y el Bosque de Arrayanes","Navegación a Puerto Blest y Cascada de los Cántaros","Navegación por el Brazo Tristeza y caminata por la selva valdiviana","Travesía en vehículos 4x4 al Centro de Alta Gracia"], pax: 2, estado: "Pagado", lugar: "En el hotel", obs: "—" },
            { id: "RES-1780313538674", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["Navegación a la Isla Victoria","Circuito Chico"], pax: 2, estado: "Confirmado", lugar: "casa", obs: "—" },
            { id: "RES-1780305909739", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["Cerro Campanario","Ruta del Chocolate","Isla Victoria"], pax: 3, estado: "Confirmado", lugar: "HM Plaza 201", obs: "—" },
            { id: "RES-1780302137049", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["City Tour","Navegación Puerto Blest"], pax: 1, estado: "Pagado", lugar: "HM Plaza 103", obs: "—" },
            { id: "RES-1780283794040", nombre: "Stella Carro", tel: "5493518692251", excursiones: ["Circuito Playas Norte","City Tour","Isla Anhatomirim","Playas del Sur","Ilha do Campeche"], pax: 2, estado: "Pendiente", lugar: "En el hotel", obs: "—" },
            { id: "RES-1780283635866", nombre: "Teste Prefinal", tel: "5493518692251", excursiones: ["Cerro Campanario","Cerro Catedral","Cerro Otto","Circuito Chico","Circuito Grande","El Bolsón","Isla Victoria","Ruta del Chocolate"], pax: 2, estado: "Pendiente", lugar: "En el hotel", obs: "—" },
            { id: "RES-1780283413602", nombre: "Sebastián gonzalez", tel: "5493518692251", excursiones: ["Aerosilla","Capilla del Monte","Circuito de la Cerveza","City Tour Local"], pax: 4, estado: "Pendiente", lugar: "teste 4", obs: "—" },
            { id: "RES-1780282677773", nombre: "Sebastián gonzalez", tel: "5493518692251", excursiones: ["Aerosilla","Capilla del Monte","Circuito de la Cerveza"], pax: 3, estado: "Pagado", lugar: "en el hotel", obs: "—" },
            { id: "RES-1780282385172", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["Aerosilla","Capilla del Monte"], pax: 2, estado: "Pendiente", lugar: "Por ahí", obs: "—" },
            { id: "RES-1780282127706", nombre: "Sebastián pablo González", tel: "5493518692251", excursiones: ["Aerosilla"], pax: 1, estado: "Confirmado", lugar: "HM Plaza 201", obs: "—" }
        ];
        
        // Si hay filtro, filtrar las reservas que contengan esa excursión
        let reservasFiltradas = reservas;
        if (filtroExcursion && filtroExcursion !== '') {
            reservasFiltradas = reservas.filter(reserva => 
                reserva.excursiones.some(exc => 
                    exc.toLowerCase().includes(filtroExcursion.toLowerCase())
                )
            );
        }
        
        // Calcular total de pasajeros de las reservas filtradas
        let totalPax = 0;
        reservasFiltradas.forEach(r => totalPax += r.pax);
        document.getElementById('totalPax').innerText = totalPax;
        
        // Actualizar texto de total de reservas en fecha
        document.getElementById('fechaGeneracion').innerHTML = `Generado: ${fechaFormateada} | Total de reservas: ${reservasFiltradas.length}`;
        
        // Generar filas de la tabla
        const tbody = document.querySelector('#tablaReservas tbody');
        reservasFiltradas.forEach(r => {
            const tr = document.createElement('tr');
            
            const ul = document.createElement('ul');
            ul.className = 'excursiones-lista';
            r.excursiones.forEach(exc => {
                const li = document.createElement('li');
                li.textContent = exc;
                ul.appendChild(li);
            });
            
            let estadoClass = '';
            if (r.estado === 'Pagado') estadoClass = 'estado-pagado';
            else if (r.estado === 'Confirmado') estadoClass = 'estado-confirmado';
            else estadoClass = 'estado-pendiente';
            
            tr.innerHTML = `
                <td>${r.id}</td>
                <td>${r.nombre}</td>
                <td>${r.tel}</td>
                <td></td>
                <td>${r.pax}</td>
                <td><span class="estado ${estadoClass}">${r.estado}</span></td>
                <td><span class="lugar">${r.lugar}</span></td>
                <td>${r.obs}</td>
            `;
            tr.cells[3].appendChild(ul);
            tbody.appendChild(tr);
        });
        
        // Si no hay reservas después del filtro, mostrar mensaje
        if (reservasFiltradas.length === 0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="8" style="text-align:center; padding:40px;">⚠️ No hay reservas para la excursión: "${filtroExcursion}"</td>`;
            tbody.appendChild(tr);
        }
        
        // Auto-imprimir al cargar
        window.onload = function() {
            setTimeout(() => {
                window.print();
            }, 500);
        };
    </script>
</body>
</html>
