<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Generador PDF - Aventura Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden !important;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            overflow-x: hidden;
        }

        .pdf-generator {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .generator-header {
            background: linear-gradient(135deg, #0f2b3d 0%, #1a4a6f 100%);
            padding: 22px 16px;
            text-align: center;
            position: relative;
        }

        .generator-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .logo-icon {
            font-size: 38px;
            margin-bottom: 6px;
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .generator-header h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }

        .generator-header p {
            color: rgba(255,255,255,0.75);
            font-size: 11px;
            font-weight: 400;
        }

        .generator-content {
            padding: 24px 20px;
        }

        .status-card {
            text-align: center;
            width: 100%;
        }

        .spinner-container {
            margin-bottom: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e2e8f0;
            border-top-color: #1a4a6f;
            border-right-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .status-subtitle {
            font-size: 12px;
            color: #475569;
            line-height: 1.4;
        }

        .info-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 20px;
            padding: 14px;
            margin: 16px 0;
            border: 1px solid #e2e8f0;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #eef2ff;
            padding: 3px 10px;
            border-radius: 30px;
            display: inline-block;
        }

        .info-value {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            text-align: right;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 65%;
            flex: 1;
        }

        .titulo-destacado {
            background: linear-gradient(135deg, #1a4a6f, #667eea);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .btn-cerrar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            width: 100%;
            max-width: 150px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-cerrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        .success-icon, .error-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .success-text {
            color: #059669;
        }

        .error-text {
            color: #dc2626;
        }

        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #475569;
            margin-top: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-fill {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #1a4a6f, #667eea, #764ba2);
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @media (max-width: 500px) {
            .pdf-generator { max-width: 100%; border-radius: 20px; }
            .generator-header { padding: 16px 12px; }
            .generator-content { padding: 20px 16px; }
            .info-card { padding: 12px; margin: 14px 0; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 6px; padding: 10px 0; }
            .info-label { font-size: 10px; padding: 2px 8px; }
            .info-value { text-align: left; font-size: 12px; max-width: 100%; width: 100%; word-break: break-all; }
            .status-title { font-size: 16px; }
            .btn-cerrar { max-width: 100%; }
        }

        @media (max-width: 360px) {
            .generator-content { padding: 16px 12px; }
            .info-card { padding: 10px; }
        }

        * { max-width: 100%; overflow-wrap: break-word; }
        .pdf-generator, .generator-content, .status-card, .info-card { overflow: hidden !important; }
    </style>
</head>
<body>
    <div class="pdf-generator" id="pdfGenerator">
        <div class="generator-header">
            <div class="logo-icon">🏔️</div>
            <h1>Aventura Total</h1>
            <p>Generador de reportes profesionales</p>
        </div>
        
        <div class="generator-content" id="statusContainer">
            <div class="status-card">
                <div class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <div class="status-title">Preparando documento</div>
                <div class="status-subtitle">Estamos procesando la información de tus reservas</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('statusContainer');
            
            let filtroExcursion = '';
            let reservasFiltradas = [];
            
            try {
                filtroExcursion = localStorage.getItem('filtroExcursionPDF') || '';
                const reservasJson = localStorage.getItem('reservasFiltradasPDF');
                
                if (!reservasJson) {
                    throw new Error('No se encontraron datos de reservas');
                }
                
                reservasFiltradas = JSON.parse(reservasJson);
                console.log('✅ Datos recibidos:', { filtro: filtroExcursion, total: reservasFiltradas.length });
                
            } catch(e) {
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">⚠️</div>
                        <div class="status-title error-text">Error de datos</div>
                        <div class="status-subtitle">${e.message}</div>
                        <div class="info-card" style="background: #fef2f2; border-color: #fecaca;">
                            <div style="font-size: 12px; color: #991b1b;">📌 Usá el botón "Generar PDF" desde el panel de reservas</div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            localStorage.removeItem('filtroExcursionPDF');
            localStorage.removeItem('reservasFiltradasPDF');
            
            if (reservasFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">📭</div>
                        <div class="status-title error-text">Sin reservas</div>
                        <div class="status-subtitle">No hay reservas para exportar con el filtro actual</div>
                        <div class="badge">Filtro: ${escapeHtml(filtroExcursion || 'ninguno')}</div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            const totalPasajeros = reservasFiltradas.reduce((sum, r) => sum + (parseInt(r.personas) || 0), 0);
            const titulo = (filtroExcursion && filtroExcursion !== '') ? filtroExcursion : 'EXCURSIONES';
            
            container.innerHTML = `
                <div class="status-card">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                    </div>
                    <div class="status-title">Generando reporte</div>
                    <div class="status-subtitle">Creando PDF profesional en A4 horizontal</div>
                    <div class="info-card">
                        <div class="info-row">
                            <span class="info-label">📄 Título</span>
                            <span class="info-value titulo-destacado">${escapeHtml(titulo)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📋 Reservas</span>
                            <span class="info-value">${reservasFiltradas.length}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">👥 Pasajeros</span>
                            <span class="info-value">${totalPasajeros}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            `;
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 12;
                let y = margin + 8;
                
                // ============================================
                // HEADER MODERNO CON BANDA DECORATIVA
                // ============================================
                // Banda superior decorativa
                doc.setFillColor(15, 43, 61);
                doc.rect(0, 0, pageWidth, 5, 'F');
                
                doc.setFillColor(26, 74, 111);
                doc.rect(0, 5, pageWidth, 2, 'F');
                
                // Logo y título principal
                doc.setFontSize(22);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(26, 74, 111);
                doc.text(titulo, pageWidth / 2, y, { align: 'center' });
                y += 9;
                
                // Línea decorativa bajo título
                doc.setDrawColor(102, 126, 234);
                doc.setLineWidth(0.8);
                doc.line(pageWidth / 2 - 25, y - 3, pageWidth / 2 + 25, y - 3);
                
                // Información de fecha y total
                doc.setFontSize(8.5);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 116, 139);
                const fechaStr = `Generado: ${new Date().toLocaleString('es-AR')}`;
                doc.text(fechaStr, margin, y);
                doc.setFont('helvetica', 'bold');
                doc.text(`Total: ${reservasFiltradas.length} reservas`, pageWidth - margin, y, { align: 'right' });
                y += 10;
                
                // Línea de datos de empresa (estilo formulario)
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(71, 85, 105);
                
                // Cuadro de empresa
                doc.setDrawColor(203, 213, 225);
                doc.setLineWidth(0.3);
                doc.rect(margin, y, 45, 7);
                doc.text('EMPRESA', margin + 2, y + 4.5);
                doc.rect(margin + 45, y, 55, 7);
                
                doc.rect(margin + 100, y, 45, 7);
                doc.text('NOMBRE', margin + 102, y + 4.5);
                doc.rect(margin + 145, y, 50, 7);
                
                doc.rect(margin + 195, y, 35, 7);
                doc.text('TEL', margin + 197, y + 4.5);
                doc.rect(margin + 230, y, 35, 7);
                y += 12;
                
                // ============================================
                // TABLA CON DISEÑO MODERNO
                // ============================================
                const colWidths = [28, 42, 28, 72, 12, 20, 32, 24];
                const headers = ['ID', 'CLIENTE', 'TELÉFONO', 'EXCURSIONES', 'PAX', 'ESTADO', 'LUGAR', 'OBS'];
                
                let x = margin;
                
                // Header de tabla con gradiente
                doc.setFillColor(26, 74, 111);
                doc.setDrawColor(26, 74, 111);
                doc.setLineWidth(0.2);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(7.5);
                doc.setTextColor(255, 255, 255);
                
                for (let i = 0; i < headers.length; i++) {
                    doc.rect(x, y, colWidths[i], 8, 'FD');
                    doc.text(headers[i], x + 2, y + 5.5);
                    x += colWidths[i];
                }
                y += 8;
                
                // Datos
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(51, 65, 85);
                doc.setDrawColor(203, 213, 225);
                doc.setFillColor(255, 255, 255);
                
                let rowCount = 0;
                
                for (const reserva of reservasFiltradas) {
                    if (y > pageHeight - 30) {
                        doc.addPage();
                        y = margin + 8;
                        x = margin;
                        
                        // Re-dibujar header en nueva página
                        doc.setFillColor(26, 74, 111);
                        doc.setDrawColor(26, 74, 111);
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(7.5);
                        doc.setTextColor(255, 255, 255);
                        for (let i = 0; i < headers.length; i++) {
                            doc.rect(x, y, colWidths[i], 8, 'FD');
                            doc.text(headers[i], x + 2, y + 5.5);
                            x += colWidths[i];
                        }
                        y += 8;
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7);
                        doc.setTextColor(51, 65, 85);
                        doc.setDrawColor(203, 213, 225);
                    }
                    
                    // Color alternado para filas
                    const isEven = rowCount % 2 === 0;
                    if (isEven) {
                        doc.setFillColor(248, 250, 252);
                    } else {
                        doc.setFillColor(255, 255, 255);
                    }
                    
                    let excursionesTexto = '';
                    if (reserva.excursionesLista && reserva.excursionesLista.length > 0) {
                        excursionesTexto = reserva.excursionesLista.map((exc, idx) => `${idx+1}. ${exc}`).join('\n');
                    } else {
                        excursionesTexto = '—';
                    }
                    
                    const estadoTexto = reserva.estado === 'pendiente' ? 'Pendiente' : (reserva.estado === 'pagado' ? 'Pagado' : 'Confirmado');
                    const lineasExcursiones = excursionesTexto.split('\n').length;
                    const alturaFila = Math.max(8, Math.min(45, lineasExcursiones * 3.2 + 3));
                    
                    x = margin;
                    
                    // ID
                    doc.rect(x, y, colWidths[0], alturaFila, isEven ? 'FD' : 'F');
                    doc.text(String(reserva.id || '').substring(0, 12), x + 2, y + 4.5);
                    x += colWidths[0];
                    
                    // Cliente
                    doc.rect(x, y, colWidths[1], alturaFila, isEven ? 'FD' : 'F');
                    const nombreCliente = (reserva.nombre || 'No especificado').substring(0, 28);
                    doc.text(nombreCliente, x + 2, y + 4.5);
                    x += colWidths[1];
                    
                    // Teléfono
                    doc.rect(x, y, colWidths[2], alturaFila, isEven ? 'FD' : 'F');
                    doc.text(reserva.telefono || '', x + 2, y + 4.5);
                    x += colWidths[2];
                    
                    // Excursiones (con manejo de líneas múltiples)
                    doc.rect(x, y, colWidths[3], alturaFila, isEven ? 'FD' : 'F');
                    const lineas = doc.splitTextToSize(excursionesTexto, colWidths[3] - 3);
                    doc.text(lineas, x + 1.5, y + 4.5);
                    x += colWidths[3];
                    
                    // Pax
                    doc.rect(x, y, colWidths[4], alturaFila, isEven ? 'FD' : 'F');
                    doc.text(String(reserva.personas || 0), x + 2, y + 4.5);
                    x += colWidths[4];
                    
                    // Estado (con color según estado)
                    doc.rect(x, y, colWidths[5], alturaFila, isEven ? 'FD' : 'F');
                    if (estadoTexto === 'Pagado') {
                        doc.setTextColor(22, 163, 74);
                    } else if (estadoTexto === 'Pendiente') {
                        doc.setTextColor(234, 88, 12);
                    } else {
                        doc.setTextColor(37, 99, 235);
                    }
                    doc.text(estadoTexto, x + 2, y + 4.5);
                    doc.setTextColor(51, 65, 85);
                    x += colWidths[5];
                    
                    // Lugar
                    doc.rect(x, y, colWidths[6], alturaFila, isEven ? 'FD' : 'F');
                    const lugarTexto = (reserva.lugar || 'No especificado').substring(0, 22);
                    doc.text(lugarTexto, x + 2, y + 4.5);
                    x += colWidths[6];
                    
                    // Observaciones
                    doc.rect(x, y, colWidths[7], alturaFila, isEven ? 'FD' : 'F');
                    doc.text('', x + 2, y + 4.5);
                    
                    y += alturaFila;
                    rowCount++;
                }
                
                // ============================================
                // TOTAL GENERAL CON DISEÑO DESTACADO
                // ============================================
                y += 6;
                const totalX = margin + colWidths[0] + colWidths[1] + colWidths[2];
                
                doc.setFillColor(240, 248, 255);
                doc.setDrawColor(26, 74, 111);
                doc.setLineWidth(0.4);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8.5);
                doc.setTextColor(15, 23, 42);
                
                // Celdas vacías izquierda
                doc.rect(margin, y, colWidths[0], 9, 'FD');
                doc.rect(margin + colWidths[0], y, colWidths[1], 9, 'FD');
                doc.rect(margin + colWidths[0] + colWidths[1], y, colWidths[2], 9, 'FD');
                
                // Celda "TOTAL GENERAL"
                doc.rect(totalX, y, colWidths[3], 9, 'FD');
                doc.text('TOTAL GENERAL', totalX + 3, y + 6);
                
                // Celda del total de pasajeros (destacada)
                doc.rect(totalX + colWidths[3], y, colWidths[4], 9, 'FD');
                doc.setFontSize(10);
                doc.setTextColor(26, 74, 111);
                doc.text(String(totalPasajeros), totalX + colWidths[3] + 3, y + 6);
                
                // Celdas vacías derecha
                doc.setFontSize(8.5);
                doc.setTextColor(15, 23, 42);
                doc.rect(totalX + colWidths[3] + colWidths[4], y, colWidths[5], 9, 'FD');
                doc.rect(totalX + colWidths[3] + colWidths[4] + colWidths[5], y, colWidths[6], 9, 'FD');
                doc.rect(totalX + colWidths[3] + colWidths[4] + colWidths[5] + colWidths[6], y, colWidths[7], 9, 'FD');
                
                y += 14;
                
                // ============================================
                // FOOTER PROFESIONAL
                // ============================================
                doc.setDrawColor(203, 213, 225);
                doc.setLineWidth(0.5);
                doc.line(margin, pageHeight - 14, pageWidth - margin, pageHeight - 14);
                
                doc.setFontSize(7);
                doc.setFont('helvetica', 'italic');
                doc.setTextColor(148, 163, 184);
                doc.text('Aventura Total - Sistema Profesional de Gestión de Reservas', pageWidth / 2, pageHeight - 7, { align: 'center' });
                
                // Pequeña línea decorativa en footer
                doc.setDrawColor(102, 126, 234);
                doc.setLineWidth(0.3);
                doc.line(pageWidth / 2 - 30, pageHeight - 4, pageWidth / 2 + 30, pageHeight - 4);
                
                // Guardar PDF
                const nombreArchivo = (filtroExcursion && filtroExcursion !== '') 
                    ? `reporte_${filtroExcursion.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 35)}.pdf`
                    : `reporte_reservas_${Date.now()}.pdf`;
                
                doc.save(nombreArchivo);
                
                // Mostrar éxito
                container.innerHTML = `
                    <div class="status-card">
                        <div class="success-icon">✅</div>
                        <div class="status-title success-text">¡Reporte generado!</div>
                        <div class="status-subtitle">El PDF se descargó correctamente</div>
                        <div class="info-card">
                            <div class="info-row">
                                <span class="info-label">📄 Título</span>
                                <span class="info-value titulo-destacado">${escapeHtml(titulo)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📋 Reservas</span>
                                <span class="info-value">${reservasFiltradas.length}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">👥 Pasajeros</span>
                                <span class="info-value">${totalPasajeros}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📁 Archivo</span>
                                <span class="info-value" style="font-size: 10px;">${nombreArchivo}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📐 Formato</span>
                                <span class="info-value">A4 Horizontal Premium</span>
                            </div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">❌</div>
                        <div class="status-title error-text">Error al generar PDF</div>
                        <div class="status-subtitle">${error.message}</div>
                        <div class="info-card" style="background: #fef2f2;">
                            <div style="font-size: 12px; color: #991b1b;">Verificá la conexión y volvé a intentar</div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
            }
        })();
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
