<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador PDF - Aventura Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .btn-cerrar {
            margin-top: 20px;
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-cerrar:hover { background: #5a67d8; }
        .info {
            margin: 15px 0;
            padding: 12px;
            background: #f0f2f5;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container" id="statusContainer">
        <div class="spinner"></div>
        <h2>⏳ Generando PDF...</h2>
        <p>Procesando reservas, por favor espere...</p>
    </div>

    <script>
        (function() {
            const container = document.getElementById('statusContainer');
            
            // Leer datos desde localStorage
            let filtroExcursion = '';
            let reservasFiltradas = [];
            
            try {
                filtroExcursion = localStorage.getItem('filtroExcursionPDF') || '';
                const reservasJson = localStorage.getItem('reservasFiltradasPDF');
                
                if (!reservasJson) {
                    throw new Error('No se encontraron datos de reservas');
                }
                
                reservasFiltradas = JSON.parse(reservasJson);
                console.log('Datos recibidos:', { filtro: filtroExcursion, total: reservasFiltradas.length });
                
            } catch(e) {
                container.innerHTML = `
                    <div class="error">
                        <h2>❌ Error</h2>
                        <p>${e.message}</p>
                        <div class="info">
                            📌 Usá el botón "Generar PDF (filtrado)" desde el panel de reservas.
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            // Limpiar localStorage después de leer
            localStorage.removeItem('filtroExcursionPDF');
            localStorage.removeItem('reservasFiltradasPDF');
            
            if (reservasFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="error">
                        <h2>❌ No hay reservas</h2>
                        <p>No hay reservas para exportar con el filtro actual.</p>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            const totalPasajeros = reservasFiltradas.reduce((sum, r) => sum + (parseInt(r.personas) || 0), 0);
            const titulo = (filtroExcursion && filtroExcursion !== '') ? filtroExcursion : 'EXCURSIONES';
            
            // Actualizar UI
            container.innerHTML = `
                <div class="spinner"></div>
                <h2>⏳ Generando PDF...</h2>
                <div class="info">
                    📄 Título: <strong>${titulo}</strong><br>
                    📋 Reservas: ${reservasFiltradas.length}<br>
                    👥 Pasajeros: ${totalPasajeros}
                </div>
            `;
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                const marginLeft = 8;
                let y = marginLeft + 10;
                const pageWidth = doc.internal.pageSize.getWidth();
                
                const colWidths = [35, 42, 25, 48, 12, 20, 35, 35];
                const headers = ['ID', 'Cliente', 'Teléfono', 'Excursiones', 'Pax', 'Estado', 'Lugar', 'Observaciones'];
                
                // TÍTULO según filtro
                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text(titulo, pageWidth / 2, y, { align: 'center' });
                y += 10;
                
                // Fecha
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.text(`Generado: ${new Date().toLocaleString('es-AR')}`, marginLeft, y);
                y += 6;
                doc.text(`Total de reservas: ${reservasFiltradas.length}`, marginLeft, y);
                y += 8;
                
                // Línea empresa
                doc.setFontSize(9);
                doc.setFont('courier', 'normal');
                doc.text('EMPRESA: ____________________          NOMBRE: ____________________          TEL: ____________________', marginLeft, y);
                y += 10;
                
                // Encabezados
                let x = marginLeft;
                doc.setFillColor(240, 240, 240);
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.1);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                
                for (let i = 0; i < headers.length; i++) {
                    doc.rect(x, y, colWidths[i], 10);
                    doc.text(headers[i], x + 2, y + 6);
                    x += colWidths[i];
                }
                y += 10;
                
                // Datos
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                doc.setDrawColor(200, 200, 200);
                
                for (const reserva of reservasFiltradas) {
                    if (y > 180) {
                        doc.addPage();
                        y = marginLeft + 10;
                        x = marginLeft;
                        doc.setFillColor(240, 240, 240);
                        doc.setDrawColor(0, 0, 0);
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(9);
                        for (let i = 0; i < headers.length; i++) {
                            doc.rect(x, y, colWidths[i], 10);
                            doc.text(headers[i], x + 2, y + 6);
                            x += colWidths[i];
                        }
                        y += 10;
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(8);
                        doc.setDrawColor(200, 200, 200);
                    }
                    
                    let excursionesTexto = '';
                    if (reserva.excursionesLista && reserva.excursionesLista.length > 0) {
                        excursionesTexto = reserva.excursionesLista.map((exc, idx) => `${idx+1}. ${exc}`).join('\n');
                    } else {
                        excursionesTexto = 'Sin excursiones';
                    }
                    
                    const estadoTexto = reserva.estado === 'pendiente' ? 'Pendiente' : (reserva.estado === 'pagado' ? 'Pagado' : 'Confirmado');
                    const lineasExcursiones = excursionesTexto.split('\n').length;
                    const alturaFila = Math.max(10, Math.min(45, lineasExcursiones * 4.5 + 4));
                    
                    x = marginLeft;
                    
                    doc.rect(x, y, colWidths[0], alturaFila);
                    doc.text(String(reserva.id || ''), x + 2, y + 5);
                    x += colWidths[0];
                    
                    doc.rect(x, y, colWidths[1], alturaFila);
                    const nombreCliente = (reserva.nombre || 'No especificado').substring(0, 35);
                    doc.text(nombreCliente, x + 2, y + 5);
                    x += colWidths[1];
                    
                    doc.rect(x, y, colWidths[2], alturaFila);
                    doc.text(reserva.telefono || '', x + 2, y + 5);
                    x += colWidths[2];
                    
                    doc.rect(x, y, colWidths[3], alturaFila);
                    const lineas = doc.splitTextToSize(excursionesTexto, colWidths[3] - 4);
                    doc.text(lineas, x + 2, y + 5);
                    x += colWidths[3];
                    
                    doc.rect(x, y, colWidths[4], alturaFila);
                    doc.text(String(reserva.personas || 0), x + 2, y + 5);
                    x += colWidths[4];
                    
                    doc.rect(x, y, colWidths[5], alturaFila);
                    doc.text(estadoTexto, x + 2, y + 5);
                    x += colWidths[5];
                    
                    doc.rect(x, y, colWidths[6], alturaFila);
                    const lugarTexto = (reserva.lugar || 'No especificado').substring(0, 30);
                    doc.text(lugarTexto, x + 2, y + 5);
                    x += colWidths[6];
                    
                    doc.rect(x, y, colWidths[7], alturaFila);
                    doc.text('', x + 2, y + 5);
                    
                    y += alturaFila;
                }
                
                // TOTAL GENERAL
                y += 5;
                const totalX = marginLeft + colWidths[0] + colWidths[1] + colWidths[2];
                
                doc.setFillColor(255, 255, 255);
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.1);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                
                doc.rect(marginLeft, y, colWidths[0], 10);
                doc.rect(marginLeft + colWidths[0], y, colWidths[1], 10);
                doc.rect(marginLeft + colWidths[0] + colWidths[1], y, colWidths[2], 10);
                doc.rect(totalX, y, colWidths[3], 10);
                doc.text('TOTAL GENERAL', totalX + 2, y + 6);
                doc.rect(totalX + colWidths[3], y, colWidths[4], 10);
                doc.text(String(totalPasajeros), totalX + colWidths[3] + 2, y + 6);
                
                // Guardar PDF
                const nombreArchivo = (filtroExcursion && filtroExcursion !== '') 
                    ? `reservas_${filtroExcursion.replace(/[^a-z0-9]/gi, '_').substring(0, 40)}.pdf`
                    : `reservas_${Date.now()}.pdf`;
                
                doc.save(nombreArchivo);
                
                // Mostrar éxito
                container.innerHTML = `
                    <div class="success">
                        <h2>✅ ¡PDF Generado!</h2>
                        <p>El archivo se ha descargado correctamente.</p>
                        <div class="info">
                            📄 <strong>Título:</strong> ${titulo}<br>
                            📋 <strong>Reservas:</strong> ${reservasFiltradas.length}<br>
                            👥 <strong>Pasajeros:</strong> ${totalPasajeros}
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="error">
                        <h2>❌ Error al generar PDF</h2>
                        <p>${error.message}</p>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
