<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Generador PDF - Aventura Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden !important;
            overflow-y: auto;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            width: 100%;
            overflow-x: hidden;
        }

        /* Contenedor principal - completamente responsivo */
        .pdf-generator {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        /* Header */
        .generator-header {
            background: linear-gradient(135deg, #0b2b3d 0%, #1a4a6f 100%);
            padding: 20px 16px;
            text-align: center;
        }

        .logo-icon {
            font-size: 36px;
            margin-bottom: 6px;
            display: inline-block;
        }

        .generator-header h1 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }

        .generator-header p {
            color: rgba(255,255,255,0.8);
            font-size: 11px;
            font-weight: 400;
        }

        /* Contenido */
        .generator-content {
            padding: 24px 20px;
        }

        /* Estados y animaciones */
        .status-card {
            text-align: center;
            width: 100%;
        }

        .spinner-container {
            margin-bottom: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e2e8f0;
            border-top-color: #1a4a6f;
            border-right-color: #2c7da0;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .status-subtitle {
            font-size: 13px;
            color: #475569;
            line-height: 1.4;
        }

        /* Info card - SIN SCROLL, con word-break */
        .info-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px;
            margin: 16px 0;
            border: 1px solid #e2e8f0;
            width: 100%;
            overflow: hidden;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }

        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            background: #eef2ff;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .info-value {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            text-align: right;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 65%;
            flex: 1;
        }

        .titulo-destacado {
            background: linear-gradient(135deg, #1a4a6f, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        /* Botones */
        .btn-cerrar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            width: 100%;
            max-width: 160px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-cerrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        /* Iconos de estado */
        .success-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .success-text {
            color: #059669;
        }

        .error-text {
            color: #dc2626;
        }

        /* Badge */
        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #475569;
            margin-top: 8px;
            word-break: break-word;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-fill {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #1a4a6f, #2c7da0);
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* RESPONSIVE - MÓVILES */
        @media (max-width: 500px) {
            .pdf-generator {
                max-width: 100%;
                border-radius: 20px;
            }
            
            .generator-header {
                padding: 16px 12px;
            }
            
            .generator-content {
                padding: 20px 16px;
            }
            
            .info-card {
                padding: 12px;
                margin: 14px 0;
            }
            
            .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                padding: 10px 0;
            }
            
            .info-label {
                font-size: 11px;
                padding: 2px 8px;
            }
            
            .info-value {
                text-align: left;
                font-size: 13px;
                max-width: 100%;
                width: 100%;
                word-break: break-all;
            }
            
            .status-title {
                font-size: 16px;
            }
            
            .status-subtitle {
                font-size: 12px;
            }
            
            .btn-cerrar {
                max-width: 100%;
                padding: 10px 16px;
            }
            
            .success-icon, .error-icon {
                font-size: 42px;
            }
        }

        /* Pantallas muy pequeñas */
        @media (max-width: 360px) {
            .generator-content {
                padding: 16px 12px;
            }
            
            .info-card {
                padding: 10px;
            }
            
            .info-value {
                font-size: 12px;
            }
        }

        /* Evitar cualquier desbordamiento */
        * {
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        
        .pdf-generator,
        .generator-content,
        .status-card,
        .info-card {
            overflow: hidden !important;
        }
    </style>
</head>
<body>
    <div class="pdf-generator" id="pdfGenerator">
        <div class="generator-header">
            <div class="logo-icon">🏔️</div>
            <h1>Aventura Total</h1>
            <p>Generador de reportes profesionales</p>
        </div>
        
        <div class="generator-content" id="statusContainer">
            <div class="status-card">
                <div class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <div class="status-title">Preparando documento</div>
                <div class="status-subtitle">Estamos procesando la información de tus reservas</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('statusContainer');
            
            // Leer datos desde localStorage
            let filtroExcursion = '';
            let reservasFiltradas = [];
            
            try {
                filtroExcursion = localStorage.getItem('filtroExcursionPDF') || '';
                const reservasJson = localStorage.getItem('reservasFiltradasPDF');
                
                if (!reservasJson) {
                    throw new Error('No se encontraron datos de reservas');
                }
                
                reservasFiltradas = JSON.parse(reservasJson);
                console.log('✅ Datos recibidos:', { filtro: filtroExcursion, total: reservasFiltradas.length });
                
            } catch(e) {
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">⚠️</div>
                        <div class="status-title error-text">Error de datos</div>
                        <div class="status-subtitle">${e.message}</div>
                        <div class="info-card" style="background: #fef2f2; border-color: #fecaca;">
                            <div style="font-size: 12px; color: #991b1b;">
                                📌 Usá el botón "Generar PDF" desde el panel de reservas
                            </div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            // Limpiar localStorage después de leer
            localStorage.removeItem('filtroExcursionPDF');
            localStorage.removeItem('reservasFiltradasPDF');
            
            if (reservasFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">📭</div>
                        <div class="status-title error-text">Sin reservas</div>
                        <div class="status-subtitle">No hay reservas para exportar con el filtro actual</div>
                        <div class="badge">Filtro: ${escapeHtml(filtroExcursion || 'ninguno')}</div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                return;
            }
            
            const totalPasajeros = reservasFiltradas.reduce((sum, r) => sum + (parseInt(r.personas) || 0), 0);
            const titulo = (filtroExcursion && filtroExcursion !== '') ? filtroExcursion : 'EXCURSIONES';
            
            // Actualizar UI con información
            container.innerHTML = `
                <div class="status-card">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                    </div>
                    <div class="status-title">Generando reporte</div>
                    <div class="status-subtitle">Creando PDF en formato A4 horizontal</div>
                    <div class="info-card">
                        <div class="info-row">
                            <span class="info-label">📄 Título</span>
                            <span class="info-value titulo-destacado">${escapeHtml(titulo)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📋 Reservas</span>
                            <span class="info-value">${reservasFiltradas.length}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">👥 Pasajeros</span>
                            <span class="info-value">${totalPasajeros}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            `;
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 12;
                let y = margin + 10;
                
                // HEADER
                doc.setDrawColor(42, 82, 110);
                doc.setLineWidth(0.5);
                doc.line(margin, margin, pageWidth - margin, margin);
                
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(26, 74, 111);
                doc.text(titulo, pageWidth / 2, y, { align: 'center' });
                y += 8;
                
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 116, 139);
                const fechaStr = `Generado: ${new Date().toLocaleString('es-AR')}`;
                doc.text(fechaStr, margin, y);
                doc.text(`Total: ${reservasFiltradas.length}`, pageWidth - margin, y, { align: 'right' });
                y += 8;
                
                doc.setDrawColor(203, 213, 225);
                doc.line(margin, y, pageWidth - margin, y);
                y += 6;
                
                doc.setFontSize(9);
                doc.setFont('courier', 'normal');
                doc.setTextColor(71, 85, 105);
                doc.text('EMPRESA: ____________________          NOMBRE: ____________________          TEL: ____________________', margin, y);
                y += 12;
                
                // TABLA
                const colWidths = [32, 48, 30, 70, 12, 22, 35, 25];
                const headers = ['ID', 'Cliente', 'Teléfono', 'Excursiones', 'Pax', 'Estado', 'Lugar', 'Obs.'];
                
                let x = margin;
                doc.setFillColor(240, 248, 255);
                doc.setDrawColor(100, 116, 139);
                doc.setLineWidth(0.2);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8);
                doc.setTextColor(30, 41, 59);
                
                for (let i = 0; i < headers.length; i++) {
                    doc.rect(x, y, colWidths[i], 9, 'FD');
                    doc.text(headers[i], x + 2, y + 6);
                    x += colWidths[i];
                }
                y += 9;
                
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7.5);
                doc.setTextColor(51, 65, 85);
                doc.setDrawColor(203, 213, 225);
                
                for (const reserva of reservasFiltradas) {
                    if (y > pageHeight - 28) {
                        doc.addPage();
                        y = margin + 10;
                        x = margin;
                        doc.setFillColor(240, 248, 255);
                        doc.setDrawColor(100, 116, 139);
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(8);
                        for (let i = 0; i < headers.length; i++) {
                            doc.rect(x, y, colWidths[i], 9, 'FD');
                            doc.text(headers[i], x + 2, y + 6);
                            x += colWidths[i];
                        }
                        y += 9;
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7.5);
                        doc.setDrawColor(203, 213, 225);
                    }
                    
                    let excursionesTexto = '';
                    if (reserva.excursionesLista && reserva.excursionesLista.length > 0) {
                        excursionesTexto = reserva.excursionesLista.map((exc, idx) => `${idx+1}. ${exc}`).join('\n');
                    } else {
                        excursionesTexto = 'Sin excursiones';
                    }
                    
                    const estadoTexto = reserva.estado === 'pendiente' ? 'Pendiente' : (reserva.estado === 'pagado' ? 'Pagado' : 'Confirmado');
                    const lineasExcursiones = excursionesTexto.split('\n').length;
                    const alturaFila = Math.max(8, Math.min(50, lineasExcursiones * 3.5 + 3));
                    
                    x = margin;
                    
                    doc.rect(x, y, colWidths[0], alturaFila);
                    doc.text(String(reserva.id || '').substring(0, 14), x + 2, y + 4.5);
                    x += colWidths[0];
                    
                    doc.rect(x, y, colWidths[1], alturaFila);
                    const nombreCliente = (reserva.nombre || 'No especificado').substring(0, 32);
                    doc.text(nombreCliente, x + 2, y + 4.5);
                    x += colWidths[1];
                    
                    doc.rect(x, y, colWidths[2], alturaFila);
                    doc.text(reserva.telefono || '', x + 2, y + 4.5);
                    x += colWidths[2];
                    
                    doc.rect(x, y, colWidths[3], alturaFila);
                    const lineas = doc.splitTextToSize(excursionesTexto, colWidths[3] - 3);
                    doc.text(lineas, x + 1.5, y + 4.5);
                    x += colWidths[3];
                    
                    doc.rect(x, y, colWidths[4], alturaFila);
                    doc.text(String(reserva.personas || 0), x + 2, y + 4.5);
                    x += colWidths[4];
                    
                    doc.rect(x, y, colWidths[5], alturaFila);
                    doc.text(estadoTexto, x + 2, y + 4.5);
                    x += colWidths[5];
                    
                    doc.rect(x, y, colWidths[6], alturaFila);
                    const lugarTexto = (reserva.lugar || 'No especificado').substring(0, 25);
                    doc.text(lugarTexto, x + 2, y + 4.5);
                    x += colWidths[6];
                    
                    doc.rect(x, y, colWidths[7], alturaFila);
                    doc.text('', x + 2, y + 4.5);
                    
                    y += alturaFila;
                }
                
                y += 5;
                const totalX = margin + colWidths[0] + colWidths[1] + colWidths[2];
                
                doc.setFillColor(248, 250, 252);
                doc.setDrawColor(71, 85, 105);
                doc.setLineWidth(0.3);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8.5);
                doc.setTextColor(15, 23, 42);
                
                doc.rect(margin, y, colWidths[0], 9);
                doc.rect(margin + colWidths[0], y, colWidths[1], 9);
                doc.rect(margin + colWidths[0] + colWidths[1], y, colWidths[2], 9);
                doc.rect(totalX, y, colWidths[3], 9);
                doc.text('TOTAL GENERAL', totalX + 3, y + 6);
                doc.rect(totalX + colWidths[3], y, colWidths[4], 9);
                doc.text(String(totalPasajeros), totalX + colWidths[3] + 3, y + 6);
                
                y += 12;
                
                doc.setDrawColor(203, 213, 225);
                doc.line(margin, pageHeight - 12, pageWidth - margin, pageHeight - 12);
                doc.setFontSize(7);
                doc.setFont('helvetica', 'italic');
                doc.setTextColor(148, 163, 184);
                doc.text('Aventura Total - Sistema de Gestión de Reservas', pageWidth / 2, pageHeight - 6, { align: 'center' });
                
                const nombreArchivo = (filtroExcursion && filtroExcursion !== '') 
                    ? `reporte_${filtroExcursion.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 35)}.pdf`
                    : `reporte_reservas_${Date.now()}.pdf`;
                
                doc.save(nombreArchivo);
                
                // VERSIÓN ÉXITO - COMPACTA Y SIN SCROLL
                container.innerHTML = `
                    <div class="status-card">
                        <div class="success-icon">✅</div>
                        <div class="status-title success-text">¡Reporte generado!</div>
                        <div class="status-subtitle">El PDF se descargó correctamente</div>
                        <div class="info-card">
                            <div class="info-row">
                                <span class="info-label">📄 Título</span>
                                <span class="info-value titulo-destacado">${escapeHtml(titulo)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📋 Reservas</span>
                                <span class="info-value">${reservasFiltradas.length}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">👥 Pasajeros</span>
                                <span class="info-value">${totalPasajeros}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📁 Archivo</span>
                                <span class="info-value" style="font-size: 10px;">${nombreArchivo}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📐 Formato</span>
                                <span class="info-value">A4 Horizontal</span>
                            </div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="status-card">
                        <div class="error-icon">❌</div>
                        <div class="status-title error-text">Error al generar PDF</div>
                        <div class="status-subtitle">${error.message}</div>
                        <div class="info-card" style="background: #fef2f2;">
                            <div style="font-size: 12px; color: #991b1b;">Verificá la conexión y volvé a intentar</div>
                        </div>
                        <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
                    </div>
                `;
            }
        })();
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
