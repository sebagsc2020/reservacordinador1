        function parseCSV(csvText) {
            const lineas = csvText.split('\n');
            const resultados = [];
            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i].trim();
                if (!linea) continue;
                const fila = [];
                let campo = '';
                let enComillas = false;
                for (let j = 0; j < linea.length; j++) {
                    const char = linea[j];
                    if (char === '"') { enComillas = !enComillas; } 
                    else if (char === ',' && !enComillas) { fila.push(campo); campo = ''; } 
                    else { campo += char; }
                }
                fila.push(campo);
                resultados.push(fila.map(c => c.replace(/^"|"$/g, '').trim()));
            }
            return resultados;
        }

        function formatearFecha(fechaStr) {
            if (!fechaStr) return '';
            if (fechaStr.includes('/')) return fechaStr;
            const partes = fechaStr.split('-');
            if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
            return fechaStr;
        }

        function dividirExcursiones(texto) {
            if (!texto) return [];
            if (texto.includes('\n')) {
                return texto.split('\n').map(p => p.trim().replace(/^\d+\.\s*/, '')).filter(p => p);
            }
            return [texto.trim().replace(/^\d+\.\s*/, '')].filter(p => p);
        }
