<script>
    if (sessionStorage.getItem('crm_logged') !== 'true') { window.location.href = 'index.html'; }
    function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    function verificarSesionUnica() { const sessionId = sessionStorage.getItem('crm_session_id'); const sesionActiva = JSON.parse(localStorage.getItem('crm_sesion_activa') || '{}'); if (!sessionId || sesionActiva.id !== sessionId) { sessionStorage.clear(); alert('⚠️ Sesión cerrada.'); window.location.href = 'index.html'; return false; } localStorage.setItem('crm_sesion_activa', JSON.stringify({ ...sesionActiva, timestamp: Date.now() })); return true; }
    if (!verificarSesionUnica()) throw new Error('Sesión inválida'); setInterval(verificarSesionUnica, 10000);
    
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1NZCvbVp5durfrzeRGjerb3t25oWuMF822N7sLpKCQ5Q/gviz/tq?tqx=out:csv&sheet=Hoja%201';
    let clientesData = []; let reservasData = [];
    
    async function cargarDatos() {
        try {
            const respuesta = await fetch(SHEET_CSV_URL, { cache: 'no-store' }); const csv = await respuesta.text(); const lineas = csv.split('\n');
            const clientesMap = {}; reservasData = []; let actual = null, le = [];
            for (let i = 1; i < lineas.length; i++) { const linea = lineas[i].trim(); if (!linea) continue;
                if (linea.startsWith('"RES-') || linea.startsWith('RES-')) {
                    if (actual && le.length > 0) { const u = le[le.length-1]; const p = u.replace(/^"|"$/g,'').split('","'); if (p.length >= 4) { actual.fecha = p[1]||''; actual.personas = p[2]||'0'; actual.formaPago = p[3]||'No especificada'; if (p.length >= 5) actual.busqueda = p[4]||''; } le.pop(); if (le.length > 0) actual.excursion += '\n' + le.join('\n'); }
                    if (actual) reservasData.push(actual);
                    const v = []; let a = '', c = false; for (let j = 0; j < linea.length; j++) { const ch = linea[j]; if (ch === '"') c = !c; else if (ch === ',' && !c) { v.push(a.trim()); a = ''; } else a += ch; }
                    v.push(a.trim()); const l = v.map(x => x.replace(/^"|"$/g,'').trim());
                    actual = { id: l[0]||`R${i}`, nombre: l[2]||'', apellido: l[3]||'', email: l[4]||'', telefono: l[5]||'', pais: l[6]||'', ciudad: l[7]||'', excursion: l[8]||'', fecha: '', personas: '0', formaPago: 'No especificada', busqueda: '', estado: 'confirmado' }; le = [];
                    if (l[4] && !clientesMap[l[4].toLowerCase().trim()]) { clientesMap[l[4].toLowerCase().trim()] = { nombre: (l[2]+' '+(l[3]||'')).trim(), email: l[4].trim(), telefono: l[5]||'', pais: l[6]||'', ciudad: l[7]||'' }; }
                } else { if (actual) { const x = linea.replace(/^"|"$/g,'').trim(); if (x && !x.startsWith(',') && x.length > 3) le.push(x); } }
            }
            if (actual) { if (le.length > 0) { const u = le[le.length-1]; const p = u.replace(/^"|"$/g,'').split('","'); if (p.length >= 4) { actual.fecha = p[1]||''; actual.personas = p[2]||'0'; actual.formaPago = p[3]||'No especificada'; if (p.length >= 5) actual.busqueda = p[4]||''; } le.pop(); if (le.length > 0) actual.excursion += '\n' + le.join('\n'); } reservasData.push(actual); }
            clientesData = Object.values(clientesMap);
            console.log('✅ WhatsApp: ' + clientesData.length + ' clientes, ' + reservasData.length + ' reservas');
            console.log('📧 Emails:', clientesData.map(c => c.email));
            console.log('📧 Emails reservas:', reservasData.map(r => r.email));
        } catch(e) { console.error(e); }
    }
    
    function buscarUltimaReserva(email) {
        if (!reservasData || !reservasData.length) return null;
        const emailBusqueda = email.toLowerCase().trim().replace(/\s+/g, '');
        const reservas = reservasData.filter(r => { if (!r.email) return false; return r.email.toLowerCase().trim().replace(/\s+/g, '') === emailBusqueda; });
        console.log('🔍 Buscando:', emailBusqueda, '| Encontradas:', reservas.length);
        if (reservas.length > 0) { const u = reservas[reservas.length-1]; console.log('   ✅ Fecha:', u.fecha, '| Pax:', u.personas, '| Pago:', u.formaPago, '| Lugar:', u.busqueda); return u; }
        console.log('   ❌ No encontrada'); return null;
    }
    
    function seleccionarCliente(telefono, nombre, email) {
        document.getElementById('whatsappNumero').value = telefono.replace(/[^0-9]/g, '');
        document.getElementById('whatsappCliente').value = nombre;
        document.getElementById('whatsappCliente').classList.add('cliente-encontrado');
        const badge = document.getElementById('clienteEncontradoBadge'); badge.style.display = 'inline-block'; badge.className = 'cliente-badge';
        const reserva = buscarUltimaReserva(email); let info = '';
        if (reserva) {
            const pe = (reserva.excursion || '').split('\n')[0].replace(/^\d+\.\s*/, '').trim();
            info = ` | 🕐 ${pe.substring(0, 25)} | 📅 ${reserva.fecha} | 👥 ${reserva.personas} | 💳 ${reserva.formaPago}`;
            const msgEl = document.getElementById('whatsappMensaje');
            if (msgEl && msgEl.value) { msgEl.value = msgEl.value.replace(/\[NOMBRE\]/g, nombre).replace(/\[EXCURSION\]/g, pe || '[EXCURSION]').replace(/\[FECHA\]/g, reserva.fecha || '[FECHA]').replace(/\[PERSONAS\]/g, reserva.personas || '[PERSONAS]').replace(/\[PAGO\]/g, reserva.formaPago || '[PAGO]').replace(/\[LUGAR\]/g, reserva.busqueda || '[LUGAR]'); }
        }
        badge.textContent = '✅ ' + nombre + ' | ' + email + info;
        document.getElementById('resultadosBusqueda').classList.remove('show'); document.getElementById('buscadorCliente').value = '';
        localStorage.setItem('ultimoClienteWhatsApp', JSON.stringify({ telefono, nombre, email }));
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const buscadorInput = document.getElementById('buscadorCliente'); const resultadosDiv = document.getElementById('resultadosBusqueda');
        if (buscadorInput) { buscadorInput.addEventListener('input', function() { const t = this.value.toLowerCase().trim(); if (t.length < 2) { resultadosDiv.classList.remove('show'); return; } const r = clientesData.filter(c => c.nombre.toLowerCase().includes(t) || c.email.toLowerCase().includes(t) || (c.telefono||'').includes(t.replace(/[^0-9]/g,''))).slice(0,8); resultadosDiv.innerHTML = r.length === 0 ? '<div class="sin-resultados">No se encontraron</div>' : r.map(c => `<div class="resultado-item" onclick="seleccionarCliente('${c.telefono}','${c.nombre.replace(/'/g,"\\'")}','${c.email}')"><div class="resultado-info"><div class="resultado-nombre">${c.nombre}</div><div class="resultado-email">${c.email}</div></div><div class="resultado-telefono">📞 ${c.telefono||'Sin tel'}</div></div>`).join(''); resultadosDiv.classList.add('show'); }); }
        document.addEventListener('click', function(e) { if (!e.target.closest('.buscador-container') && resultadosDiv) resultadosDiv.classList.remove('show'); });
        const ultimo = JSON.parse(localStorage.getItem('ultimoClienteWhatsApp')||'null'); if (ultimo) { const numEl = document.getElementById('whatsappNumero'); const nomEl = document.getElementById('whatsappCliente'); if (numEl) numEl.value = ultimo.telefono?.replace(/[^0-9]/g,'')||''; if (nomEl) nomEl.value = ultimo.nombre||''; }
        const histEl = document.getElementById('historialWhatsApp'); const historial = JSON.parse(localStorage.getItem('historialWhatsApp')||'[]'); if (histEl) histEl.innerHTML = historial.length>0 ? historial.map(h => `<tr><td>${h.fecha}</td><td>${h.cliente}</td><td>${h.numero}</td><td><span class="badge badge-enviado">${h.estado}</span></td><td><button class="btn-reenviar" onclick="reenviar('${h.numero}','${h.cliente}')">💬</button></td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:#999;">Sin envíos</td></tr>';
    });
    
    const plantillas = { confirmacion: { mensaje: `✅ ¡Hola [NOMBRE]!\n\nTu reserva en Aventura Total ha sido CONFIRMADA.\n\n📍 Detalles:\n• Excursión: [EXCURSION]\n• Fecha: [FECHA]\n• Personas: [PERSONAS]\n• Forma de Pago: [PAGO]\n• Lugar: [LUGAR]\n\n🏔️ Aventura Total` }, recordatorio: { mensaje: `🔔 ¡Hola [NOMBRE]!\n\nTenés un pago pendiente.\n\n💳 Podés abonar por:\n• Efectivo\n• Débito/Crédito\n• Transferencia\n\n🏔️ Aventura Total` }, salida: { mensaje: `🚌 ¡Hola [NOMBRE]!\n\n¡Mañana es tu excursión! 🌟\n\n🎒 Llevá:\n• Ropa cómoda\n• Protector solar\n• Agua\n• Cámara\n\n📍 [LUGAR]\n\n🏔️ Aventura Total` }, agradecimiento: { mensaje: `🙏 ¡Hola [NOMBRE]!\n\n¿Disfrutaste la excursión?\n\n⭐ ¡Dejanos una reseña!\n\n🎉 10% OFF próxima reserva.\n\n🏔️ Aventura Total` }, promocion: { mensaje: `🎉 ¡Hola [NOMBRE]!\n\nBeneficios exclusivos:\n🔥 15% OFF\n👥 2x1 seleccionadas\n\n🏔️ Aventura Total` }, personalizado: { mensaje: '' } };
    function usarPlantilla(tipo) { let msg = plantillas[tipo].mensaje; const nomEl = document.getElementById('whatsappCliente'); if (nomEl && nomEl.value) msg = msg.replace(/\[NOMBRE\]/g, nomEl.value); const ultimo = JSON.parse(localStorage.getItem('ultimoClienteWhatsApp')||'null'); if (ultimo) { const reserva = buscarUltimaReserva(ultimo.email); if (reserva) { const pe = (reserva.excursion||'').split('\n')[0].replace(/^\d+\.\s*/,'').trim(); msg = msg.replace(/\[EXCURSION\]/g, pe||'[EXCURSION]').replace(/\[FECHA\]/g, reserva.fecha||'[FECHA]').replace(/\[PERSONAS\]/g, reserva.personas||'[PERSONAS]').replace(/\[PAGO\]/g, reserva.formaPago||'[PAGO]').replace(/\[LUGAR\]/g, reserva.busqueda||'[LUGAR]'); } } const msgEl = document.getElementById('whatsappMensaje'); if (msgEl) msgEl.value = msg; }
    function enviarWhatsApp() { const n = document.getElementById('whatsappNumero').value.replace(/[^0-9]/g,''), m = document.getElementById('whatsappMensaje').value, c = document.getElementById('whatsappCliente').value||'Cliente'; if (!n || !m) { alert('⚠️ Completá los campos'); return; } window.open('https://wa.me/'+n+'?text='+encodeURIComponent(m), '_blank'); agregarHistorial(c, n); document.getElementById('mensajeExito').classList.add('show'); setTimeout(() => document.getElementById('mensajeExito').classList.remove('show'), 4000); }
    function abrirWhatsAppWeb() { const n = document.getElementById('whatsappNumero').value.replace(/[^0-9]/g,''), m = document.getElementById('whatsappMensaje').value; if (!n) { alert('⚠️ Seleccioná un cliente'); return; } window.open('https://web.whatsapp.com/send?phone='+n+'&text='+encodeURIComponent(m), '_blank'); }
    const historial = JSON.parse(localStorage.getItem('historialWhatsApp')||'[]');
    function agregarHistorial(cliente, numero) { historial.unshift({ fecha: new Date().toLocaleString('es-ES'), cliente, numero, estado: 'enviado' }); if (historial.length > 20) historial.pop(); localStorage.setItem('historialWhatsApp', JSON.stringify(historial)); const histEl = document.getElementById('historialWhatsApp'); if (histEl) histEl.innerHTML = historial.length>0 ? historial.map(h => `<tr><td>${h.fecha}</td><td>${h.cliente}</td><td>${h.numero}</td><td><span class="badge badge-enviado">${h.estado}</span></td><td><button class="btn-reenviar" onclick="reenviar('${h.numero}','${h.cliente}')">💬</button></td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:#999;">Sin envíos</td></tr>'; }
    function reenviar(num, cliente) { document.getElementById('whatsappNumero').value = num; document.getElementById('whatsappCliente').value = cliente; }
    
    cargarDatos();
</script>
