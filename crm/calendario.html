<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendario - CRM Aventura Total</title>
    
    <!-- PWA CONFIGURACIÓN -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AVT CRM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6366f1">
    <meta name="application-name" content="Aventura Total CRM">
    
    <!-- Fuentes: Inter vía Fontsource -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.css">
    
    <!-- Iconos: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #10b981;
            --success-light: #d1fae5;
            --whatsapp: #25D366;
            --whatsapp-hover: #1da851;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --info: #3b82f6;
            --info-light: #dbeafe;
            --purple: #8b5cf6;
            --purple-light: #f3e8ff;
            
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --sidebar-bg: #ffffff;
            --sidebar-text: #475569;
            --sidebar-active-bg: #e0e7ff;
            --sidebar-active-text: #4338ca;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --sidebar-active-bg: #334155;
            --sidebar-active-text: #818cf8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LAYOUT ===== */
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border-color);
            position: fixed; height: 100vh; z-index: 1001;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        
        .sidebar-header { 
            padding: 20px 24px; 
            display: flex; align-items: center; gap: 12px; 
            border-bottom: 1px solid var(--border-color); 
            flex-shrink: 0;
        }
        .brand-icon { 
            width: 36px; height: 36px; 
            background: linear-gradient(135deg, var(--primary), #8b5cf6); 
            border-radius: var(--radius-sm); 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 20px; 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            flex-shrink: 0;
        }
        .brand-text { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; color: var(--text-main); }
        .brand-text span { color: var(--primary); }

        .nav-menu { list-style: none; padding: 16px 12px; flex: 1; overflow-y: auto; }
        .nav-item { margin-bottom: 4px; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            color: var(--sidebar-text); text-decoration: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; transition: all 0.2s ease;
        }
        .nav-link i { font-size: 20px; flex-shrink: 0; }
        .nav-link:hover { background: var(--bg-body); color: var(--primary); }
        .nav-link.active { background: var(--sidebar-active-bg); color: var(--sidebar-active-text); font-weight: 600; }
        
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .user-profile { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: var(--radius-sm); background: var(--bg-body); 
            cursor: pointer; transition: background 0.2s;
        }
        .user-profile:hover { background: var(--border-color); }
        .avatar { 
            width: 36px; height: 36px; background: var(--primary); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 600; font-size: 14px; flex-shrink: 0;
        }
        .user-details { overflow: hidden; }
        .user-details h4 { font-size: 13px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-details p { font-size: 11px; color: var(--text-muted); }

        .main-content { margin-left: 260px; flex: 1; padding: 32px; transition: margin-left 0.3s; width: 100%; }
        
        /* Mobile Menu */
        .menu-toggle { 
            display: none; position: fixed; top: 16px; left: 16px; z-index: 1002; 
            background: var(--bg-surface); border: 1px solid var(--border-color); 
            width: 44px; height: 44px; border-radius: var(--radius-sm); cursor: pointer; 
            color: var(--text-main); box-shadow: var(--shadow-md); 
            align-items: center; justify-content: center;
        }
        .overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); 
            z-index: 1000; opacity: 0; pointer-events: none; 
            transition: opacity 0.3s; backdrop-filter: blur(4px); 
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        /* ===== HEADER ===== */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 24px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }
        .page-title p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        
        .actions-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn { 
            padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; 
            cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; 
            transition: all 0.2s ease; white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-warning { background: var(--warning); color: #78350f; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .btn-whatsapp:hover { background: var(--whatsapp-hover); }
        .btn-icon { 
            width: 40px; height: 40px; border-radius: 50%; background: var(--bg-surface); 
            border: 1px solid var(--border-color); color: var(--text-muted); 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .btn-icon:hover { color: var(--primary); border-color: var(--primary); }
        .btn-xs { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

        /* ===== EVENT CARDS ===== */
        .eventos-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 20px; margin-top: 24px; 
        }
        
        .evento-card {
            background: var(--bg-surface); border-radius: var(--radius); 
            overflow: hidden; box-shadow: var(--shadow-sm); 
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex; flex-direction: column;
        }
        .evento-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        
        .evento-header {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white; padding: 20px 24px; 
        }
        .evento-titulo { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .evento-meta { 
            font-size: 12px; opacity: 0.9; display: flex; flex-wrap: wrap; gap: 12px; 
        }
        .evento-meta span { display: flex; align-items: center; gap: 4px; }
        
        .evento-acciones { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; 
            padding: 16px 24px; background: var(--bg-body); 
            border-top: 1px solid var(--border-color); 
        }
        .btn-card { 
            padding: 8px 6px; border: none; border-radius: var(--radius-sm); 
            cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; 
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn-card:active { transform: scale(0.95); }
        .btn-card-view { background: var(--primary); color: white; }
        .btn-card-whatsapp { background: var(--whatsapp); color: white; }
        .btn-card-edit { background: var(--warning); color: #78350f; }
        .btn-card-delete { background: var(--danger); color: white; }
        .dark-mode .btn-card-edit { color: #fef3c7; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); 
            z-index: 2000; display: flex; align-items: center; justify-content: center; 
            padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg-surface); border-radius: var(--radius); 
            max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; 
            box-shadow: var(--shadow-lg); border: 1px solid var(--border-color);
        }
        .modal-header { 
            padding: 20px 24px; border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: var(--bg-surface); z-index: 10; 
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .modal-header h3 { font-size: 16px; font-weight: 600; color: var(--primary); }
        .modal-close { 
            background: none; border: none; font-size: 22px; cursor: pointer; 
            color: var(--text-muted); padding: 4px; border-radius: 50%; 
            transition: all 0.2s; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { color: var(--danger); background: var(--danger-light); }
        .modal-body { padding: 24px; }
        .modal-footer { 
            padding: 16px 24px; border-top: 1px solid var(--border-color); 
            position: sticky; bottom: 0; background: var(--bg-surface); 
            border-radius: 0 0 var(--radius) var(--radius);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { 
            display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; 
        }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); 
            border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; 
            background: var(--bg-body); color: var(--text-main); transition: border-color 0.2s; 
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* ===== DÍAS Y NOTAS ===== */
        .dias-container { margin-top: 16px; }
        .dia-card { 
            background: var(--bg-body); border-radius: var(--radius-sm); 
            padding: 16px; margin-bottom: 12px; 
            border: 1px solid var(--border-color);
        }
        .dia-titulo { 
            font-weight: 700; color: var(--primary); font-size: 15px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 8px; 
        }
        .nota-item { 
            background: var(--bg-surface); border-radius: var(--radius-sm); 
            padding: 12px 14px; margin-bottom: 8px; 
            border-left: 4px solid var(--primary); 
            box-shadow: var(--shadow-sm);
        }
        .nota-texto { font-size: 13px; color: var(--text-main); margin-bottom: 6px; line-height: 1.5; }
        .nota-tipo { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .nota-actions { display: flex; gap: 6px; }
        
        .btn-add-nota {
            width: 100%; padding: 10px; background: var(--bg-surface); 
            color: var(--text-muted); border: 1px dashed var(--border-color); 
            border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; 
            font-weight: 500; transition: all 0.2s; margin-top: 8px;
        }
        .btn-add-nota:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .dark-mode .btn-add-nota:hover { background: rgba(99, 102, 241, 0.1); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }

        /* Preloader */
        .preloader-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
            transition: opacity 0.3s ease;
        }
        .preloader-popup.oculto { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-content { 
            background: var(--bg-surface); border-radius: var(--radius); 
            padding: 40px 50px; text-align: center; box-shadow: var(--shadow-lg);
        }
        .preloader-spinner { 
            width: 56px; height: 56px; border: 4px solid var(--border-color); 
            border-top-color: var(--primary); border-right-color: var(--purple);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .preloader-title { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .preloader-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .main-content { margin-left: 0; padding: 20px; padding-top: 76px; }
            .menu-toggle { display: flex; }
            
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .eventos-grid { grid-template-columns: 1fr; gap: 16px; }
            .evento-acciones { grid-template-columns: repeat(2, 1fr); }
            .modal-content { max-height: 90vh; }
        }

        @media (max-width: 480px) {
            .page-title h1 { font-size: 20px; }
            .evento-acciones { grid-template-columns: 1fr 1fr; }
            .evento-meta { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

    <!-- Mobile Toggle -->
    <button class="menu-toggle" id="menuBtn" aria-label="Abrir menú"><i class="ph ph-list" style="font-size: 24px;"></i></button>
    <div class="overlay" id="menuOverlay"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-icon"><i class="ph-bold ph-mountains"></i></div>
                <div class="brand-text">Aventura<span>Total</span></div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="ph ph-squares-four"></i> Dashboard</a></li>
                <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="ph ph-users"></i> Clientes</a></li>
                <li class="nav-item"><a href="reservas.html" class="nav-link"><i class="ph ph-calendar-check"></i> Reservas</a></li>
                <li class="nav-item"><a href="seguimiento.html" class="nav-link"><i class="ph ph-chart-line-up"></i> Seguimiento</a></li>
                <li class="nav-item"><a href="emails.html" class="nav-link"><i class="ph ph-whatsapp-logo"></i> WhatsApp</a></li>
                <li class="nav-item"><a href="calendario.html" class="nav-link active"><i class="ph ph-calendar"></i> Calendario</a></li>
                <li class="nav-item"><a href="clima.html" class="nav-link"><i class="ph ph-cloud-sun"></i> Clima</a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-profile" onclick="logout()">
                    <div class="avatar">AD</div>
                    <div class="user-details">
                        <h4>Administrador</h4>
                        <p>Cerrar Sesión</p>
                    </div>
                    <i class="ph ph-sign-out" style="margin-left: auto; color: var(--text-muted); font-size: 18px;"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="page-header">
                <div class="page-title">
                    <h1>Calendario de Eventos</h1>
                    <p>Gestiona tus eventos, itinerarios y notas diarias.</p>
                </div>
                <div class="actions-group">
                    <button class="btn-icon" onclick="toggleTheme()" title="Cambiar tema"><i class="ph ph-moon" id="themeIcon"></i></button>
                    <button class="btn btn-success" onclick="mostrarModalCrearEvento()"><i class="ph ph-plus-circle"></i> Crear evento</button>
                </div>
            </header>

            <!-- Events Grid -->
            <div id="eventosContainer" class="eventos-grid">
                <div class="empty-state" style="grid-column: 1/-1;"><div class="preloader-spinner" style="margin: 0 auto 16px;"></div>Cargando eventos...</div>
            </div>
        </main>
    </div>

    <!-- Preloader -->
    <div id="preloaderPopup" class="preloader-popup oculto">
        <div class="preloader-content">
            <div class="preloader-spinner"></div>
            <div class="preloader-title">Sincronizando</div>
            <div class="preloader-subtitle">Conectando con el servidor...</div>
        </div>
    </div>

    <script>
        // ==================================================
        // LOGICA UI & TEMA
        // ==================================================
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menuOverlay');
        const themeIcon = document.getElementById('themeIcon');
        
        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }
        
        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);
        
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => { if (window.innerWidth <= 768) closeMenu(); });
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            themeIcon.className = isDark ? 'ph ph-sun' : 'ph ph-moon';
        }

        if (localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            themeIcon.className = 'ph ph-sun';
        }

        // ==================================================
        // SERVICE WORKER
        // ==================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log(err)); });
        }
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            document.body.classList.add('pwa-mode');
        }

        // ==================================================
        // CONFIGURACIÓN
        // ==================================================
        if (sessionStorage.getItem('crm_logged') !== 'true') { window.location.href = 'index.html'; }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxvsRbRQn-Ty10gIH7u49aOVNg7tbd_BlRFpvYVau5vPfmXs6xPDeCX2hxz4l2f0mBHjA/exec';
        let eventos = [];

        const preloaderPopup = document.getElementById('preloaderPopup');
        function mostrarPreloader() { if (preloaderPopup) preloaderPopup.classList.remove('oculto'); }
        function ocultarPreloader() { if (preloaderPopup) preloaderPopup.classList.add('oculto'); }

        const CACHE_DURACION = 60000;
        function guardarEventosEnCache(datos) { localStorage.setItem('eventosCache', JSON.stringify({ timestamp: Date.now(), eventos: datos })); }
        function obtenerEventosDeCache() { const cache = localStorage.getItem('eventosCache'); if (!cache) return null; const data = JSON.parse(cache); if (Date.now() - data.timestamp < CACHE_DURACION) return data.eventos; return null; }

        function convertirFechaISOtoDDMMYYYY(fechaIso) {
            if (!fechaIso) return '';
            const fecha = new Date(fechaIso);
            if (isNaN(fecha.getTime())) return fechaIso;
            const dia = fecha.getDate().toString().padStart(2, '0');
            const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
            const anio = fecha.getFullYear();
            return `${dia}/${mes}/${anio}`;
        }

        function formatearRangoFechas(fechaInicio, fechaFin) {
            const inicio = convertirFechaISOtoDDMMYYYY(fechaInicio);
            const fin = convertirFechaISOtoDDMMYYYY(fechaFin);
            return `Del ${inicio} al ${fin}`;
        }

        function renderizarEventos(eventosData) {
            const container = document.getElementById('eventosContainer');
            if (!container) return;
            if (!eventosData || eventosData.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="ph ph-calendar-x" style="font-size: 48px; color: var(--text-muted);"></i><p style="margin-top: 12px;">No hay eventos creados</p><p style="font-size: 13px;">Haz clic en "Crear evento" para comenzar</p></div>';
                return;
            }
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
            
            container.innerHTML = eventosData.map(evento => `
                <div class="evento-card">
                    <div class="evento-header">
                        <div class="evento-titulo">${escapeHtml(evento.nombre)}</div>
                        <div class="evento-meta">
                            <span><i class="ph ph-calendar"></i> ${formatearRangoFechas(evento.fechaInicio, evento.fechaFin)}</span>
                            <span><i class="ph ph-users"></i> ${evento.pax} pasajeros</span>
                        </div>
                    </div>
                    <div class="evento-acciones">
                        <button class="btn-card btn-card-view" onclick="verEvento('${evento.id}')"><i class="ph ph-eye"></i> Ver</button>
                        <button class="btn-card btn-card-whatsapp" onclick="compartirEvento('${evento.id}')"><i class="ph ph-whatsapp-logo"></i> WhatsApp</button>
                        <button class="btn-card btn-card-edit" onclick="editarEvento('${evento.id}')"><i class="ph ph-pencil"></i> Editar</button>
                        <button class="btn-card btn-card-delete" onclick="eliminarEvento('${evento.id}')"><i class="ph ph-trash"></i> Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        async function cargarEventos() {
            const eventosCache = obtenerEventosDeCache();
            if (eventosCache && eventosCache.length > 0) { console.log('📦 Calendario - Usando caché local'); eventos = eventosCache; renderizarEventos(eventos); setTimeout(() => cargarEventosDesdeRed(), 500); return; }
            await cargarEventosDesdeRed();
        }

        async function cargarEventosDesdeRed() {
            const container = document.getElementById('eventosContainer');
            try {
                mostrarPreloader();
                console.log('📡 Cargando eventos desde Google Apps Script...');
                const url = `${APP_SCRIPT_URL}?action=obtenerEventos&t=${Date.now()}&limite=100`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.success && data.eventos) { eventos = data.eventos; guardarEventosEnCache(eventos); renderizarEventos(eventos); }
                else { container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">❌ Error: ${data.message}</div>`; }
            } catch (error) { console.error('Error:', error); container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">❌ Error al conectar con el servidor</div>'; }
            finally { ocultarPreloader(); }
        }

        function mostrarModalCrearEvento() {
            const modalHtml = `
                <div id="modalCrearEvento" class="modal-overlay" onclick="if(event.target===this) cerrarModal('modalCrearEvento')">
                    <div class="modal-content">
                        <div class="modal-header"><h3><i class="ph ph-plus-circle"></i> Crear nuevo evento</h3><button class="modal-close" onclick="cerrarModal('modalCrearEvento')"><i class="ph ph-x"></i></button></div>
                        <div class="modal-body">
                            <div class="form-group"><label>Nombre del evento</label><input type="text" id="eventoNombre" placeholder="Ej: Camboriu 45 Pax"></div>
                            <div class="form-group"><label>Fecha de inicio</label><input type="date" id="eventoFechaInicio"></div>
                            <div class="form-group"><label>Fecha de fin</label><input type="date" id="eventoFechaFin"></div>
                            <div class="form-group"><label>Cantidad de pasajeros</label><input type="number" id="eventoPax" placeholder="0"></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-success" style="width:100%; justify-content:center;" onclick="crearEvento()"><i class="ph ph-check"></i> Crear evento</button></div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function crearEvento() {
            const nombre = document.getElementById('eventoNombre')?.value;
            const fechaInicioInput = document.getElementById('eventoFechaInicio')?.value;
            const fechaFinInput = document.getElementById('eventoFechaFin')?.value;
            const pax = document.getElementById('eventoPax')?.value || '0';
            if (!nombre || !fechaInicioInput || !fechaFinInput) { alert('⚠️ Por favor, complete todos los campos'); return; }
            mostrarPreloader();
            try {
                const eventoId = 'EV-' + Date.now();
                const formData = new URLSearchParams();
                formData.append('action', 'guardarEvento'); formData.append('id', eventoId); formData.append('nombre', nombre); formData.append('fechaInicio', fechaInicioInput); formData.append('fechaFin', fechaFinInput); formData.append('pax', pax); formData.append('estado', 'activo');
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Evento creado correctamente'); cerrarModal('modalCrearEvento'); await cargarEventosDesdeRed(); }
                else { alert('❌ Error al crear evento: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        async function editarEvento(eventoId) {
            const evento = eventos.find(e => e.id === eventoId);
            if (!evento) { alert('❌ Evento no encontrado'); return; }
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
            const modalHtml = `
                <div id="modalEditarEvento" class="modal-overlay" onclick="if(event.target===this) cerrarModal('modalEditarEvento')">
                    <div class="modal-content">
                        <div class="modal-header"><h3><i class="ph ph-pencil"></i> Editar evento</h3><button class="modal-close" onclick="cerrarModal('modalEditarEvento')"><i class="ph ph-x"></i></button></div>
                        <div class="modal-body">
                            <div class="form-group"><label>Nombre del evento</label><input type="text" id="editarEventoNombre" value="${escapeHtml(evento.nombre)}"></div>
                            <div class="form-group"><label>Cantidad de pasajeros</label><input type="number" id="editarEventoPax" value="${evento.pax}"></div>
                            <div class="form-group"><label>Fecha de inicio</label><input type="date" id="editarEventoFechaInicio" value="${evento.fechaInicio.split('T')[0] || ''}"></div>
                            <div class="form-group"><label>Fecha de fin</label><input type="date" id="editarEventoFechaFin" value="${evento.fechaFin.split('T')[0] || ''}"></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="actualizarEvento('${eventoId}')"><i class="ph ph-floppy-disk"></i> Guardar cambios</button></div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function actualizarEvento(eventoId) {
            const nuevoNombre = document.getElementById('editarEventoNombre')?.value;
            const nuevoPax = document.getElementById('editarEventoPax')?.value;
            const nuevaFechaInicio = document.getElementById('editarEventoFechaInicio')?.value;
            const nuevaFechaFin = document.getElementById('editarEventoFechaFin')?.value;
            if (!nuevoNombre) { alert('⚠️ El nombre del evento es obligatorio'); return; }
            mostrarPreloader();
            try {
                const formData = new URLSearchParams();
                formData.append('action', 'actualizarEvento'); formData.append('id', eventoId); formData.append('nombre', nuevoNombre); formData.append('pax', nuevoPax || '0');
                if (nuevaFechaInicio) formData.append('fechaInicio', nuevaFechaInicio);
                if (nuevaFechaFin) formData.append('fechaFin', nuevaFechaFin);
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Evento actualizado correctamente'); cerrarModal('modalEditarEvento'); await cargarEventosDesdeRed(); }
                else { alert('❌ Error al actualizar evento: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        async function verEvento(eventoId) {
            mostrarPreloader();
            try {
                const url = `${APP_SCRIPT_URL}?action=obtenerEventoCompleto&eventoId=${eventoId}&t=${Date.now()}`;
                const response = await fetch(url); const data = await response.json();
                if (!data.success || !data.evento) { alert('Error al cargar el evento'); ocultarPreloader(); return; }
                const evento = data.evento; const notasEvento = data.notas || [];
                const fechaInicioDate = new Date(evento.fechaInicio); const fechaFinDate = new Date(evento.fechaFin);
                const fechas = []; const maxDias = 30; let diasContados = 0;
                for (let d = new Date(fechaInicioDate); d <= fechaFinDate && diasContados < maxDias; d.setDate(d.getDate() + 1)) {
                    fechas.push(`${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`); diasContados++;
                }
                const notasPorFecha = {};
                notasEvento.forEach(nota => { let fn = nota.fecha; if (fn && fn.includes('T')) fn = convertirFechaISOtoDDMMYYYY(fn); if (!notasPorFecha[fn]) notasPorFecha[fn] = []; notasPorFecha[fn].push(nota); });
                
                function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
                
                let diasHtml = '';
                for (const fecha of fechas) {
                    const notasDelDia = notasPorFecha[fecha] || [];
                    let notasHtml = notasDelDia.length === 0 ? '<div style="color:var(--text-muted); font-size:12px; padding:8px;">Sin notas para este día</div>' : notasDelDia.map(nota => `
                        <div class="nota-item">
                            <div class="nota-texto">${escapeHtml(nota.nota)}</div>
                            <div class="nota-tipo">${nota.tipo === 'mañana' ? '🌅 Mañana' : '🌙 Tarde'}</div>
                            <div class="nota-actions">
                                <button class="btn btn-warning btn-xs" onclick="editarNota('${nota.id}', '${evento.id}', '${fecha}', '${escapeHtml(nota.nota).replace(/'/g, "\\'")}', '${nota.tipo}')"><i class="ph ph-pencil"></i> Editar</button>
                                <button class="btn btn-danger btn-xs" onclick="eliminarNota('${nota.id}', '${evento.id}')"><i class="ph ph-trash"></i> Eliminar</button>
                            </div>
                        </div>`).join('');
                    
                    diasHtml += `
                        <div class="dia-card">
                            <div class="dia-titulo"><i class="ph ph-calendar-dot"></i> ${fecha}</div>
                            ${notasHtml}
                            <button class="btn-add-nota" onclick="mostrarModalAgregarNota('${evento.id}', '${fecha}')"><i class="ph ph-plus"></i> Agregar nota</button>
                        </div>`;
                }
                
                const modalHtml = `
                    <div id="modalEvento" class="modal-overlay" onclick="if(event.target===this) cerrarModal('modalEvento')">
                        <div class="modal-content">
                            <div class="modal-header"><h3><i class="ph ph-calendar"></i> ${escapeHtml(evento.nombre)}</h3><button class="modal-close" onclick="cerrarModal('modalEvento')"><i class="ph ph-x"></i></button></div>
                            <div class="modal-body">
                                <p style="margin-bottom:6px;"><strong>📅 Período:</strong> ${formatearRangoFechas(evento.fechaInicio, evento.fechaFin)}</p>
                                <p style="margin-bottom:16px;"><strong>👥 Pasajeros:</strong> ${evento.pax}</p>
                                <div class="dias-container">${diasHtml}</div>
                            </div>
                        </div>
                    </div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            } catch (error) { console.error('Error:', error); alert('Error al cargar el evento'); }
            finally { ocultarPreloader(); }
        }

        function mostrarModalAgregarNota(eventoId, fecha) {
            const modalHtml = `
                <div id="modalAgregarNota" class="modal-overlay" onclick="if(event.target===this) cerrarModal('modalAgregarNota')">
                    <div class="modal-content">
                        <div class="modal-header"><h3><i class="ph ph-note-pencil"></i> Agregar nota - ${fecha}</h3><button class="modal-close" onclick="cerrarModal('modalAgregarNota')"><i class="ph ph-x"></i></button></div>
                        <div class="modal-body">
                            <div class="form-group"><label>Nota</label><textarea id="notaTexto" rows="3" placeholder="Escriba su nota aquí..."></textarea></div>
                            <div class="form-group"><label>Momento del día</label><select id="notaTipo"><option value="mañana">🌅 Mañana</option><option value="tarde">🌙 Tarde</option></select></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-success" style="width:100%; justify-content:center;" onclick="guardarNota('${eventoId}', '${fecha}')"><i class="ph ph-floppy-disk"></i> Guardar nota</button></div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function guardarNota(eventoId, fecha) {
            const texto = document.getElementById('notaTexto')?.value;
            const tipo = document.getElementById('notaTipo')?.value;
            if (!texto) { alert('⚠️ Por favor, escriba una nota'); return; }
            mostrarPreloader();
            try {
                const notaId = 'NOTA-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                const formData = new URLSearchParams();
                formData.append('action', 'guardarNota'); formData.append('id', notaId); formData.append('eventoId', eventoId); formData.append('fecha', fecha); formData.append('nota', texto); formData.append('tipo', tipo);
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Nota guardada correctamente'); cerrarModal('modalAgregarNota'); cerrarModal('modalEvento'); await verEvento(eventoId); }
                else { alert('❌ Error al guardar nota: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        function editarNota(notaId, eventoId, fecha, textoActual, tipoActual) {
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
            const modalHtml = `
                <div id="modalEditarNota" class="modal-overlay" onclick="if(event.target===this) cerrarModal('modalEditarNota')">
                    <div class="modal-content">
                        <div class="modal-header"><h3><i class="ph ph-pencil"></i> Editar nota - ${fecha}</h3><button class="modal-close" onclick="cerrarModal('modalEditarNota')"><i class="ph ph-x"></i></button></div>
                        <div class="modal-body">
                            <div class="form-group"><label>Nota</label><textarea id="notaTextoEditar" rows="3">${escapeHtml(textoActual)}</textarea></div>
                            <div class="form-group"><label>Momento del día</label><select id="notaTipoEditar"><option value="mañana" ${tipoActual==='mañana'?'selected':''}>🌅 Mañana</option><option value="tarde" ${tipoActual==='tarde'?'selected':''}>🌙 Tarde</option></select></div>
                        </div>
                        <div class="modal-footer"><button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="actualizarNota('${notaId}', '${eventoId}')"><i class="ph ph-floppy-disk"></i> Actualizar nota</button></div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function actualizarNota(notaId, eventoId) {
            const texto = document.getElementById('notaTextoEditar')?.value;
            const tipo = document.getElementById('notaTipoEditar')?.value;
            if (!texto) { alert('⚠️ Por favor, escriba una nota'); return; }
            mostrarPreloader();
            try {
                const formData = new URLSearchParams();
                formData.append('action', 'actualizarNota'); formData.append('id', notaId); formData.append('nota', texto); formData.append('tipo', tipo);
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Nota actualizada correctamente'); cerrarModal('modalEditarNota'); cerrarModal('modalEvento'); await verEvento(eventoId); }
                else { alert('❌ Error al actualizar nota: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        async function eliminarNota(notaId, eventoId) {
            if (!confirm('⚠️ ¿Estás seguro de eliminar esta nota?')) return;
            mostrarPreloader();
            try {
                const formData = new URLSearchParams(); formData.append('action', 'eliminarNota'); formData.append('id', notaId);
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Nota eliminada correctamente'); cerrarModal('modalEvento'); await verEvento(eventoId); }
                else { alert('❌ Error al eliminar nota: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        async function eliminarEvento(eventoId) {
            if (!confirm('⚠️ ¿Estás seguro de eliminar este evento? Se eliminarán también todas las notas asociadas.')) return;
            mostrarPreloader();
            try {
                const formData = new URLSearchParams(); formData.append('action', 'eliminarEvento'); formData.append('id', eventoId);
                const response = await fetch(APP_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData.toString() });
                const data = await response.json();
                if (data.success) { alert('✅ Evento eliminado correctamente'); await cargarEventosDesdeRed(); }
                else { alert('❌ Error al eliminar evento: ' + data.message); }
            } catch (error) { console.error('Error:', error); alert('❌ Error al conectar con el servidor'); }
            finally { ocultarPreloader(); }
        }

        async function compartirEvento(eventoId) {
            mostrarPreloader();
            try {
                const url = `${APP_SCRIPT_URL}?action=obtenerEventoCompleto&eventoId=${eventoId}&t=${Date.now()}`;
                const response = await fetch(url); const data = await response.json();
                if (!data.success || !data.evento) { alert('Error al cargar el evento'); ocultarPreloader(); return; }
                const evento = data.evento; const notasEvento = data.notas || [];
                const fechaInicioDate = new Date(evento.fechaInicio); const fechaFinDate = new Date(evento.fechaFin);
                const fechasConNotas = []; let diasContados = 0; const maxDias = 14;
                for (let d = new Date(fechaInicioDate); d <= fechaFinDate && diasContados < maxDias; d.setDate(d.getDate() + 1)) {
                    const fechaStr = `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
                    const notasDelDia = notasEvento.filter(nota => { let fn = nota.fecha; if (fn && fn.includes('T')) fn = convertirFechaISOtoDDMMYYYY(fn); return fn === fechaStr; });
                    fechasConNotas.push({ fecha: fechaStr, notas: notasDelDia }); diasContados++;
                }
                let mensaje = `🏔️ *AVENTURA TOTAL* 🏔️\n\n📅 *EVENTO: ${evento.nombre}*\n👥 *Pasajeros:* ${evento.pax}\n\n📋 *ITINERARIO DIARIO:*\n........................................\n\n`;
                for (const item of fechasConNotas) {
                    mensaje += `📅 *${item.fecha}*\n`;
                    if (item.notas.length === 0) mensaje += `   Sin actividades programadas\n`;
                    else item.notas.forEach(nota => { const icono = nota.tipo === 'mañana' ? '🌅' : '🌙'; mensaje += `   ${icono} ${nota.nota}\n`; });
                    mensaje += `\n........................................\n\n`;
                }
                mensaje += `🔗 *Reserve sus excursiones aquí*\nhttps://sebagsc2020.github.io/reservacordinador1/index.html\n\n🏔️ ¡Gracias por confiar en Aventura Total!`;
                window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
            } catch (error) { console.error('Error:', error); alert('Error al generar el mensaje'); }
            finally { ocultarPreloader(); }
        }

        function cerrarModal(modalId) { const modal = document.getElementById(modalId); if (modal) modal.remove(); }

        function init() {
            cargarEventos();
        }

        window.verEvento = verEvento;
        window.cerrarModal = cerrarModal;
        window.mostrarModalCrearEvento = mostrarModalCrearEvento;
        window.crearEvento = crearEvento;
        window.editarEvento = editarEvento;
        window.actualizarEvento = actualizarEvento;
        window.mostrarModalAgregarNota = mostrarModalAgregarNota;
        window.guardarNota = guardarNota;
        window.editarNota = editarNota;
        window.actualizarNota = actualizarNota;
        window.eliminarNota = eliminarNota;
        window.compartirEvento = compartirEvento;
        window.eliminarEvento = eliminarEvento;
        window.logout = logout;
        window.toggleTheme = toggleTheme;

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
