<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calendario - CRM Aventura Total</title>
    <style>
        /* ... tus estilos existentes ... */
    </style>
</head>
<body>
    <!-- ... tu HTML existente ... -->

    <script>
        // ==================================================
        // CONFIGURACIÓN
        // ==================================================
        if (sessionStorage.getItem('crm_logged') !== 'true') { 
            window.location.href = 'index.html'; 
        }
        
        function logout() { 
            sessionStorage.clear(); 
            window.location.href = 'index.html'; 
        }

        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxvsRbRQn-Ty10gIH7u49aOVNg7tbd_BlRFpvYVau5vPfmXs6xPDeCX2hxz4l2f0mBHjA/exec';
        
        let eventos = [];

        const preloaderPopup = document.getElementById('preloaderPopup');
        function mostrarPreloader() { if (preloaderPopup) preloaderPopup.classList.remove('oculto'); }
        function ocultarPreloader() { if (preloaderPopup) preloaderPopup.classList.add('oculto'); }
        
        // ==================================================
        // FUNCIONES DE FECHAS OPTIMIZADAS
        // ==================================================
        function dateToDDMMYYYY(fecha) {
            if (!fecha) return '';
            if (fecha instanceof Date && !isNaN(fecha.getTime())) {
                const dia = fecha.getDate().toString().padStart(2, '0');
                const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
                const anio = fecha.getFullYear();
                return `${dia}/${mes}/${anio}`;
            }
            return '';
        }

        function formatearFechaParaMostrar(fechaInput) {
            if (!fechaInput) return '';
            
            if (typeof fechaInput === 'string' && fechaInput.includes('/') && fechaInput.length === 10) {
                return fechaInput;
            }
            
            let fecha = null;
            
            if (fechaInput instanceof Date) {
                fecha = fechaInput;
            }
            else if (typeof fechaInput === 'string') {
                let fechaLimpia = fechaInput;
                if (fechaLimpia.includes('T')) {
                    const match = fechaLimpia.match(/(\d{1,2})T.*?(\d{1,2})\/(\d{4})/);
                    if (match) {
                        return `${match[1].padStart(2,'0')}/${match[2].padStart(2,'0')}/${match[3]}`;
                    }
                }
                fecha = new Date(fechaLimpia);
            }
            
            if (fecha && !isNaN(fecha.getTime())) {
                const dia = fecha.getDate().toString().padStart(2, '0');
                const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
                const anio = fecha.getFullYear();
                return `${dia}/${mes}/${anio}`;
            }
            
            return String(fechaInput);
        }

        function formatearRangoFechas(fechaInicio, fechaFin) {
            const inicio = formatearFechaParaMostrar(fechaInicio);
            const fin = formatearFechaParaMostrar(fechaFin);
            return `Del ${inicio} al ${fin}`;
        }
        
        // ==================================================
        // MENÚ FLOTANTE
        // ==================================================
        function initMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const sidebar = document.getElementById('sidebar');
            const menuOverlay = document.getElementById('menuOverlay');
            if (!menuBtn || !sidebar || !menuOverlay) return;
            
            function toggleMenu() {
                sidebar.classList.toggle('open');
                menuOverlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
            }
            function closeMenu() {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
            menuBtn.addEventListener('click', toggleMenu);
            menuOverlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.addEventListener('click', () => { if (window.innerWidth <= 768) closeMenu(); });
            });
        }
        
        // ==================================================
        // CARGAR EVENTOS
        // ==================================================
        async function cargarEventos() {
            mostrarPreloader();
            try {
                const url = `${APP_SCRIPT_URL}?action=obtenerEventos&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.eventos) {
                    eventos = data.eventos;
                    renderizarEventos();
                } else {
                    document.getElementById('eventosContainer').innerHTML = `<div style="text-align:center; padding:50px;">❌ Error: ${data.message}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('eventosContainer').innerHTML = '<div style="text-align:center; padding:50px;">❌ Error al conectar con el servidor</div>';
            } finally {
                ocultarPreloader();
            }
        }
        
        // ==================================================
        // RENDERIZAR EVENTOS
        // ==================================================
        function renderizarEventos() {
            const container = document.getElementById('eventosContainer');
            if (!container) return;
            
            if (eventos.length === 0) {
                container.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:50px;">📭 No hay eventos creados. Haz clic en "Crear nuevo evento"</div>';
                return;
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            container.innerHTML = eventos.map(evento => `
                <div class="evento-card">
                    <div class="evento-header">
                        <div class="evento-titulo">${escapeHtml(evento.nombre)}</div>
                        <div class="evento-fechas">📅 ${formatearRangoFechas(evento.fechaInicio, evento.fechaFin)}</div>
                        <div class="evento-pax">👥 ${evento.pax} pasajeros</div>
                    </div>
                    <div class="evento-acciones">
                        <button class="btn-ver-evento" onclick="verEvento('${evento.id}')">📋 Ver días</button>
                        <button class="btn-whatsapp-evento" onclick="compartirEvento('${evento.id}')">💬 WhatsApp</button>
                        <button class="btn-eliminar-evento" onclick="eliminarEvento('${evento.id}')">🗑️ Eliminar</button>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================================================
        // EL RESTO DE TUS FUNCIONES (verEvento, crearEvento, etc.)
        // ==================================================
        // ... mantén aquí el resto de tus funciones existentes ...
        
        // Asegúrate de actualizar también en verEvento la visualización del período:
        // En verEvento, busca donde muestra el período y cámbialo por:
        // <p><strong>📅 Período:</strong> ${formatearRangoFechas(evento.fechaInicio, evento.fechaFin)}</p>
        
        // ==================================================
        // INICIALIZAR
        // ==================================================
        function init() {
            initMenu();
            cargarEventos();
        }
        
        // Exponer funciones globalmente
        window.verEvento = verEvento;
        window.cerrarModal = cerrarModal;
        window.mostrarModalCrearEvento = mostrarModalCrearEvento;
        window.crearEvento = crearEvento;
        window.mostrarModalAgregarNota = mostrarModalAgregarNota;
        window.guardarNota = guardarNota;
        window.editarNota = editarNota;
        window.actualizarNota = actualizarNota;
        window.eliminarNota = eliminarNota;
        window.compartirEvento = compartirEvento;
        window.eliminarEvento = eliminarEvento;
        window.logout = logout;
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
