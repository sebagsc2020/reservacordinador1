<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Reservas - CRM Aventura Total</title>
    <style>
        /* ... tus estilos existentes ... */
    </style>
</head>
<body>
    <!-- ... tu HTML existente ... -->

    <script>
        // ==================================================
        // FUNCIÓN PARA ABRIR RESERVA MANUAL
        // ==================================================
        function abrirReservaManual() {
            window.open('https://sebagsc2020.github.io/reservacordinador1/reservar.html', '_blank');
        }

        // ==================================================
        // MENÚ FLOTANTE
        // ==================================================
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        
        function toggleMenu() {
            sidebar.classList.toggle('open');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }
        
        function closeMenu() {
            sidebar.classList.remove('open');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        if (menuBtn) {
            menuBtn.addEventListener('click', toggleMenu);
        }
        
        if (menuOverlay) {
            menuOverlay.addEventListener('click', closeMenu);
        }
        
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    closeMenu();
                }
            });
        });
        
        // ==================================================
        // CONFIGURACIÓN
        // ==================================================
        if (sessionStorage.getItem('crm_logged') !== 'true') { 
            window.location.href = 'index.html'; 
        }

        function logout() { 
            sessionStorage.clear(); 
            window.location.href = 'index.html'; 
        }

        const SPREADSHEET_ID = '1-b2wCbejrgWe3TdPGe2Aslvtlw4_FURMXsTcSMhLAeI';
        const SHEET_NAME = 'Hoja 1';
        const JSON_URL = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_NAME);
        
        // URL del Google Apps Script para actualizar el estado en la columna N
        const ESTADOS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0HFsdajR5wgLlqnpc1p-pzW7YOTGynhFCwsCgp_jPRQ_RUDBAX8I4aw1YHCcKGN2utQ/exec';
        
        let reservasData = [];
        let reservasFiltradas = [];
        let estadosGlobales = {};

        // Preloader Popup
        const preloaderPopup = document.getElementById('preloaderPopup');
        
        function mostrarPreloader() {
            if (preloaderPopup) {
                preloaderPopup.classList.remove('oculto');
            }
        }
        
        function ocultarPreloader() {
            if (preloaderPopup) {
                setTimeout(() => {
                    preloaderPopup.classList.add('oculto');
                }, 300);
            }
        }

        // ==================================================
        // ACTUALIZAR ESTADO EN LA COLUMNA N DE GOOGLE SHEETS
        // ==================================================
        async function actualizarEstadoEnSheet(id, nuevoEstado) {
            try {
                const response = await fetch(ESTADOS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'action=actualizarEstado&id=' + encodeURIComponent(id) + '&estado=' + encodeURIComponent(nuevoEstado)
                });
                console.log(`✅ Estado actualizado en columna N: ${id} -> ${nuevoEstado}`);
                return true;
            } catch (error) {
                console.error('Error al actualizar en Sheet:', error);
                return false;
            }
        }

        // ==================================================
        // CARGAR ESTADOS DESDE LA COLUMNA N DE GOOGLE SHEETS
        // ==================================================
        async function cargarEstadosDesdeSheet() {
            try {
                const response = await fetch(JSON_URL + '&t=' + Date.now());
                const texto = await response.text();
                
                let jsonStr = texto;
                jsonStr = jsonStr.replace("/*O_o*/", "");
                jsonStr = jsonStr.replace("google.visualization.Query.setResponse(", "");
                jsonStr = jsonStr.slice(0, -2);
                
                const data = JSON.parse(jsonStr);
                const rows = data.table.rows;
                
                const estadosTemp = {};
                
                for (let i = 0; i < rows.length; i++) {
                    const c = rows[i].c;
                    if (!c || c.length < 14) continue; // Esperamos al menos 14 columnas (A-N)
                    
                    const id = (c[1] && c[1].v) ? String(c[1].v) : '';
                    if (!id) continue;
                    
                    // Leer el estado de la columna N (índice 13)
                    let estado = (c[13] && c[13].v) ? String(c[13].v) : '';
                    
                    // Validar estado
                    if (!estado || (estado !== 'pendiente' && estado !== 'confirmado' && estado !== 'pagado')) {
                        estado = 'confirmado';
                    }
                    
                    estadosTemp[id] = estado;
                }
                
                console.log('📥 Estados cargados desde columna N:', Object.keys(estadosTemp).length);
                return estadosTemp;
                
            } catch (error) {
                console.error('Error al cargar estados desde Sheet:', error);
                return {};
            }
        }

        // ==================================================
        // CARGAR RESERVAS
        // ==================================================
        async function cargarReservas() {
            const container = document.getElementById('cardsContainer');
            const totalSpan = document.getElementById('totalReservasSpan');
            if (!container) return;

            try {
                mostrarPreloader();

                // Cargar estados desde la columna N de Google Sheets
                estadosGlobales = await cargarEstadosDesdeSheet();

                const response = await fetch(JSON_URL + '&t=' + Date.now());
                const texto = await response.text();

                let jsonStr = texto;
                jsonStr = jsonStr.replace("/*O_o*/", "");
                jsonStr = jsonStr.replace("google.visualization.Query.setResponse(", "");
                jsonStr = jsonStr.slice(0, -2);

                const data = JSON.parse(jsonStr);
                const rows = data.table.rows;

                if (!rows || rows.length === 0) throw new Error('No hay datos');

                reservasData = [];
                const excluidos = JSON.parse(localStorage.getItem('reservasExcluidas') || '[]');

                for (let i = 0; i < rows.length; i++) {
                    const c = rows[i].c;
                    if (!c || c.length < 5) continue;

                    const id = (c[1] && c[1].v) ? String(c[1].v) : '';
                    if (!id || excluidos.includes(id)) continue;

                    const nombre = (c[2] && c[2].v) ? String(c[2].v) : '';
                    const apellido = (c[3] && c[3].v) ? String(c[3].v) : '';
                    const email = (c[4] && c[4].v) ? String(c[4].v) : '';
                    const telefono = (c[5] && c[5].v) ? String(c[5].v) : '';
                    const ciudad = (c[7] && c[7].v) ? String(c[7].v) : '';

                    let excursionesLista = [];
                    const excursionesRaw = (c[8] && c[8].v) ? String(c[8].v) : '';
                    if (excursionesRaw) {
                        if (excursionesRaw.includes('\n')) {
                            excursionesLista = excursionesRaw.split('\n');
                        } else if (excursionesRaw.includes(' | ')) {
                            excursionesLista = excursionesRaw.split(' | ');
                        } else {
                            excursionesLista = [excursionesRaw];
                        }
                        excursionesLista = excursionesLista.map(function(e) { 
                            return e.trim().replace(/^✔️\s*/, '').replace(/^\d+\.\s*/, '');
                        }).filter(function(e) { return e; });
                    }

                    let fecha = '';
                    const timestamp = (c[0] && c[0].v) ? c[0].v : null;
                    if (timestamp) {
                        const fechaObj = new Date(timestamp);
                        if (!isNaN(fechaObj.getTime())) {
                            fecha = fechaObj.getDate().toString().padStart(2,'0') + '/' + (fechaObj.getMonth()+1).toString().padStart(2,'0') + '/' + fechaObj.getFullYear();
                        }
                    }

                    const personas = (c[10] && c[10].v) ? String(c[10].v) : '1';
                    const formaPago = (c[11] && c[11].v) ? String(c[11].v) : 'No especificado';
                    const lugar = (c[12] && c[12].v) ? String(c[12].v) : 'No especificado';
                    const nombreCompleto = (nombre + ' ' + apellido).trim() || 'No especificado';

                    // Usar el estado de la columna N
                    let estado = estadosGlobales[id];
                    if (!estado || (estado !== 'pendiente' && estado !== 'confirmado' && estado !== 'pagado')) {
                        estado = 'confirmado';
                    }

                    reservasData.push({
                        id: id,
                        fecha: fecha,
                        nombre: nombreCompleto,
                        email: email,
                        telefono: telefono,
                        ciudad: ciudad,
                        excursionesLista: excursionesLista,
                        personas: parseInt(personas) || 1,
                        formaPago: formaPago,
                        lugar: lugar,
                        estado: estado
                    });
                }

                reservasData.sort(function(a, b) {
                    const numA = parseInt(a.id.replace(/\D/g, '')) || 0;
                    const numB = parseInt(b.id.replace(/\D/g, '')) || 0;
                    return numB - numA;
                });

                reservasFiltradas = reservasData.slice();
                renderizarCards();
                if (totalSpan) totalSpan.textContent = reservasData.length + ' reservas';

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div style="text-align:center; color:red; grid-column:1/-1; padding:50px;">❌ Error: ' + error.message + '</div>';
            } finally {
                ocultarPreloader();
            }
        }

        // ==================================================
        // CAMBIAR ESTADO (ACTUALIZA COLUMNA N)
        // ==================================================
        async function cambiarEstado(id, nuevoEstado) {
            const reserva = reservasData.find(function(r) { return r.id === id; });
            if (reserva) {
                // Actualizar estado localmente
                reserva.estado = nuevoEstado;
                estadosGlobales[id] = nuevoEstado;
                
                // Actualizar en reservasFiltradas también
                const indexFiltrada = reservasFiltradas.findIndex(function(r) { return r.id === id; });
                if (indexFiltrada !== -1) reservasFiltradas[indexFiltrada].estado = nuevoEstado;
                
                // Guardar en localStorage como backup
                localStorage.setItem('estadosReservasCloud', JSON.stringify(estadosGlobales));
                
                // Actualizar en la columna N de Google Sheets
                await actualizarEstadoEnSheet(id, nuevoEstado);
                
                // Mostrar mensaje de confirmación
                const estadoText = nuevoEstado === 'confirmado' ? 'Confirmada' : (nuevoEstado === 'pendiente' ? 'Pendiente' : 'Pagada');
                alert(`✅ Estado cambiado a: ${estadoText}`);
                
                // Recargar las cards para reflejar el cambio
                renderizarCards();
            }
        }

        // ==================================================
        // ENVIAR WHATSAPP
        // ==================================================
        function enviarWhatsApp(reserva) {
            let telefono = reserva.telefono.replace(/\D/g, '');
            if (telefono.length === 10) {
                telefono = '54' + telefono;
            }

            let excursionesTexto = '';
            if (reserva.excursionesLista && reserva.excursionesLista.length > 0) {
                excursionesTexto = reserva.excursionesLista.map(function(exc, idx) { return (idx+1) + '. ' + exc; }).join('\n');
            } else {
                excursionesTexto = 'Sin excursiones específicas';
            }

            let estadoTexto = '';
            switch(reserva.estado) {
                case 'pendiente': estadoTexto = 'Pendiente'; break;
                case 'confirmado': estadoTexto = 'Confirmado'; break;
                case 'pagado': estadoTexto = 'Pagado'; break;
                default: estadoTexto = 'Confirmado';
            }

            const mensaje = '🏔️ *AVENTURA TOTAL* 🏔️\n\n✅ *CONFIRMACIÓN DE RESERVA*\n\n🆔 *N° de reserva:* ' + reserva.id + '\n📅 *Fecha:* ' + reserva.fecha + '\n\n👤 *DATOS DEL PASAJERO:*\n   Nombre: ' + reserva.nombre + '\n   📞 Teléfono: ' + reserva.telefono + '\n   📧 Email: ' + reserva.email + '\n\n📍 *DESTINO:*\n   ' + reserva.ciudad + '\n\n✨ *EXCURSIONES SELECCIONADAS:*\n' + excursionesTexto + '\n\n👥 *Cantidad de personas:* ' + reserva.personas + '\n💳 *Forma de pago:* ' + reserva.formaPago + '\n🚐 *Punto de encuentro:* ' + reserva.lugar + '\n📌 *Estado:* ' + estadoTexto + '\n\n📌 *PRÓXIMOS PASOS:*\n• En las próximas 24hs recibirás detalles de pago\n• Punto de encuentro exacto será confirmado\n\n🏔️ ¡Gracias por confiar en Aventura Total!';

            const mensajeCodificado = encodeURIComponent(mensaje);
            window.open('https://wa.me/' + telefono + '?text=' + mensajeCodificado, '_blank');
        }

        // ==================================================
        // RENDERIZAR CARDS (NO MUESTRA LA COLUMNA N)
        // ==================================================
        function renderizarCards() {
            const container = document.getElementById('cardsContainer');
            const totalSpan = document.getElementById('totalReservasSpan');
            if (!container) return;

            if (reservasFiltradas.length === 0) {
                container.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:50px;">📋 No hay reservas</div>';
                if (totalSpan) totalSpan.textContent = '0 reservas';
                return;
            }

            function escapeHtml(text) { 
                if (!text) return ''; 
                const div = document.createElement('div'); 
                div.textContent = text; 
                return div.innerHTML; 
            }

            let html = '';
            for (let idx = 0; idx < reservasFiltradas.length; idx++) {
                const r = reservasFiltradas[idx];
                let estadoText = '';
                switch(r.estado) {
                    case 'pendiente': estadoText = 'Pendiente'; break;
                    case 'confirmado': estadoText = 'Confirmado'; break;
                    case 'pagado': estadoText = 'Pagado'; break;
                    default: estadoText = 'Confirmado';
                }

                let excursionesHtml = '<ul class="excursiones-lista-card">';
                if (!r.excursionesLista || r.excursionesLista.length === 0) {
                    excursionesHtml += '<li>Sin excursiones</li>';
                } else {
                    for (let i = 0; i < r.excursionesLista.length; i++) {
                        excursionesHtml += '<li>' + (i+1) + '. ' + escapeHtml(r.excursionesLista[i]) + '</li>';
                    }
                }
                excursionesHtml += '</ul>';

                html += '<div class="reserva-card">' +
                            '<div class="card-header">' +
                                '<div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">' +
                                    '<span class="card-id">ID: ' + escapeHtml(r.id) + '</span>' +
                                    '<span class="card-estado-header" style="font-weight: 700; background: ' + (r.estado === 'pendiente' ? '#ffc107' : (r.estado === 'pagado' ? '#3498db' : '#27ae60')) + ';">' + estadoText + '</span>' +
                                '</div>' +
                                '<span class="card-fecha">' + escapeHtml(r.fecha) + '</span>' +
                            '</div>' +
                            '<div class="card-body">' +
                                '<div class="card-info"><div class="card-label">👤 CLIENTE</div><div class="card-value">' + escapeHtml(r.nombre) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">📧 EMAIL</div><div class="card-value">' + escapeHtml(r.email) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">📞 TELÉFONO</div><div class="card-value">' + escapeHtml(r.telefono) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">📍 CIUDAD</div><div class="card-value">' + escapeHtml(r.ciudad) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">✨ EXCURSIONES</div>' + excursionesHtml + '</div>' +
                                '<div class="card-info"><div class="card-label">👥 PERSONAS</div><div class="card-value">' + escapeHtml(r.personas) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">💳 FORMA DE PAGO</div><div class="card-value">' + escapeHtml(r.formaPago) + '</div></div>' +
                                '<div class="card-info"><div class="card-label">🚐 LUGAR</div><div class="card-value">' + escapeHtml(r.lugar) + '</div></div>' +
                            '</div>' +
                            '<div class="card-actions">' +
                                '<button class="btn-card btn-confirmar-card" data-id="' + escapeHtml(r.id) + '" data-estado="confirmado">✅ Confirmada</button>' +
                                '<button class="btn-card btn-pendiente-card" data-id="' + escapeHtml(r.id) + '" data-estado="pendiente">⏳ Pendiente</button>' +
                                '<button class="btn-card btn-pagar-card" data-id="' + escapeHtml(r.id) + '" data-estado="pagado">💰 Paga</button>' +
                                '<button class="btn-card btn-whatsapp-card" data-id="' + escapeHtml(r.id) + '">💬 WhatsApp</button>' +
                                '<button class="btn-card btn-excluir-card" data-id="' + escapeHtml(r.id) + '">🗑️ Apagar Reserva</button>' +
                            '</div>' +
                        '</div>';
            }
            container.innerHTML = html;
            if (totalSpan) totalSpan.textContent = reservasFiltradas.length + ' de ' + reservasData.length + ' reservas';

            document.querySelectorAll('.btn-confirmar-card').forEach(function(btn) {
                btn.addEventListener('click', function() { cambiarEstado(btn.dataset.id, 'confirmado'); });
            });
            document.querySelectorAll('.btn-pendiente-card').forEach(function(btn) {
                btn.addEventListener('click', function() { cambiarEstado(btn.dataset.id, 'pendiente'); });
            });
            document.querySelectorAll('.btn-pagar-card').forEach(function(btn) {
                btn.addEventListener('click', function() { cambiarEstado(btn.dataset.id, 'pagado'); });
            });
            document.querySelectorAll('.btn-whatsapp-card').forEach(function(btn) {
                const reserva = reservasData.find(function(r) { return r.id === btn.dataset.id; });
                btn.addEventListener('click', function() { enviarWhatsApp(reserva); });
            });
            document.querySelectorAll('.btn-excluir-card').forEach(function(btn) {
                btn.addEventListener('click', function() { excluirReserva(btn.dataset.id); });
            });
        }

        function filtrarReservas() {
            const busqueda = document.getElementById('busquedaReserva');
            if (!busqueda) return;
            const texto = busqueda.value.toLowerCase().trim();

            if (!texto) {
                reservasFiltradas = reservasData.slice();
            } else {
                reservasFiltradas = reservasData.filter(function(r) {
                    const coincideNombre = r.nombre.toLowerCase().includes(texto);
                    const coincideExcursion = r.excursionesLista.some(function(exc) {
                        return exc.toLowerCase().includes(texto);
                    });
                    return coincideNombre || coincideExcursion;
                });
            }
            renderizarCards();
        }

        function excluirReserva(id) {
            if (confirm('⚠️ ¿Estás seguro de excluir la reserva ' + id + '?')) {
                const excluidos = JSON.parse(localStorage.getItem('reservasExcluidas') || '[]');
                if (!excluidos.includes(id)) {
                    excluidos.push(id);
                    localStorage.setItem('reservasExcluidas', JSON.stringify(excluidos));
                }
                cargarReservas();
                alert('✅ Reserva ' + id + ' excluida.');
            }
        }

        function generarPDFExterno() {
            const busquedaInput = document.getElementById('busquedaReserva');
            let filtroTexto = busquedaInput ? busquedaInput.value.trim() : '';

            if (reservasFiltradas.length === 0) {
                alert('⚠️ No hay reservas para exportar.');
                return;
            }

            try {
                localStorage.setItem('filtroExcursionPDF', filtroTexto);
                localStorage.setItem('reservasFiltradasPDF', JSON.stringify(reservasFiltradas));
                console.log('✅ Datos guardados para PDF:', { filtro: filtroTexto || '(vacio)', total: reservasFiltradas.length });
            } catch(e) {
                console.error('Error al guardar:', e);
                alert('❌ Error al preparar los datos para el PDF.');
                return;
            }

            const pdfWindow = window.open('generar-pdf.html', '_blank');
            if (!pdfWindow) {
                alert('⚠️ Por favor, permita ventanas emergentes para generar el PDF.');
            }
        }

        window.logout = logout;
        window.filtrarReservas = filtrarReservas;
        window.cargarReservas = cargarReservas;
        window.generarPDFExterno = generarPDFExterno;
        window.abrirReservaManual = abrirReservaManual;

        document.getElementById('btnFiltrar').addEventListener('click', filtrarReservas);
        document.getElementById('btnRecargar').addEventListener('click', cargarReservas);
        document.getElementById('btnPDFExterno').addEventListener('click', generarPDFExterno);

        const busquedaInput = document.getElementById('busquedaReserva');
        if (busquedaInput) {
            busquedaInput.addEventListener('keypress', function(e) { 
                if (e.key === 'Enter') filtrarReservas(); 
            });
        }

        // Inicializar
        cargarReservas();
        setInterval(() => cargarReservas(), 30000);
    </script>
</body>
</html>
