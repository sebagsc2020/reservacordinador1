<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador PDF - Aventura Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: white; }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="loading">⏳ Generando PDF, por favor espere...</div>
    
    <script>
        (function() {
            // Obtener el filtro desde localStorage
            let filtroExcursion = localStorage.getItem('filtroExcursionPDF') || '';
            let reservasFiltradas = [];
            
            try {
                const reservasJson = localStorage.getItem('reservasFiltradasPDF');
                if (reservasJson) {
                    reservasFiltradas = JSON.parse(reservasJson);
                }
            } catch(e) {
                console.error('Error al parsear reservas:', e);
            }
            
            // Limpiar localStorage después de leer
            localStorage.removeItem('filtroExcursionPDF');
            localStorage.removeItem('reservasFiltradasPDF');
            
            if (reservasFiltradas.length === 0) {
                document.body.innerHTML = '<div style="text-align:center; padding:50px; color:red;">❌ No hay reservas para exportar.</div>';
                setTimeout(() => window.close(), 2000);
                throw new Error('No hay reservas');
            }
            
            const totalPasajeros = reservasFiltradas.reduce((sum, r) => sum + (parseInt(r.personas) || 0), 0);
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const marginLeft = 8;
            let y = marginLeft + 10;
            const pageWidth = doc.internal.pageSize.getWidth();
            
            const colWidths = [35, 42, 25, 48, 12, 20, 35, 35];
            const headers = ['ID', 'Cliente', 'Teléfono', 'Excursiones', 'Pax', 'Estado', 'Lugar', 'Observaciones'];
            
            // TÍTULO DINÁMICO según filtro
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(0, 0, 0);
            
            let titulo = '';
            if (filtroExcursion && filtroExcursion !== '') {
                titulo = filtroExcursion;
            } else {
                titulo = 'EXCURSIONES';
            }
            doc.text(titulo, pageWidth / 2, y, { align: 'center' });
            y += 10;
            
            // Fecha y total de reservas
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.text(`Generado: ${new Date().toLocaleString('es-AR')}`, marginLeft, y);
            y += 6;
            doc.text(`Total de reservas: ${reservasFiltradas.length}`, marginLeft, y);
            y += 8;
            
            // Línea de empresa, nombre y tel
            doc.setFontSize(9);
            doc.setFont('courier', 'normal');
            doc.text('EMPRESA: ____________________          NOMBRE: ____________________          TEL: ____________________', marginLeft, y);
            y += 10;
            
            // Encabezados
            let x = marginLeft;
            doc.setFillColor(255, 255, 255);
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.1);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(9);
            doc.setTextColor(0, 0, 0);
            
            for (let i = 0; i < headers.length; i++) {
                doc.rect(x, y, colWidths[i], 10);
                doc.text(headers[i], x + 2, y + 6);
                x += colWidths[i];
            }
            y += 10;
            
            // Datos
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            doc.setTextColor(0, 0, 0);
            doc.setDrawColor(200, 200, 200);
            
            for (const reserva of reservasFiltradas) {
                if (y > 180) {
                    doc.addPage();
                    y = marginLeft + 10;
                    x = marginLeft;
                    doc.setFillColor(255, 255, 255);
                    doc.setDrawColor(0, 0, 0);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(9);
                    doc.setTextColor(0, 0, 0);
                    for (let i = 0; i < headers.length; i++) {
                        doc.rect(x, y, colWidths[i], 10);
                        doc.text(headers[i], x + 2, y + 6);
                        x += colWidths[i];
                    }
                    y += 10;
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(0, 0, 0);
                    doc.setDrawColor(200, 200, 200);
                }
                
                let excursionesTexto = '';
                if (reserva.excursionesLista && reserva.excursionesLista.length > 0) {
                    excursionesTexto = reserva.excursionesLista.map((exc, idx) => `${idx+1}. ${exc}`).join('\n');
                } else {
                    excursionesTexto = 'Sin excursiones';
                }
                
                const estadoTexto = reserva.estado === 'pendiente' ? 'Pendiente' : (reserva.estado === 'pagado' ? 'Pagado' : 'Confirmado');
                const lineasExcursiones = excursionesTexto.split('\n').length;
                const alturaFila = Math.max(10, lineasExcursiones * 4.5 + 4);
                
                x = marginLeft;
                
                doc.rect(x, y, colWidths[0], alturaFila);
                doc.text(String(reserva.id), x + 2, y + 5);
                x += colWidths[0];
                
                doc.rect(x, y, colWidths[1], alturaFila);
                const nombreCliente = reserva.nombre.length > 32 ? reserva.nombre.substring(0, 29) + '...' : reserva.nombre;
                doc.text(nombreCliente, x + 2, y + 5);
                x += colWidths[1];
                
                doc.rect(x, y, colWidths[2], alturaFila);
                doc.text(reserva.telefono, x + 2, y + 5);
                x += colWidths[2];
                
                doc.rect(x, y, colWidths[3], alturaFila);
                const lineas = doc.splitTextToSize(excursionesTexto, colWidths[3] - 4);
                doc.text(lineas, x + 2, y + 5);
                x += colWidths[3];
                
                doc.rect(x, y, colWidths[4], alturaFila);
                doc.text(String(reserva.personas), x + 2, y + 5);
                x += colWidths[4];
                
                doc.rect(x, y, colWidths[5], alturaFila);
                doc.text(estadoTexto, x + 2, y + 5);
                x += colWidths[5];
                
                doc.rect(x, y, colWidths[6], alturaFila);
                const lugarTexto = reserva.lugar.length > 28 ? reserva.lugar.substring(0, 25) + '...' : reserva.lugar;
                doc.text(lugarTexto, x + 2, y + 5);
                x += colWidths[6];
                
                doc.rect(x, y, colWidths[7], alturaFila);
                doc.text('', x + 2, y + 5);
                
                y += alturaFila;
            }
            
            // TOTAL GENERAL
            y += 5;
            const totalX = marginLeft + colWidths[0] + colWidths[1] + colWidths[2];
            
            doc.setFillColor(255, 255, 255);
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.1);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(9);
            doc.setTextColor(0, 0, 0);
            
            doc.rect(marginLeft, y, colWidths[0], 10);
            doc.rect(marginLeft + colWidths[0], y, colWidths[1], 10);
            doc.rect(marginLeft + colWidths[0] + colWidths[1], y, colWidths[2], 10);
            doc.rect(totalX, y, colWidths[3], 10);
            doc.text('TOTAL GENERAL', totalX + 2, y + 6);
            doc.rect(totalX + colWidths[3], y, colWidths[4], 10);
            doc.text(String(totalPasajeros), totalX + colWidths[3] + 2, y + 6);
            doc.rect(totalX + colWidths[3] + colWidths[4], y, colWidths[5], 10);
            doc.rect(totalX + colWidths[3] + colWidths[4] + colWidths[5], y, colWidths[6], 10);
            doc.rect(totalX + colWidths[3] + colWidths[4] + colWidths[5] + colWidths[6], y, colWidths[7], 10);
            
            doc.save(`reservas_${Date.now()}.pdf`);
            
            // Cerrar la ventana después de guardar
            setTimeout(() => window.close(), 1000);
        })();
    </script>
</body>
</html>
